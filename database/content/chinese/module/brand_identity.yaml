# 說明文字
help:
  overview: |
    BrandEdge 品牌印記引擎是一個企業級品牌定位分析平台，
    透過AI深度分析顧客評論，提供全方位的品牌策略建議。

  workflow: |
    分析工作流程：
    1. 上傳評論資料 - 上傳包含品牌評論的Excel或CSV檔案
    2. 萃取屬性 - AI自動從評論中萃取10-30個關鍵產品屬性
    3. 屬性評分 - 系統為每則評論的所有屬性進行評分(1-5分)
    4. 執行分析 - 選擇要執行的分析模組，生成策略報告

  attributes_extraction: |
    屬性萃取說明：
    - 系統會從評論中自動萃取消費者關注的產品屬性
    - 可選擇10-30個屬性（建議15個）
    - 萃取時間約2-5分鐘
    - 會自動去除重複和不相關的屬性

  attributes_scoring: |
    屬性評分說明：
    - 系統會為每則評論的所有屬性評分(1-5分)
    - 評分基於評論內容對該屬性的正面/負面描述
    - 評分時間取決於評論數量和屬性數量
    - 支援批次處理以提高效率

  analysis_modules: |
    八大分析模組：
    1. 市場輪廓 - 市場區隔與客群分析
    2. 市場賽道 - 成長機會識別與策略優先級
    3. DNA分析 - 品牌DNA雷達圖與競爭力評估
    4. 關鍵因素 - 成功要素識別
    5. 理想點 - 目標達成分析
    6. 策略定位 - 四象限策略建議
    7. 品牌識別 - 差異化分析
    8. AI洞察 - 綜合策略報告

