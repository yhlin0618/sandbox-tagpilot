# 圖表說明
chart_interpretation:
  title: "📊 品牌識別度矩陣圖解讀"
  overview: "此圖表展示品牌在市場中的識別度定位，幫助您了解品牌的獨特性與實力表現。"

  axes_explanation:
    title: "座標軸說明："
    x_axis: "• **橫軸（獨特性/識別度）**：表示品牌在消費者心中的差異化程度。數值越高代表品牌越具有獨特性，越容易被消費者識別和記住。"
    y_axis: "• **縱軸（品牌實力）**：表示品牌的整體表現水準。數值越高代表品牌在各項屬性上的綜合實力越強。"

  marker_explanation:
    title: "標記說明："
    target: "• **目標品牌**：以紅色大圓點標示，方便快速識別您關注的品牌位置。"
    others: "• **其他品牌**：以藍色小圓點標示，用於比較競爭態勢。"
    labels: "• **品牌標籤**：每個圓點上方顯示品牌名稱，滑鼠懸停可查看詳細數據。"

  quadrants:
    title: "四象限策略定位："
    high_high: "• **高識別高實力（右上）**：市場領導者 - 品牌具有強大實力且高度差異化，應持續強化優勢，鞏固領導地位"
    low_high: "• **低識別高實力（左上）**：隱藏冠軍 - 實力強但識別度不足，應加強品牌行銷和差異化特色傳播"
    high_low: "• **高識別低實力（右下）**：特色品牌 - 有獨特性但實力待提升，應強化產品力和服務品質"
    low_low: "• **低識別低實力（左下）**：待突破品牌 - 需要全面提升，優先建立差異化特色或強化核心競爭力"

  how_to_use: "**策略建議**：目標品牌應朝右上象限移動。若在左上，需增強差異化特色；若在右下，需提升整體實力；若在左下，需從建立獨特性或強化實力中選擇突破點。"
