# 欄位說明
column_descriptions:
  review:
    title: "📋 評論資料欄位說明"
    columns:
      - name: "Variation"
        type: "字串"
        required: true
        description: "商品/品牌識別碼（如 Amazon ASIN、品牌名稱）"
      - name: "ASIN"
        type: "字串"
        required: false
        description: "Amazon 標準識別碼（選填，可替代 Variation）"
      - name: "Title"
        type: "字串"
        required: true
        description: "評論標題；簡短扼要；長度建議 10~100 字元"
      - name: "Body"
        type: "字串"
        required: true
        description: "評論內容；完整陳述使用心得；長度建議 50~1000 字元"
    note: "⚡ 欄位名稱不區分大小寫：系統會自動識別 variation、Variation、VARIATION 等不同寫法"
  sales:
    title: "📋 銷售資料欄位說明"
    columns:
      - name: "Variation"
        type: "字串"
        required: true
        description: "商品/品牌識別碼（需與評論資料的 Variation 對應）"
      - name: "ASIN"
        type: "字串"
        required: false
        description: "Amazon 標準識別碼（選填，可替代 Variation）"
      - name: "Sales"
        type: "數值"
        required: true
        description: "銷售數量"
      - name: "payment_time"
        type: "日期"
        required: false
        description: "交易日期（選填，格式：YYYY-MM-DD）"
      - name: "price"
        type: "數值"
        required: false
        description: "商品單價（選填）"
    note: "⚡ 銷售資料的 Variation 需與評論資料一致，系統才能正確合併分析"

tabs:
  review_preview: "評論資料預覽"
  sales_preview: "銷售資料預覽"

