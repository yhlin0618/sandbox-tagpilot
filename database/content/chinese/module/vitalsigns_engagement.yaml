  activity_levels: "關注不活躍客戶的比例。若超過30%，建議採取大規模的活躍化措施。"
  conversion_funnel: "漏斗變窄的階段就是轉化瓶頸。重點優化流失率最高的環節。"
  purchase_timing: "了解客戶購買的時間習慣，可以優化促銷和溝通的時機，提高轉化效率。"
