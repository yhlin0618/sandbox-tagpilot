# 說明文字
help:
  overview: |
    活躍轉化分析模組幫助您評估客戶參與度和轉化效率。
    透過多維度分析，識別高價值客群和優化互動策略。

  engagement_scoring: |
    參與度評分系統：
    基於5個維度加權計算：
    1. 購買頻率 (25%)：購買次數
    2. 最近互動 (20%)：最後購買時間
    3. 消費價值 (25%)：累計消費金額
    4. 互動深度 (15%)：每次互動的深入程度
    5. 行為一致性 (15%)：購買行為的穩定性

    總分範圍：0-100分

  activity_levels: |
    活躍度等級定義：
    - 高活躍 (75分以上)：核心客戶，需維護
    - 中活躍 (50-74分)：主力客戶，可提升
    - 低活躍 (25-49分)：邊緣客戶，需激活
    - 不活躍 (25分以下)：流失風險，需喚醒

  conversion_funnel: |
    轉化漏斗分析：
    追蹤客戶從認知到重複購買的完整旅程：
    1. 認知階段：了解品牌
    2. 考慮階段：評估購買
    3. 購買階段：完成首購
    4. 重購階段：成為回購客

    漏斗分析可幫助：
    - 識別轉化瓶頸
    - 計算各階段流失率
    - 優化客戶旅程
    - 提升整體轉化率

  rfe_analysis: |
    RFE 分析：
    RFE 是 RFM 的進階版本，增加了參與度維度：
    - R (Recency)：最近購買時間
    - F (Frequency)：購買頻率
    - E (Engagement)：整體參與度

    相比傳統 RFM，RFE 更全面地評估客戶價值。

  best_practices: |
    分析建議：
    1. 定期追蹤活躍率變化，維持客戶活躍
    2. 分析轉化漏斗，優化關鍵環節
    3. 識別高參與客戶的特徵，複製成功模式
    4. 根據購買時間模式優化溝通節奏
    5. 針對不同活躍度客群制定差異化策略

