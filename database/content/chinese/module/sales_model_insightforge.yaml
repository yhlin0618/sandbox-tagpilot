# Translation mappings for regression results
# Maps original Chinese output from regression function to translated text
translation_map:
  interpretation:
    # Error messages
    "資料不足": "模型擬合失敗"
    "缺少銷量資料": "模型擬合失敗"
    "銷量資料無效": "模型擬合失敗"
    "模型擬合失敗": "模型擬合失敗"
    # Positive impacts
    "強烈.*正面影響": "對銷量有強烈正面影響"
    "中等.*正面影響": "對銷量有中等正面影響"
    "微弱.*正面影響": "對銷量有微弱正面影響"
    # Negative impacts
    "強烈.*負面影響": "對銷量有強烈負面影響"
    "中等.*負面影響": "對銷量有中等負面影響"
    "微弱.*負面影響": "對銷量有微弱負面影響"

  meaning:
    # Error messages
    "無法分析": "無法分析"
    # Negative impact (new)
    "不需要強調，會負向影響銷售": "不需要強調，會負向影響銷售"
    # Positive impact levels
    "影響很小，不是關鍵因素": "影響很小，不是關鍵因素"
    "有一定影響，可考慮優化": "有一定影響，可考慮優化"
    "重要影響因素，應重點關注": "重要影響因素，應重點關注"
    "極重要因素，是核心競爭力": "極重要因素，是核心競爭力"

