# 說明文字
help:
  overview: |
    BrandEdge 品牌印記引擎是一個企業級品牌定位分析平台，
    透過AI深度分析顧客評論，提供全方位的品牌策略建議。

  workflow: |
    分析工作流程：
    1. 上傳評論資料 - 上傳包含品牌評論的Excel或CSV檔案
    2. 萃取屬性 - AI自動從評論中萃取10-30個關鍵產品屬性
    3. 屬性評分 - 系統為每則評論的所有屬性進行評分(1-5分)
    4. 執行分析 - 選擇要執行的分析模組，生成策略報告

  attributes_extraction: |
    屬性萃取說明：
    - 系統會從評論中自動萃取消費者關注的產品屬性
    - 可選擇10-30個屬性（建議15個）
    - 萃取時間約2-5分鐘
    - 會自動去除重複和不相關的屬性

  attributes_scoring: |
    屬性評分說明：
    - 系統會為每則評論的所有屬性評分(1-5分)
    - 評分基於評論內容對該屬性的正面/負面描述
    - 評分時間取決於評論數量和屬性數量
    - 支援批次處理以提高效率

  analysis_modules: |
    八大分析模組：
    1. 市場輪廓 - 市場區隔與客群分析
    2. 市場賽道 - 成長機會識別與策略優先級
    3. DNA分析 - 品牌DNA雷達圖與競爭力評估
    4. 關鍵因素 - 成功要素識別
    5. 理想點 - 目標達成分析
    6. 策略定位 - 四象限策略建議
    7. 品牌識別 - 差異化分析
    8. AI洞察 - 綜合策略報告

  # 市場賽道指標說明
  indicators_title: "指標說明"

  growth_potential:
    title: "成長潛力"
    description: "代表該屬性從目前表現提升到理想水準的改善空間。"
    range_80_100: "• 80-100%：有極大改善空間，是重要的成長機會"
    range_50_80: "• 50-80%：中等改善空間，值得積極投入資源"
    range_20_50: "• 20-50%：改善空間有限，需評估投資效益"
    range_0_20: "• 0-20%：已接近理想狀態，維持現狀即可"

  market_importance:
    title: "市場重要性"
    description: "反映該屬性對整體市場競爭力的影響程度。"
    level_100: "• 100%：關鍵屬性，直接影響品牌成敗"
    level_50: "• 50%：重要屬性，對品牌表現有顯著影響"
    note: "• 數值越高，代表消費者越重視此屬性"

  quadrant:
    title: "四象限解讀"
    high_potential: "• 高潛力賽道（右上）：高成長潛力+高重要性 = 最優先投資"
    mature: "• 成熟賽道（左上）：低成長潛力+高重要性 = 維持領先優勢"
    niche: "• 利基賽道（右下）：高成長潛力+低重要性 = 差異化機會"
    low_priority: "• 低優先賽道（左下）：低成長潛力+低重要性 = 資源最低配置"

