# 圖表說明
chart_interpretation:
  title: "📊 圖表解讀說明"
  overview: "本圖表呈現各產品屬性的成長機會分析，幫助您識別最具投資價值的改進方向。"

  axes_explanation:
    title: "座標軸說明："
    x_axis: "• **橫軸（成長潛力）**：表示該屬性從目前表現提升到理想水準的改善空間。數值越高代表改善潛力越大。"
    y_axis: "• **縱軸（市場重要性）**：表示該屬性對整體市場競爭力的影響程度。數值越高代表消費者越重視此屬性。"

  bubble_explanation:
    title: "氣泡說明："
    size: "• **氣泡大小**：代表該屬性的「賽道得分」（成長潛力 × 市場重要性）。氣泡越大表示投資報酬率越高。"
    color: "• **氣泡顏色**：從深藍到黃色，顏色越亮表示機會越大。"
    position: "• **氣泡位置**：將屬性分為四個象限，代表不同的策略建議。"

  quadrants:
    title: "四象限策略："
    high_potential: "• **高潛力賽道（右上）**：高成長潛力 + 高重要性 = 最優先投資，能帶來最大競爭優勢"
    mature: "• **成熟賽道（左上）**：低成長潛力 + 高重要性 = 維持領先優勢，避免被競爭對手超越"
    niche: "• **利基賽道（右下）**：高成長潛力 + 低重要性 = 差異化機會，可創造獨特賣點"
    low_priority: "• **低優先賽道（左下）**：低成長潛力 + 低重要性 = 資源最低配置，維持基本水準即可"

  how_to_use: "**如何使用**：重點關注右上象限（高潛力賽道）的屬性，這些是能帶來最大投資報酬率的改進方向。同時注意左上象限（成熟賽道）的屬性，確保維持現有優勢。"
