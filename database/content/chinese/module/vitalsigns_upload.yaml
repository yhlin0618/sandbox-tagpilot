# 說明文字
help:
  overview: |
    VitalSigns 資料上傳模組支援CSV和Excel格式的客戶交易資料。
    系統將自動偵測檔案格式並驗證資料完整性。

  file_requirements: |
    檔案要求：
    - 支援 CSV (.csv) 或 Excel (.xlsx, .xls) 格式
    - 檔案大小不超過 200MB
    - 單次最多上傳 12 個檔案（系統將自動合併）
    - 建議使用 UTF-8 編碼

  data_requirements: |
    資料要求：
    - 最少 10 筆交易資料
    - 最少 10 位不重複客戶
    - 最少 3 個月的交易記錄（建議 12 個月）
    - 必須包含完整的客戶ID、時間、金額欄位

  column_requirements: |
    必要欄位說明：
    - 客戶ID/Email：唯一識別客戶的欄位（如 Email、會員ID）
    - 購買時間：交易發生的日期時間
    - 交易金額：單筆交易的金額（必須為正數）

    選填欄位說明：
    - 平台ID：銷售平台或通路（如 Amazon、官網）
    - 產品ID：產品識別碼或SKU

  amazon_format: |
    Amazon 報告格式支援：
    系統可自動偵測並處理 Amazon 銷售報告，支援以下欄位：
    - Buyer Email → 客戶ID
    - Purchase Date / Payments Date → 購買時間
    - Item Price → 交易金額

    直接上傳從 Amazon Seller Central 下載的報告即可。

  multi_file_upload: |
    多檔案上傳功能：
    - 可一次選擇多個檔案（最多12個）
    - 系統將自動合併所有檔案
    - 適用於每月分開的報告檔案
    - 所有檔案必須具有相同的欄位結構

  troubleshooting: |
    常見問題：

    Q: 為什麼無法偵測到欄位？
    A: 請確認檔案第一行包含欄位名稱，且欄位名稱清楚標示

    Q: 如何處理日期格式問題？
    A: 系統支援多種日期格式，建議使用 YYYY-MM-DD 或 YYYY-MM-DD HH:MM:SS

    Q: 可以上傳不同平台的資料嗎？
    A: 可以，使用選填的「平台ID」欄位來區分不同來源

    Q: 資料需要預先清理嗎？
    A: 系統會自動處理常見的格式問題，但建議移除明顯的錯誤資料

# 驗證規則說明
validation_rules:
  customer_id:
    title: "客戶ID驗證"
    rules:
      - "不可為空值"
      - "建議使用Email格式"
      - "最少10位不重複客戶"

  payment_time:
    title: "購買時間驗證"
    rules:
      - "不可為空值"
      - "必須為有效的日期時間格式"
      - "資料範圍至少涵蓋3個月"
      - "不可有未來日期"

  lineitem_price:
    title: "交易金額驗證"
    rules:
      - "不可為空值"
      - "必須為數字格式"
      - "不可為負數"
      - "建議最大值不超過 1,000,000"

