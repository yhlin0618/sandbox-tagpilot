# 說明文字
help:
  step1: "步驟一："
  step1_desc: "點選你要分析的顧客標籤，例如，你可以點選購買金額。"
  step2: "步驟二："
  step2_desc: "點選你的分析工具，例如，你可以點選執行客戶分群。"
  step3: "步驟三："
  step3_desc: "點選檢視選項，例如，你可以點選統計圖表。"
  repeat_steps: "重複上述步驟，假設您想查看顧客最近來店時間，則可重複上述步驟檢視分析結果和AI行銷建議。"

  overview: |
    客戶DNA分析是最深度的客戶分析模組，提供：
    - 7個維度的客戶DNA指標
    - 智慧分群與客群命名
    - 11種RFM客群畫像
    - AI驅動的洞察和建議

  dna_metrics: |
    7個DNA維度說明：

    1. M（Monetary）- 消費金額：總消費金額，反映客戶價值
    2. R（Recency）- 最近購買：距離上次購買天數，反映活躍度
    3. F（Frequency）- 購買頻率：購買次數，反映忠誠度
    4. IPT（Inter-Purchase Time）- 購買間隔：平均購買間隔，反映購買週期
    5. CAI（Customer Activity Index）- 活躍指數：綜合活躍度指標
    6. PCV（Past Customer Value）- 過去價值：歷史總價值
    7. CRI（Customer Richness Index）- 穩定度：購買穩定性評分

  clustering: |
    智慧分群：
    - 使用K-means或階層式聚類
    - 自動尋找最佳分群數
    - AI智慧命名客群
    - 生成客群特徵畫像

    分群可幫助：
    - 識別相似客戶群體
    - 制定差異化策略
    - 精準行銷投放
    - 優化資源配置

  rfm_segments: |
    11種RFM客群：

    高價值客群：
    1. Champions（冠軍客戶）：最佳客戶
    2. Loyal Customers（忠誠客戶）：穩定高價值
    3. Can't Lose Them（不能失去）：高價值但流失風險

    成長潛力客群：
    4. Potential Loyalists（潛力忠誠）：可培養
    5. Promising（有潛力）：高客單價
    6. Recent Customers（新近客戶）：新客

    需要關注客群：
    7. Need Attention（需要關注）：冷卻中
    8. About to Sleep（即將休眠）：活躍度下降
    9. At Risk（流失風險）：高流失風險

    低價值客群：
    10. Hibernating（休眠）：長期無互動
    11. Lost（已流失）：已經流失

  ai_analysis: |
    AI 增強分析：
    利用 GPT-4 提供智慧洞察：
    - 指標說明：解讀指標商業意義
    - 分布洞察：發現分布特徵和異常
    - 客群畫像：生成詳細客群描述
    - 行銷建議：提供精準行銷策略
    - 流失預警：預測流失並提供挽回建議
    - 交叉銷售：發現銷售機會

  best_practices: |
    分析建議：
    1. 先查看各指標分布，了解客戶整體狀況
    2. 執行智慧分群，識別不同客群
    3. 分析RFM客群，了解客戶生命週期階段
    4. 使用AI洞察獲得深度分析和建議
    5. 針對不同客群制定差異化策略
    6. 定期追蹤客群變化，調整策略

