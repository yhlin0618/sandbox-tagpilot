# DNA 指標定義（7維度）
dna_metrics:
  # 購買金額 (原 M - Monetary)
  monetary:
    name: "購買金額"
    short_name: "M"
    full_name: "Monetary"
    description: "客戶的總消費金額"
    icon: "💰"
    unit: "元"
    interpretation: "消費金額越高，客戶價值越大"

  # 最近購買日 (原 R - Recency)
  recency:
    name: "最近購買日"
    short_name: "R"
    full_name: "Recency"
    description: "距離最後一次購買的天數"
    icon: "🕒"
    unit: "天"
    interpretation: "天數越小，客戶越活躍"
    reverse: true  # 數值越小越好

  # 購買頻率 (原 F - Frequency)
  frequency:
    name: "購買頻率"
    short_name: "F"
    full_name: "Frequency"
    description: "購買的總次數"
    icon: "🔁"
    unit: "次"
    interpretation: "購買次數越多，忠誠度越高"

  # 購買週期 (原 IPT - Inter-Purchase Time)
  ipt:
    name: "購買週期"
    short_name: "IPT"
    full_name: "Inter-Purchase Time"
    description: "平均購買間隔天數"
    icon: "⏱️"
    unit: "天"
    interpretation: "間隔越短，購買頻率越高"
    reverse: true

  # 顧客活躍度 (原 CAI - Customer Activity Index)
  cai:
    name: "顧客活躍度"
    short_name: "CAI"
    full_name: "Customer Activity Index"
    description: "綜合活躍程度指標"
    icon: "📈"
    unit: "指數"
    range: [0, 1]
    interpretation: "指數越高，客戶越活躍"

  # 過去價值 (原 PCV - Past Customer Value)
  pcv:
    name: "過去價值"
    short_name: "PCV"
    full_name: "Past Customer Value"
    description: "歷史總消費價值"
    icon: "💎"
    unit: "元"
    interpretation: "歷史價值越高，客戶越重要"

  # 顧客穩定度 (原 CRI - Customer Richness Index)
  cri:
    name: "顧客穩定度"
    short_name: "CRI"
    full_name: "Customer Richness Index"
    description: "購買穩定性評分"
    icon: "🎯"
    unit: "分數"
    interpretation: "分數越高，購買越穩定"

  # 顧客狀態 (原 NES - New/Engaged/Sleeping)
  nes:
    name: "顧客狀態"
    short_name: "NES"
    full_name: "New/Engaged/Sleeping"
    description: "客戶生命週期狀態"
    icon: "🔄"
    unit: "狀態"
    interpretation: "追蹤客戶的活躍階段"

# RFM 分析
rfm_analysis:
  # 11個RFM客群
  segments:
    champions:
      name: "Champions"
      chinese_name: "冠軍客戶"
      description: "最佳客戶，高頻高價值且最近有購買"
      criteria: "R=5, F=5, M=5"
      icon: "👑"
      color: "#28a745"
      characteristics:
        - "購買頻率最高"
        - "消費金額最大"
        - "最近仍活躍"
        - "品牌忠誠度極高"
      strategy: "給予最高等級待遇，維持關係"
      percentage_range: "5-10%"

    loyal_customers:
      name: "Loyal Customers"
      chinese_name: "忠誠客戶"
      description: "經常購買且穩定的客戶"
      criteria: "R>=3, F>=4"
      icon: "💎"
      color: "#17a2b8"
      characteristics:
        - "購買頻率高"
        - "消費穩定"
        - "關係長久"
      strategy: "提供忠誠獎勵，鼓勵推薦"
      percentage_range: "10-15%"

    potential_loyalists:
      name: "Potential Loyalists"
      chinese_name: "潛力忠誠客戶"
      description: "最近購買且有潛力成為忠誠客戶"
      criteria: "R>=4, F>=2, M>=3"
      icon: "⭐"
      color: "#ffc107"
      characteristics:
        - "最近有購買"
        - "有一定消費"
        - "培養價值高"
      strategy: "提供會員計劃，增加互動"
      percentage_range: "10-15%"

    recent_customers:
      name: "Recent Customers"
      chinese_name: "新近客戶"
      description: "最近首次購買的新客"
      criteria: "R>=4, F=1"
      icon: "🆕"
      color: "#20c997"
      characteristics:
        - "剛加入"
        - "需要培養"
        - "潛力未知"
      strategy: "提供新客優惠，建立信任"
      percentage_range: "15-20%"

    promising:
      name: "Promising"
      chinese_name: "有潛力客戶"
      description: "最近購買，消費金額可觀"
      criteria: "R>=3, F<=2, M>=4"
      icon: "💫"
      color: "#6610f2"
      characteristics:
        - "客單價高"
        - "頻率待提升"
        - "有增長潛力"
      strategy: "交叉銷售，提高頻率"
      percentage_range: "5-10%"

    need_attention:
      name: "Need Attention"
      chinese_name: "需要關注"
      description: "曾經是好客戶，但最近沒有購買"
      criteria: "R<=3, F>=3, M>=3"
      icon: "⚠️"
      color: "#fd7e14"
      characteristics:
        - "過去表現好"
        - "最近冷淡"
        - "需要喚醒"
      strategy: "發送關懷訊息，限時優惠"
      percentage_range: "5-10%"

    about_to_sleep:
      name: "About to Sleep"
      chinese_name: "即將休眠"
      description: "購買頻率下降，有流失風險"
      criteria: "R<=3, F<=3, M>=2"
      icon: "😴"
      color: "#e83e8c"
      characteristics:
        - "活躍度下降"
        - "流失徵兆"
        - "需要激活"
      strategy: "個性化優惠，重新吸引"
      percentage_range: "10-15%"

    at_risk:
      name: "At Risk"
      chinese_name: "流失風險"
      description: "曾經是忠誠客戶，現在有流失風險"
      criteria: "R<=2, F>=3, M>=3"
      icon: "🚨"
      color: "#dc3545"
      characteristics:
        - "過去價值高"
        - "長時間未購買"
        - "流失風險大"
      strategy: "緊急挽回，了解原因"
      percentage_range: "5-10%"

    cant_lose_them:
      name: "Can't Lose Them"
      chinese_name: "不能失去"
      description: "高價值客戶，但長時間未購買"
      criteria: "R<=2, F>=4, M>=5"
      icon: "💔"
      color: "#721c24"
      characteristics:
        - "歷史價值極高"
        - "流失風險極大"
        - "必須挽回"
      strategy: "最高優先級挽回，高層介入"
      percentage_range: "2-5%"

    hibernating:
      name: "Hibernating"
      chinese_name: "休眠客戶"
      description: "很久沒有購買"
      criteria: "R<=2, F<=2, M<=2"
      icon: "💤"
      color: "#6c757d"
      characteristics:
        - "長期無互動"
        - "低價值"
        - "喚醒成本高"
      strategy: "低成本喚醒嘗試"
      percentage_range: "10-15%"

    lost:
      name: "Lost"
      chinese_name: "已流失"
      description: "流失的客戶"
      criteria: "R<=1, F<=2, M<=2"
      icon: "❌"
      color: "#343a40"
      characteristics:
        - "已經流失"
        - "價值低"
        - "不建議投入"
      strategy: "記錄原因，改善產品/服務"
      percentage_range: "10-20%"

# 客戶生命週期
customer_lifecycle:
  title: "顧客狀態"
  stages:
    new_customer:
      name: "新客"
      short_name: "新客"
      full_name: "新客戶"
      description: "首次購買的客戶"
      icon: "🆕"
      color: "success"
      criteria: "購買次數 = 1"
      strategy: "建立信任，鼓勵回購"

    repeat_customer:
      name: "回購客"
      short_name: "回購客"
      full_name: "回購客戶"
      description: "有重複購買的客戶"
      icon: "🔄"
      color: "primary"
      criteria: "購買次數 >= 2 且最近購買 <= 90天"
      strategy: "提升忠誠度，增加頻率"

    dormant_customer:
      name: "沉睡客"
      short_name: "沉睡客"
      full_name: "沉睡客戶"
      description: "長時間未購買的客戶"
      icon: "😴"
      color: "warning"
      criteria: "最近購買 > 90天 且 <= 180天"
      strategy: "喚醒行動，重新激活"

    churned_customer:
      name: "流失客"
      short_name: "流失客"
      full_name: "流失客戶"
      description: "已流失的客戶"
      icon: "❌"
      color: "danger"
      criteria: "最近購買 > 180天"
      strategy: "分析原因，改善服務"

# 智慧分群
clustering:
  # 分群方法
  methods:
    kmeans:
      name: "K-means 聚類"
      description: "基於距離的快速分群方法"
      parameters:
        min_clusters: 2
        max_clusters: 8
        default_clusters: 5

    hierarchical:
      name: "階層式聚類"
      description: "建立客群樹狀結構"
      parameters:
        method: "ward.D2"
        distance_metric: "euclidean"

  # 最佳分群數
  optimal_clusters:
    title: "最佳分群數分析"
    methods:
      elbow:
        name: "肘部法則"
        description: "找出SSE下降速率變化點"
      silhouette:
        name: "輪廓係數"
        description: "評估分群品質"

  # 分群命名
  naming:
    ai_naming:
      name: "AI 智慧命名"
      description: "根據客群特徵自動生成有意義的名稱"
    manual_naming:
      name: "手動命名"
      description: "自行為每個客群命名"

# AI 增強分析
ai_analysis:
  types:
    metric_description:
      name: "指標說明"
      description: "解釋所選指標的商業意義"
      prompt_category: "dna_metric_description"
      icon: "📊"

    distribution_insight:
      name: "分布洞察"
      description: "分析指標分布的特徵和異常"
      prompt_category: "dna_distribution_insight"
      icon: "📈"

    segment_profiling:
      name: "客群畫像"
      description: "為每個客群生成詳細畫像"
      prompt_category: "dna_segment_profiling"
      icon: "👥"

    marketing_recommendations:
      name: "行銷建議"
      description: "針對不同客群的行銷策略建議"
      prompt_category: "dna_marketing_recommendations"
      icon: "💡"

    churn_prediction:
      name: "流失預警"
      description: "識別流失風險並提供挽回策略"
      prompt_category: "dna_churn_prediction"
      icon: "⚠️"

    cross_sell_opportunities:
      name: "交叉銷售機會"
      description: "發現潛在的交叉銷售機會"
      prompt_category: "cross_sell_opportunities"
      icon: "🎁"

# 屬性萃取
attribute_extraction:
  title: "DNA 屬性萃取"
  description: "從客戶行為中萃取關鍵屬性和特徵"

  methods:
    ai_extraction:
      name: "AI 自動萃取"
      description: "使用 AI 自動識別和萃取屬性"
      max_attributes: 30
      min_attributes: 5

    rule_based:
      name: "規則式萃取"
      description: "基於預定義規則萃取屬性"

  attribute_categories:
    behavioral:
      name: "行為屬性"
      description: "購買行為相關的特徵"
      examples: ["高頻購買", "夜間購物偏好", "週末購物"]

    value_based:
      name: "價值屬性"
      description: "消費價值相關的特徵"
      examples: ["高客單價", "折扣敏感", "品質導向"]

    loyalty:
      name: "忠誠度屬性"
      description: "忠誠度相關的特徵"
      examples: ["長期客戶", "品牌擁護者", "推薦者"]

# 圖表配置
charts:
  histogram_title: "分佈直方圖"

  # Chart labels for tooltips and hover text
  labels:
    value: "值"
    count: "計數"
    percentage: "百分比"

  # Chart axes titles
  axes:
    value: "值"
    count: "計數"
    frequency: "頻率"
    customer_count: "客戶數"
    nes_status: "NES 狀態"

  # Chart titles
  titles:
    distribution: "分佈圖"
    histogram: "直方圖"
    nes_distribution: "NES 狀態分佈"

  # 指標分布直方圖
  metric_histogram:
    title: "{metric} 分布"
    x_axis: "{metric}"
    y_axis: "客戶數"
    tooltip: "{bin}: {count} 位客戶"

  # 散點圖
  scatter_plot:
    title: "{x_metric} vs {y_metric}"
    x_axis: "{x_metric}"
    y_axis: "{y_metric}"
    tooltip: "客戶 {id}: {x}={x_value}, {y}={y_value}"

  # 分群結果散點圖
  clustering_scatter:
    title: "客戶分群結果"
    x_axis: "維度 1"
    y_axis: "維度 2"
    tooltip: "客群 {segment}: {count} 位客戶"

  # RFM 熱力圖
  rfm_heatmap:
    title: "RFM 分布熱力圖"
    x_axis: "Frequency (F)"
    y_axis: "Recency (R)"
    color: "Monetary (M)"
    tooltip: "R={r}, F={f}, M={m}: {count} 位客戶"

  # 客群特徵雷達圖
  segment_radar:
    title: "客群特徵雷達圖"
    dimensions: ["M", "R", "F", "IPT", "CAI", "PCV", "CRI"]
    tooltip: "{segment} - {dimension}: {value}"

  # 生命週期分布
  lifecycle_pie:
    title: "客戶生命週期分布"
    tooltip: "{stage}: {count} 位 ({percentage}%)"

  # 肘部法則圖
  elbow_chart:
    title: "最佳分群數分析（肘部法則）"
    x_axis: "分群數"
    y_axis: "SSE（組內平方和）"
    tooltip: "{k} 個群: SSE = {sse}"

  # 輪廓係數圖
  silhouette_chart:
    title: "最佳分群數分析（輪廓係數）"
    x_axis: "分群數"
    y_axis: "平均輪廓係數"
    tooltip: "{k} 個群: 係數 = {score}"

# 單位文字
units:
  days: "天"
  times: "次"
  people: "人"

