  clustering: "智慧分群會自動找出相似的客戶群體。建議使用AI命名功能，會根據每個群體的特徵生成有意義的名稱。"
  rfm_segments: "RFM客群是業界標準的客戶分類方式。關注冠軍客戶和流失風險客戶，制定差異化策略。"
