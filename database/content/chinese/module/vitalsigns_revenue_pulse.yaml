# AI 洞察內容（擴展ai_analysis section）
ai_insights:
  # GPT prompts
  prompts:
    revenue_summary:
      system: "分析以下營收數據並提供戰略洞察："
      metrics_template: |
        - 總營收: ${total_revenue}
        - 客戶數: {customer_count}
        - ARPU: ${arpu}
        - 平均 CLV: ${clv}
        - AOV: ${aov}
        - 營收一致性: {consistency}%
        - Pareto 分析: {pareto_pct}% 客戶貢獻 80% 營收
      request: "請提供：1) 整體營收健康度評估 2) 關鍵發現 3) 優化建議"

  # Fallback content (when GPT disabled or fails)
  fallback:
    revenue_summary:
      title: "📊 營收概況"
      template_line1: "✓ 總營收: ${total_revenue}"
      template_line2: "✓ {customer_count} 位客戶"
      template_line3: "✓ 人均貢獻: ${arpu}"
      high_consistency: "✅ 營收穩定度高，客戶消費行為一致"
      medium_consistency: "⚠️ 營收波動適中，建議加強高價值客戶經營"
      low_consistency: "🔴 營收波動較大，需優化客戶結構"

    arpu_analysis:
      title: "💰 ARPU 深度分析"
      line1: "人均購買金額: ${arpu}"
      line2: "高價值客戶平均: ${high_value_avg}"
      line3: "低價值客戶平均: ${low_value_avg}"
      recommendations_title: "💡 建議："
      rec1: "對高價值客戶提供 VIP 專屬服務"
      rec2: "中價值客戶推動升級方案"
      rec3: "低價值客戶激活促銷活動"

    clv_recommendations:
      title: "📈 CLV 提升策略"
      line1: "當前平均 CLV: ${clv}"
      line2: "AOV: ${aov}"
      line3: "回購率: {purchase_frequency} 次/人"
      optimization_title: "🎯 優化方向："
      opt1: "1. 提升 AOV：捆綁銷售、滿額贈品"
      opt2: "2. 增加購買頻率：會員計劃、定期優惠"
      opt3: "3. 延長客戶生命週期：忠誠度獎勵、售後服務"

    consistency_analysis:
      title: "⚖️ 營收穩定度分析"
      score_line: "一致性分數: {score}%"
      cv_line: "變異係數: {cv}"
      excellent_level: "✅ 優秀：營收表現穩定，客戶基礎扎實"
      excellent_advice: "建議：保持當前策略，持續優化"
      good_level: "⚠️ 良好：營收波動適中"
      good_advice_title: "建議："
      good_advice1: "- 分析高波動客戶特徵"
      good_advice2: "- 建立客戶分級管理"
      good_advice3: "- 平衡新客與老客投入"
      poor_level: "🔴 需改善：營收波動大"
      poor_advice_title: "建議："
      poor_advice1: "- 多元化客戶來源"
      poor_advice2: "- 減少對單一大客戶依賴"
      poor_advice3: "- 建立預警機制"

  # Empty state messages
  empty_state:
    default: "點擊「生成 AI 洞察」按鈕以查看分析"
    processing: "分析中..."
