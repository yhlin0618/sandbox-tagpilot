# ==========================================
# VitalSigns - Revenue Pulse Module Language Content (Chinese)
# ==========================================
# 營收脈能分析模組語言內容（中文）
# Version: 1.0.0
# Last Updated: 2025-10-11

# 模組基本資訊
title: "營收脈能分析"
subtitle: "量化收入規模、單客價值與獲利韌性"
description: "評估營收健康度、分析價值分布、識別高貢獻客戶、優化獲利結構"

# UI 區塊
ui:
  sections:
    overview: "營收概覽"
    revenue_metrics: "核心指標"
    consistency_score: "營收穩定度評分"
    revenue_distribution: "營收分布"
    pareto_analysis: "Pareto 80/20 法則"
    revenue_segments: "客戶營收分群"
    arpu_analysis: "客單價分析"
    clv_segments: "CLV 客群分析"
    clv_distribution: "顧客終生價值分布"
    revenue_trends: "營收趨勢"
    contribution_analysis: "貢獻度分析"
    top_customers: "高價值客戶排名"
    metrics_table: "營收指標明細"
    ai_insights: "AI 洞察"

  # 標籤
  labels:
    consistency_label: "一致性分數"
    stability_interpretation: "穩定度解讀"

  # 按鈕
  buttons:
    calculate_metrics: "計算指標"
    analyze_pareto: "分析 Pareto"
    segment_clv: "CLV 分群"
    generate_insights: "生成 AI 洞察"
    export_analysis: "匯出分析報告"
    download_segments: "下載客戶名單"
    download_full_list: "下載完整客戶名單"
    download_revenue_list: "下載完整客戶營收清單"

# 指標定義
metrics:
  # 核心營收指標
  total_revenue:
    name: "總銷售額"
    short_name: "銷售額"
    description: "所有交易的總金額"
    icon: "dollar-sign"
    unit: "元"
    color: "primary"

  arpu:
    name: "人均購買金額 (ARPU)"
    short_name: "ARPU"
    full_name: "Average Revenue Per User"
    description: "平均每位客戶貢獻的營收"
    icon: "user-dollar"
    unit: "元"
    color: "success"
    formula: "總營收 / 客戶數"

  clv:
    name: "平均顧客終生價值 (CLV)"
    short_name: "CLV"
    full_name: "Customer Lifetime Value"
    description: "客戶在整個生命週期內貢獻的總價值"
    icon: "chart-line"
    unit: "元"
    color: "info"
    formula: "ARPU × 購買頻率 × 客戶壽命"

  aov:
    name: "平均訂單價值 (AOV)"
    short_name: "AOV"
    full_name: "Average Order Value"
    description: "每筆訂單的平均金額"
    icon: "shopping-cart"
    unit: "元"
    color: "warning"
    formula: "總營收 / 訂單數"

  consistency_score:
    name: "營收穩定度"
    short_name: "穩定度"
    description: "營收一致性和可預測性評分"
    icon: "heartbeat"
    unit: "分"
    color: "success"
    range: "0-100"

# 營收穩定度
consistency:
  # 穩定度等級
  levels:
    excellent:
      name: "極佳"
      min_score: 80
      color: "success"
      icon: "💚"
      interpretation: "營收非常穩定，業務健康"

    good:
      name: "良好"
      min_score: 60
      color: "primary"
      icon: "💙"
      interpretation: "營收較為穩定，略有波動"

    moderate:
      name: "中等"
      min_score: 40
      color: "warning"
      icon: "💛"
      interpretation: "營收波動明顯，需要關注"

    poor:
      name: "不佳"
      min_score: 0
      color: "danger"
      icon: "❤️"
      interpretation: "營收不穩定，風險較高"

  # 評估維度
  dimensions:
    revenue_stability:
      name: "營收波動性"
      description: "營收變異係數（CV）"
      weight: 0.4

    growth_consistency:
      name: "成長一致性"
      description: "成長率的穩定程度"
      weight: 0.3

    customer_concentration:
      name: "客戶集中度"
      description: "營收來源的分散程度"
      weight: 0.3

# Pareto 分析
pareto:
  # 80/20 法則
  rule_8020:
    name: "Pareto 80/20 法則"
    description: "80% 的營收來自 20% 的客戶"
    interpretation: "識別高價值客戶，優化資源配置"

  # 客群分類
  segments:
    top_20:
      name: "高價值客戶（前20%）"
      short_name: "Top 20%"
      description: "貢獻最多營收的客戶群"
      color: "success"
      icon: "👑"
      typical_contribution: "70-90%"

    middle_60:
      name: "中價值客戶（中間60%）"
      short_name: "Middle 60%"
      description: "貢獻中等營收的客戶群"
      color: "primary"
      icon: "⭐"
      typical_contribution: "10-25%"

    bottom_20:
      name: "低價值客戶（後20%）"
      short_name: "Bottom 20%"
      description: "貢獻最少營收的客戶群"
      color: "warning"
      icon: "👤"
      typical_contribution: "0-5%"

  # Pareto 指標
  metrics:
    pareto_ratio:
      name: "Pareto 比率"
      description: "前20%客戶的營收占比"
      ideal_range: "70-80%"

    concentration_index:
      name: "集中度指數"
      description: "營收集中程度的量化指標"
      interpretation: "越高表示越集中於少數客戶"

# CLV 分群
clv_segments:
  # 依 CLV 分群
  tiers:
    platinum:
      name: "白金客戶"
      description: "最高價值的客戶群"
      color: "#E5E4E2"
      icon: "💎"
      percentile: "前10%"
      strategy: "頂級服務，全力維護"

    gold:
      name: "黃金客戶"
      description: "高價值客戶群"
      color: "#FFD700"
      icon: "🥇"
      percentile: "10-25%"
      strategy: "優質服務，積極提升"

    silver:
      name: "白銀客戶"
      description: "中等價值客戶群"
      color: "#C0C0C0"
      icon: "🥈"
      percentile: "25-75%"
      strategy: "標準服務，持續培養"

    bronze:
      name: "銅牌客戶"
      description: "基礎價值客戶群"
      color: "#CD7F32"
      icon: "🥉"
      percentile: "75-100%"
      strategy: "基礎服務，選擇性投入"

  # CLV 計算方法
  calculation:
    simple:
      name: "簡化法"
      formula: "平均購買價值 × 購買頻率 × 客戶壽命"
      use_case: "快速估算"

    cohort_based:
      name: "同期群法"
      formula: "基於實際同期群的累積營收"
      use_case: "精確計算"

    predictive:
      name: "預測法"
      formula: "歷史資料 + 流失率預測"
      use_case: "未來價值估算"

# 營收趨勢
revenue_trends:
  # 趨勢類型
  types:
    time_series:
      name: "時間序列趨勢"
      description: "營收隨時間變化的趨勢"

    moving_average:
      name: "移動平均"
      description: "平滑後的趨勢線"
      periods: [7, 14, 30]

    growth_rate:
      name: "成長率趨勢"
      description: "營收成長率的變化"

  # 期間比較
  comparisons:
    mom:
      name: "月比較 (MoM)"
      description: "與上月比較"

    yoy:
      name: "年比較 (YoY)"
      description: "與去年同期比較"

    cumulative:
      name: "累積比較"
      description: "累積營收比較"

# 貢獻度分析
contribution:
  # 貢獻度指標
  metrics:
    revenue_contribution:
      name: "營收貢獻度"
      description: "個別客戶或客群的營收占比"
      unit: "%"

    transaction_contribution:
      name: "交易貢獻度"
      description: "交易次數的占比"
      unit: "%"

    customer_share:
      name: "客戶占比"
      description: "客戶數量的占比"
      unit: "%"

  # 貢獻度分析類型
  analysis_types:
    by_customer:
      name: "按客戶分析"
      description: "個別客戶的營收貢獻"

    by_segment:
      name: "按客群分析"
      description: "不同客群的營收貢獻"

    by_period:
      name: "按時間分析"
      description: "不同時期的營收貢獻"

# 圖表配置
charts:
  # 客單價比較圖 (AOV Comparison)
  aov_comparison:
    title: "客單價分析"
    subtitle: "不同客群平均客單價比較"
    categories:
      overall: "全體平均"
      new: "新客"
      core: "主力客"
    x_axis: "客戶類型"
    y_axis: "平均客單價 ($)"
    hover_label: "平均客單價"

  # CLV 分布散點圖 (CLV Distribution)
  clv_distribution:
    title: "顧客終生價值分布 (80/20法則)"
    subtitle: "CLV 分布 (80/20法則)"
    segments:
      high: "高價值客戶"
      mid: "中價值客戶"
      low: "低價值客戶"
    x_axis: "客戶分群"
    y_axis: "顧客終生價值 ($)"
    x_labels:
      low: "低價值\n(Bottom 20%)"
      mid: "中價值\n(Middle 60%)"
      high: "高價值\n(Top 20%)"
    legend:
      median: "中位數"
      mean: "平均值"
    annotations:
      note: "📊 高價值客戶貢獻 80% 營收 | 🔶 中位數 | 🔹 平均值 | 灰色區域: 四分位範圍 (Q1-Q3)"

  # 收入趨勢圖 (Revenue Trend)
  revenue_trend:
    title: "收入成長曲線"
    no_data: "收入趨勢分析需要時間序列數據\n請確保上傳資料包含詳細交易時間"

  # 營收分布直方圖
  revenue_distribution_chart:
    title: "營收分布"
    x_axis: "營收區間"
    y_axis: "客戶數"
    tooltip: "{range}: {count} 位客戶"

  # Pareto 曲線圖
  pareto_curve_chart:
    title: "Pareto 曲線（累積營收占比）"
    x_axis: "累積客戶比例 (%)"
    y_axis: "累積營收比例 (%)"
    reference_line: "80/20 基準線"
    tooltip: "前 {customer_pct}% 客戶貢獻 {revenue_pct}% 營收"

  # CLV 分群餅圖
  clv_segments_pie:
    title: "CLV 客群分布"
    tooltip: "{segment}: {count} 位 ({percentage}%)"

  # 營收趨勢圖
  revenue_trend_chart:
    title: "營收趨勢"
    x_axis: "時間"
    y_axis: "營收金額"
