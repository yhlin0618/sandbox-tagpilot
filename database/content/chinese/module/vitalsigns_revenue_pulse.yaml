  # ARPU 趨勢圖
  arpu_trend_chart:
    title: "ARPU 趨勢"
    x_axis: "時間期間"
    y_axis: "ARPU 金額"
    tooltip: "{period}: NT${arpu}"

  # 貢獻度堆疊圖
  contribution_stack_chart:
    title: "客群營收貢獻度"
    x_axis: "時間期間"
    y_axis: "營收占比 (%)"
    tooltip: "{segment} in {period}: {percentage}%"

