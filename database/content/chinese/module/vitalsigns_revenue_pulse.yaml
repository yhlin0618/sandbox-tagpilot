# AI 分析類型
ai_analysis:
  types:
    revenue_health:
      name: "營收健康度評估"
      description: "綜合評估營收規模、成長性和穩定性"
      prompt_category: "revenue_health"

    pareto_insights:
      name: "Pareto 洞察"
      description: "分析高價值客戶特徵和維護策略"
      prompt_category: "pareto_insights"

    clv_optimization:
      name: "CLV 優化建議"
      description: "提升客戶終生價值的策略建議"
      prompt_category: "clv_optimization"

    revenue_forecasting:
      name: "營收預測與建議"
      description: "基於趨勢的營收預測和優化建議"
      prompt_category: "revenue_forecasting"

# 說明文字
help:
  overview: |
    營收脈能分析模組幫助您量化收入健康度，識別高價值客戶。
    透過 Pareto 分析和 CLV 分群，優化資源配置和獲利結構。

  core_metrics: |
    核心營收指標說明：

    1. 總銷售額：所有交易的總金額，反映業務規模

    2. ARPU（人均購買金額）：
       - 計算：總營收 / 客戶數
       - 意義：平均每位客戶的貢獻
       - 用途：評估客戶價值和定價策略

    3. CLV（顧客終生價值）：
       - 計算：ARPU × 購買頻率 × 客戶壽命
       - 意義：客戶長期價值
       - 用途：指導獲客成本和投資決策

    4. AOV（平均訂單價值）：
       - 計算：總營收 / 訂單數
       - 意義：單次購買金額
       - 用途：優化產品組合和促銷策略

  consistency_score: |
    營收穩定度評分：
    綜合評估營收的一致性和可預測性（0-100分）

    評估維度：
    1. 營收波動性 (40%)：變異係數越小越穩定
    2. 成長一致性 (30%)：成長率穩定程度
    3. 客戶集中度 (30%)：營收來源分散程度

    分數解讀：
    - 80分以上：極佳，業務非常健康
    - 60-79分：良好，略有波動
    - 40-59分：中等，波動明顯
    - 40分以下：不佳，風險較高

  pareto_analysis: |
    Pareto 80/20 法則分析：

    基本概念：
    - 通常80%的營收來自20%的客戶
    - 識別高價值客戶是關鍵

    三個客群：
    1. 前20%（Top Performers）：
       - 貢獻70-90%營收
       - 需要頂級服務和全力維護

    2. 中間60%（Mid-tier）：
       - 貢獻10-25%營收
       - 有提升潛力，值得培養

    3. 後20%（Low Value）：
       - 貢獻0-5%營收
       - 基礎服務，選擇性投入

    應用建議：
    - 優先配置資源給高價值客戶
    - 制定差異化的服務策略
    - 持續監控客群變化

  clv_segments: |
    CLV 客群分析：
    根據客戶終生價值分為四個等級：

    1. 白金客戶（前10%）：
       - 最高價值客群
       - 策略：頂級服務，全力維護

    2. 黃金客戶（10-25%）：
       - 高價值客群
       - 策略：優質服務，積極提升

    3. 白銀客戶（25-75%）：
       - 中等價值客群
       - 策略：標準服務，持續培養

    4. 銅牌客戶（75-100%）：
       - 基礎價值客群
       - 策略：基礎服務，選擇性投入

  best_practices: |
    分析建議：
    1. 定期追蹤核心營收指標變化
    2. 維護Pareto法則的健康平衡（不要過度集中）
    3. 重點投資高CLV客戶
    4. 提升ARPU和AOV以增加總營收
    5. 監控營收穩定度，降低業務風險
    6. 利用AI洞察制定精準的營收優化策略

# 提示文字
hints:
  total_revenue: "總營收是所有客戶交易金額的總和，反映業務規模"
  arpu: "ARPU 是平均每位客戶貢獻的營收，越高代表客戶價值越高"
  clv: "CLV 代表客戶在生命週期內的總價值，用於評估長期投資回報"
  consistency_score: "穩定度分數越高表示營收越可預測，業務風險越低。若分數過低，建議分散營收來源。"
  consistency: "交易穩定度反映客戶購買行為的一致性，越高越穩定"
  revenue_distribution: "營收分布反映客戶價值的差異。理想情況下應呈現長尾分布，即少數高價值客戶和多數中低價值客戶。"
  pareto: "Pareto 分析幫助識別高價值客戶，維護這些客戶是維持營收的關鍵"
  pareto_curve: "曲線越陡峭表示營收越集中。若曲線過陡（前20%貢獻超過90%），表示過度依賴少數客戶，風險較高。"
  clv_segments: "CLV分群可幫助制定差異化策略。白金和黃金客戶應獲得最多資源和關注。"
  revenue_trends: "關注趨勢而非單一數值。持續上升的趨勢表示業務健康成長。"

