  # 成功訊息
  success:
    metrics_calculated: "✅ 營收指標計算完成"
    pareto_analyzed: "✅ Pareto 分析完成"
    clv_segmented: "✅ CLV 分群完成"
    insights_generated: "✅ AI 洞察已生成"

  # 處理中
  processing:
    calculating_metrics: "計算營收指標中..."
    analyzing_distribution: "分析營收分布中..."
    segmenting_customers: "客戶分群中..."
    analyzing_trends: "分析趨勢中..."

  # 錯誤訊息
  error:
    insufficient_data: "❌ 資料不足，無法進行營收分析"
