# チャート解説
chart_interpretation:
  title: "📊 チャート解釈ガイド"
  overview: "このチャートは各製品属性の成長機会を可視化し、最も価値のある改善領域を特定するのに役立ちます。"

  axes_explanation:
    title: "軸の説明："
    x_axis: "• **X軸（成長ポテンシャル）**：現在のパフォーマンスから理想レベルまでの改善余地を表します。値が高いほど改善の可能性が大きいことを示します。"
    y_axis: "• **Y軸（市場重要度）**：その属性が全体的な市場競争力に与える影響を示します。値が高いほど消費者がその属性を重視していることを意味します。"

  bubble_explanation:
    title: "バブルの解釈："
    size: "• **バブルサイズ**：「トラックスコア」（成長ポテンシャル × 市場重要度）を表します。バブルが大きいほどROIが高いことを示します。"
    color: "• **バブルカラー**：濃い青から黄色へ - 明るい色ほど大きな機会を示します。"
    position: "• **バブルポジション**：属性は4つの象限に分かれ、それぞれ異なる戦略的推奨事項を表します。"

  quadrants:
    title: "象限戦略："
    high_potential: "• **高ポテンシャルトラック（右上）**：高成長 + 高重要度 = 最優先投資で最大の競争優位性を獲得"
    mature: "• **成熟トラック（左上）**：低成長 + 高重要度 = リーダーシップポジションを維持し、競合他社の追い上げを防ぐ"
    niche: "• **ニッチトラック（右下）**：高成長 + 低重要度 = 差別化機会でユニークなセリングポイントを創出"
    low_priority: "• **低優先度トラック（左下）**：低成長 + 低重要度 = 最小限のリソース配分で基本レベルを維持"

  how_to_use: "**使い方**：右上象限（高ポテンシャルトラック）の属性に注目してください - これらは最高のROIを提供します。また、左上象限（成熟トラック）の属性にも注意を払い、既存の優位性を維持してください。"
