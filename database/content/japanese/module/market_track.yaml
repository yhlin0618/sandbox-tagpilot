# ヘルプテキスト
help:
  overview: |
    BrandEdge ブランドインプリントエンジンは、エンタープライズグレードのブランドポジショニング分析プラットフォームです。
    AIによる顧客レビューの深層分析を通じて、包括的なブランド戦略の提案を提供します。

  workflow: |
    分析ワークフロー：
    1. レビューデータのアップロード - ブランドレビューを含むExcelまたはCSVファイルをアップロード
    2. 属性抽出 - AIがレビューから10-30の主要な製品属性を自動抽出
    3. 属性スコアリング - システムが各レビューのすべての属性をスコアリング（1-5スケール）
    4. 分析実行 - 実行する分析モジュールを選択し、戦略レポートを生成

  attributes_extraction: |
    属性抽出の詳細：
    - システムがレビューから消費者が注目する製品属性を自動抽出
    - 10-30個の属性を選択（15個を推奨）
    - 抽出には約2-5分かかります
    - 重複および無関係な属性を自動的に削除

  attributes_scoring: |
    属性スコアリングの詳細：
    - システムが各レビューのすべての属性をスコアリング（1-5スケール）
    - レビュー内の属性に関する肯定的/否定的な記述に基づいてスコアリング
    - スコアリング時間はレビュー数と属性数に依存
    - 効率向上のためバッチ処理をサポート

  analysis_modules: |
    8つのコア分析モジュール：
    1. 市場プロファイル - 市場セグメンテーションと顧客分析
    2. 市場トラック - 成長機会の特定と戦略的優先順位
    3. DNA分析 - ブランドDNAレーダーチャートと競争力評価
    4. 主要要因 - 成功要因の特定
    5. 理想点 - 目標達成度分析
    6. 戦略ポジショニング - 4象限戦略提案
    7. ブランドアイデンティティ - 差別化分析
    8. AIインサイト - 包括的戦略レポート

  # 市場トラック指標説明
  indicators_title: "指標説明"

  growth_potential:
    title: "成長ポテンシャル"
    description: "現在のパフォーマンスから理想レベルまでの改善余地を表します。"
    range_80_100: "• 80-100%：非常に大きな改善余地があり、重要な成長機会"
    range_50_80: "• 50-80%：中程度の改善余地があり、積極的なリソース投資に値する"
    range_20_50: "• 20-50%：改善余地が限られており、投資効果の評価が必要"
    range_0_20: "• 0-20%：理想状態に近く、現状維持で十分"

  market_importance:
    title: "市場重要度"
    description: "この属性が全体的な市場競争力に与える影響度を反映します。"
    level_100: "• 100%：重要な属性で、ブランドの成否に直接影響"
    level_50: "• 50%：重要な属性で、ブランドパフォーマンスに顕著な影響"
    note: "• 数値が高いほど、消費者がこの属性を重視していることを示す"

  quadrant:
    title: "4象限の解釈"
    high_potential: "• 高ポテンシャルトラック（右上）：高成長ポテンシャル+高重要度 = 最優先投資"
    mature: "• 成熟トラック（左上）：低成長ポテンシャル+高重要度 = リーディング優位性を維持"
    niche: "• ニッチトラック（右下）：高成長ポテンシャル+低重要度 = 差別化機会"
    low_priority: "• 低優先度トラック（左下）：低成長ポテンシャル+低重要度 = 最小限のリソース配分"

