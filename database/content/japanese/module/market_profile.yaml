# ヘルプテキスト
help:
  overview: |
    BrandEdge ブランドインプリントエンジンは、エンタープライズグレードのブランドポジショニング分析プラットフォームです。
    AIによる顧客レビューの深層分析を通じて、包括的なブランド戦略の提案を提供します。

  workflow: |
    分析ワークフロー：
    1. レビューデータのアップロード - ブランドレビューを含むExcelまたはCSVファイルをアップロード
    2. 属性抽出 - AIがレビューから10-30の主要な製品属性を自動抽出
    3. 属性スコアリング - システムが各レビューのすべての属性をスコアリング（1-5スケール）
    4. 分析実行 - 実行する分析モジュールを選択し、戦略レポートを生成

  attributes_extraction: |
    属性抽出の詳細：
    - システムがレビューから消費者が注目する製品属性を自動抽出
    - 10-30個の属性を選択（15個を推奨）
    - 抽出には約2-5分かかります
    - 重複および無関係な属性を自動的に削除

  attributes_scoring: |
    属性スコアリングの詳細：
    - システムが各レビューのすべての属性をスコアリング（1-5スケール）
    - レビュー内の属性に関する肯定的/否定的な記述に基づいてスコアリング
    - スコアリング時間はレビュー数と属性数に依存
    - 効率向上のためバッチ処理をサポート

  analysis_modules: |
    8つのコア分析モジュール：
    1. 市場プロファイル - 市場セグメンテーションと顧客分析
    2. 市場トラック - 成長機会の特定と戦略的優先順位
    3. DNA分析 - ブランドDNAレーダーチャートと競争力評価
    4. 主要要因 - 成功要因の特定
    5. 理想点 - 目標達成度分析
    6. 戦略ポジショニング - 4象限戦略提案
    7. ブランドアイデンティティ - 差別化分析
    8. AIインサイト - 包括的戦略レポート

