# ==========================================
# BrandEdge - ポジショニング戦略モジュール（日本語）
# ==========================================
# Version: 1.0
# Last Updated: 2025-10-08

# モジュール情報
title: "ポジショニング戦略"
subtitle: "4象限戦略分析"
description: "ブランド属性のパフォーマンスに基づいた戦略的ポジショニング提案"

# UI テキスト
ui:
  # データなし状態
  no_data:
    title: "ポジショニング戦略分析"
    message: "ポジショニング戦略分析を行うには、まずレビューデータをアップロードしてください"
    upload_button: "データアップロードへ"

  # 選択コントロール
  select_variation:
    label: "Variation を選択"
    placeholder: "分析するブランドを選択してください"

  # ボタン
  buttons:
    run_strategy: "戦略探索"

  # チャートタイトル
  chart:
    title: "戦略的ポジショニング4象限図"
    subtitle: "重要属性と非重要属性に基づく戦略提案"

# 象限ラベル
quadrants:
  appeal: "訴求"        # 右上：重要属性かつ平均以上
  change: "改変"        # 右下：重要属性だが平均以下
  improve: "改善"       # 左上：非重要属性だが平均以上
  weakness: "弱点"      # 左下：非重要属性かつ平均以下

# 象限の説明
quadrant_descriptions:
  appeal: "重要な強み属性 - 継続して強化し主要な訴求点として使用すべき"
  change: "重要な弱点属性 - 競争力を高めるため優先的に改善が必要"
  improve: "非重要な強み属性 - 差別化の優位性に転換することを検討"
  weakness: "非重要な弱点属性 - 優先度が低く、リソースが限られている場合は延期可能"

# 戦略提案
strategy_recommendations:
  appeal:
    title: "訴求戦略"
    description: "これらはブランドの核心的強みであり、以下を行うべき："
    actions:
      - "マーケティングコミュニケーションでこれらの属性を強調"
      - "リーディングポジションを維持するための継続的投資"
      - "ブランドポジショニングの主要な柱として使用"

  change:
    title: "改変戦略"
    description: "これらは改善が必要な重要分野であり、以下を行うべき："
    actions:
      - "改善のためのリソース配分を優先"
      - "競合他社の成功事例を研究"
      - "明確な改善目標とタイムラインを設定"

  improve:
    title: "改善戦略"
    description: "これらは潜在的な差別化の機会であり、以下を行うべき："
    actions:
      - "競争優位性に転換できるか評価"
      - "市場ニーズと組み合わせてこれらの属性を強化することを検討"
      - "差別化を生み出すための選択的投資"

  weakness:
    title: "弱点管理"
    description: "これらは優先度の低い分野であり、以下を行うべき："
    actions:
      - "基本レベルの維持で十分"
      - "過剰投資を避ける"
      - "リソースの可用性に基づいて改善するか決定"

# メッセージテキスト
messages:
  # ナビゲーションメッセージ
  redirect_to_upload: "サイドバーから「データアップロード」ページを選択してください"

  # 成功メッセージ
  success:
    analysis_completed: "✅ ポジショニング戦略分析が完了しました"
    quadrant_generated: "✅ 4象限図が生成されました"

  # エラーメッセージ
  error:
    no_data: "❌ データが見つかりません"
    no_variation_selected: "❌ 分析する Variation を選択してください"
    no_key_factors: "❌ 重要要因の定義がありません"
    calculation_failed: "❌ 計算に失敗しました: {error}"
    api_failed: "❌ API呼び出しに失敗しました"

  # 処理中メッセージ
  processing:
    analyzing_strategy: "戦略分析中..."

  # 情報メッセージ
  info:
    calculating: "4象限の分布を計算中..."
    generating_chart: "戦略チャートを生成中..."
    click_strategy_button: "戦略分析がまだ生成されていません。「戦略探索」をクリックして分析してください。"

# チャート要素
chart_elements:
  axis_labels:
    horizontal: "属性の重要度"
    vertical: "パフォーマンスレベル"

  dividers:
    horizontal: "平均パフォーマンスレベル"
    vertical: "重要/非重要の境界"

# 統計情報
stats:
  total_attributes: "総属性数"
  key_attributes: "重要属性数"
  non_key_attributes: "非重要属性数"
  appeal_count: "訴求属性数"
  change_count: "改変属性数"
  improve_count: "改善属性数"
  weakness_count: "弱点属性数"

# ヘルプテキスト
help:
  overview: |
    ポジショニング戦略4象限分析は、ブランド属性を4つのタイプに分類します：

    1. 訴求（右上）：重要属性で優れたパフォーマンス
       → ブランドの核心的強み、継続して強化すべき

    2. 改変（右下）：重要属性だが低いパフォーマンス
       → 競争力を高めるため優先的に改善が必要

    3. 改善（左上）：非重要属性だが優れたパフォーマンス
       → 差別化の優位性に転換することを検討

    4. 弱点（左下）：非重要属性かつ低いパフォーマンス
       → 優先度が低く、リソースが限られている場合は延期可能

  interpretation: |
    戦略の解釈：

    - 横軸：属性が重要要因かどうか
    - 縦軸：その属性におけるブランドのパフォーマンスレベル
    - 境界線：高/低パフォーマンスの境界としての平均値

    推奨優先順位：改変 > 訴求 > 改善 > 弱点

  usage: |
    使用方法：

    1. 分析するブランド（Variation）を選択
    2. システムが各属性の平均パフォーマンスを自動計算
    3. 重要要因の定義とパフォーマンスレベルに基づいて4象限に配分
    4. 戦略提案を参考にしてアクションプランを策定

# 設定情報
config:
  plot_height: "800px"
  font_size:
    title: 15
    attribute: 14
  colors:
    appeal: "#28a745"      # 緑
    change: "#dc3545"      # 赤
    improve: "#ffc107"     # 黄
    weakness: "#6c757d"    # 灰
    divider: "#000000"     # 黒
