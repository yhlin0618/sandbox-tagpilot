# 列の説明
column_descriptions:
  review:
    title: "📋 レビューデータ列の説明"
    columns:
      - name: "Variation"
        type: "文字列"
        required: true
        description: "商品/ブランド識別子（例：Amazon ASIN、ブランド名）"
      - name: "ASIN"
        type: "文字列"
        required: false
        description: "Amazon標準識別番号（オプション、Variationの代わりに使用可能）"
      - name: "Title"
        type: "文字列"
        required: true
        description: "レビュータイトル；簡潔な要約；推奨長さ10〜100文字"
      - name: "Body"
        type: "文字列"
        required: true
        description: "レビュー内容；完全な使用体験の説明；推奨長さ50〜1000文字"
    note: "⚡ 列名は大文字小文字を区別しません：システムはvariation、Variation、VARIATIONなどを自動認識します"
  sales:
    title: "📋 販売データ列の説明"
    columns:
      - name: "Variation"
        type: "文字列"
        required: true
        description: "商品/ブランド識別子（レビューデータのVariationと一致する必要があります）"
      - name: "ASIN"
        type: "文字列"
        required: false
        description: "Amazon標準識別番号（オプション、Variationの代わりに使用可能）"
      - name: "Sales"
        type: "数値"
        required: true
        description: "販売数量"
      - name: "payment_time"
        type: "日付"
        required: false
        description: "取引日（オプション、形式：YYYY-MM-DD）"
      - name: "price"
        type: "数値"
        required: false
        description: "商品単価（オプション）"
    note: "⚡ 販売データのVariationは、正確な結合分析のためにレビューデータと一致する必要があります"

tabs:
  review_preview: "レビューデータプレビュー"
  sales_preview: "販売データプレビュー"

