# 説明テキスト
help:
  step1: "ステップ1："
  step1_desc: "分析したい顧客タグをクリックしてください。例えば、購入金額をクリックできます。"
  step2: "ステップ2："
  step2_desc: "分析ツールをクリックしてください。例えば、顧客セグメンテーションを実行をクリックできます。"
  step3: "ステップ3："
  step3_desc: "表示オプションをクリックしてください。例えば、統計グラフをクリックできます。"
  repeat_steps: "上記の手順を繰り返してください。例えば、顧客の最近の来店時間を確認したい場合は、上記の手順を繰り返して分析結果とAIマーケティング提案を表示できます。"

  overview: |
    顧客DNA分析は最も包括的な顧客分析モジュールで、以下を提供します：
    - 7次元の顧客DNA指標
    - スマートセグメント化とセグメント命名
    - 11種類のRFMセグメントプロファイル
    - AI駆動のインサイトと推奨事項

  dna_metrics: |
    7つのDNA次元の説明：

    1. M（Monetary）- 総消費金額、顧客価値を反映
    2. R（Recency）- 最後の購入からの日数、アクティビティレベルを反映
    3. F（Frequency）- 購入回数、ロイヤリティを反映
    4. IPT（Inter-Purchase Time）- 平均購入間隔、購入サイクルを反映
    5. CAI（Customer Activity Index）- 総合アクティビティ指標
    6. PCV（Past Customer Value）- 履歴総価値
    7. CRI（Customer Richness Index）- 購入安定性スコア

  clustering: |
    スマートセグメント化：
    - K-meansまたは階層的クラスタリングを使用
    - 最適クラスタ数を自動的に見つける
    - AIスマートセグメント命名
    - セグメント特徴プロファイルを生成

    セグメント化は以下に役立ちます：
    - 類似の顧客グループを識別
    - 差別化戦略を開発
    - 精密マーケティング展開
    - リソース配分を最適化

  rfm_segments: |
    11種類のRFMセグメント：

    高価値セグメント：
    1. Champions（チャンピオン）：最高の顧客
    2. Loyal Customers（ロイヤル顧客）：安定した高価値
    3. Can't Lose Them（失えない）：高価値だがチャーンリスク

    成長可能性セグメント：
    4. Potential Loyalists（潜在ロイヤル）：育成可能
    5. Promising（有望）：高注文価値
    6. Recent Customers（新規顧客）：新規顧客

    要注意セグメント：
    7. Need Attention（要注意）：冷却中
    8. About to Sleep（スリープ寸前）：アクティビティ低下
    9. At Risk（リスク）：高チャーンリスク

    低価値セグメント：
    10. Hibernating（休眠）：長期間インタラクションなし
    11. Lost（離脱）：すでにチャーン

  ai_analysis: |
    AI強化分析：
    GPT-4を活用してスマートインサイトを提供：
    - 指標説明：指標のビジネス的意義を解釈
    - 分布インサイト：分布特性と異常を発見
    - セグメントプロファイリング：詳細なセグメント説明を生成
    - マーケティング推奨事項：精密なマーケティング戦略を提供
    - チャーン予測：チャーンを予測し回復推奨を提供
    - クロスセル：販売機会を発見

  best_practices: |
    分析推奨事項：
    1. まず各指標分布を確認し、顧客全体の状況を把握
    2. スマートセグメント化を実行し、異なるセグメントを識別
    3. RFMセグメントを分析し、顧客ライフサイクル段階を理解
    4. AIインサイトを使用して深い分析と推奨を取得
    5. 異なるセグメントに対して差別化戦略を開発
    6. セグメントの変化を定期的に追跡し、戦略を調整

