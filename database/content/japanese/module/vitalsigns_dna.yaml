    title: "🎯 購入頻度マーケティング戦略"

    high_frequency:
      title: "高頻度顧客（上位20%）"
      advice1: "• VIP専用サービスを確立"
      advice2: "• まとめ買い割引を提供"
      advice3: "• 新製品の優先体験"

    mid_frequency:
      title: "中頻度顧客（20-80%）"
      advice1: "• ロイヤリティプログラムを設計"
      advice2: "• 累積購入報酬を提供"
      advice3: "• 定期的なケアリマインダー"

    low_frequency:
      title: "低頻度顧客（下位20%）"
      advice1: "• 購入障壁を理解"
      advice2: "• トライアルオファーを提供"
      advice3: "• 購入プロセスを簡素化"

  # M - Monetary Marketing Strategies
