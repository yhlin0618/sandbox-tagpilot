  clustering: "スマートセグメント化は類似の顧客グループを自動的に見つけます。グループ特性に基づいて有意義な名前を生成するAI命名機能の使用をお勧めします。"
  rfm_segments: "RFMセグメントは業界標準の顧客分類です。チャンピオンとリスク顧客に焦点を当て、差別化戦略を開発してください。"
