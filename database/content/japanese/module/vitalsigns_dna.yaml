# DNA 指標定義（7次元）
dna_metrics:
  # M - 消費金額
  monetary:
    name: "M - 消費金額"
    short_name: "M"
    full_name: "Monetary"
    description: "顧客の総消費金額"
    icon: "💰"
    unit: "円"
    interpretation: "消費金額が高いほど、顧客価値が大きい"

  # R - 最近の購入
  recency:
    name: "R - 最近の購入"
    short_name: "R"
    full_name: "Recency"
    description: "最後の購入からの日数"
    icon: "🕒"
    unit: "日"
    interpretation: "日数が少ないほど、顧客がアクティブ"
    reverse: true  # 数値が小さいほど良い

  # F - 購入頻度
  frequency:
    name: "F - 購入頻度"
    short_name: "F"
    full_name: "Frequency"
    description: "購入の総回数"
    icon: "🔁"
    unit: "回"
    interpretation: "購入回数が多いほど、ロイヤリティが高い"

  # IPT - 購入間隔
  ipt:
    name: "IPT - 購入周期"
    short_name: "IPT"
    full_name: "Inter-Purchase Time"
    description: "平均購入間隔日数"
    icon: "⏱️"
    unit: "日"
    interpretation: "間隔が短いほど、購入頻度が高い"
    reverse: true

  # CAI - 活動指数
  cai:
    name: "CAI - 顧客アクティビティ"
    short_name: "CAI"
    full_name: "Customer Activity Index"
    description: "総合アクティビティ度指標"
    icon: "📈"
    unit: "指数"
    range: [0, 1]
    interpretation: "指数が高いほど、顧客がアクティブ"

  # PCV - 過去価値
  pcv:
    name: "PCV - 過去価値"
    short_name: "PCV"
    full_name: "Past Customer Value"
    description: "履歴総消費価値"
    icon: "💎"
    unit: "円"
    interpretation: "履歴価値が高いほど、顧客が重要"

  # CRI - 安定度指標
  cri:
    name: "CRI - 顧客安定度"
    short_name: "CRI"
    full_name: "Customer Richness Index"
    description: "購入安定性評価"
    icon: "🎯"
    unit: "スコア"
    interpretation: "スコアが高いほど、購入が安定"

  # NES - 顧客ステータス
  nes:
    name: "NES - 顧客ステータス"
    short_name: "NES"
    full_name: "New/Engaged/Sleeping"
    description: "顧客ライフサイクルステータス"
    icon: "🔄"
    unit: "ステータス"
    interpretation: "顧客のアクティブ段階を追跡"

# RFM 分析
rfm_analysis:
  # 11個のRFM顧客グループ
  segments:
    champions:
      name: "Champions"
      japanese_name: "チャンピオン顧客"
      description: "最高の顧客、高頻度高価値で最近購入"
      criteria: "R=5, F=5, M=5"
      icon: "👑"
      color: "#28a745"
      characteristics:
        - "購入頻度が最高"
        - "消費金額が最大"
        - "最近もアクティブ"
        - "ブランドロイヤリティが非常に高い"
      strategy: "最高レベルの待遇を提供し、関係を維持"
      percentage_range: "5-10%"

    loyal_customers:
      name: "Loyal Customers"
      japanese_name: "ロイヤル顧客"
      description: "頻繁に購入し安定した顧客"
      criteria: "R>=3, F>=4"
      icon: "💎"
      color: "#17a2b8"
      characteristics:
        - "購入頻度が高い"
        - "消費が安定"
        - "関係が長期"
      strategy: "ロイヤリティ報酬を提供し、推薦を奨励"
      percentage_range: "10-15%"

    potential_loyalists:
      name: "Potential Loyalists"
      japanese_name: "潜在ロイヤル顧客"
      description: "最近購入しロイヤル顧客になる可能性がある"
      criteria: "R>=4, F>=2, M>=3"
      icon: "⭐"
      color: "#ffc107"
      characteristics:
        - "最近購入している"
        - "一定の消費がある"
        - "育成価値が高い"
      strategy: "会員プログラムを提供し、インタラクションを増やす"
      percentage_range: "10-15%"

    recent_customers:
      name: "Recent Customers"
      japanese_name: "新規顧客"
      description: "最近初回購入した新規顧客"
      criteria: "R>=4, F=1"
      icon: "🆕"
      color: "#20c997"
      characteristics:
        - "参加したばかり"
        - "育成が必要"
        - "可能性は未知"
      strategy: "新規顧客特典を提供し、信頼を構築"
      percentage_range: "15-20%"

    promising:
      name: "Promising"
      japanese_name: "有望顧客"
      description: "最近購入し、消費金額が大きい"
      criteria: "R>=3, F<=2, M>=4"
      icon: "💫"
      color: "#6610f2"
      characteristics:
        - "客単価が高い"
        - "頻度は向上の余地あり"
        - "成長の可能性あり"
      strategy: "クロスセルで頻度を向上"
      percentage_range: "5-10%"

    need_attention:
      name: "Need Attention"
      japanese_name: "要注意"
      description: "かつて良い顧客だったが、最近購入していない"
      criteria: "R<=3, F>=3, M>=3"
      icon: "⚠️"
      color: "#fd7e14"
      characteristics:
        - "過去のパフォーマンスが良好"
        - "最近冷めている"
        - "再活性化が必要"
      strategy: "ケアメッセージと限定オファーを送信"
      percentage_range: "5-10%"

    about_to_sleep:
      name: "About to Sleep"
      japanese_name: "スリープ寸前"
      description: "購入頻度が低下し、チャーンリスクあり"
      criteria: "R<=3, F<=3, M>=2"
      icon: "😴"
      color: "#e83e8c"
      characteristics:
        - "アクティビティが低下"
        - "チャーンの兆候"
        - "活性化が必要"
      strategy: "パーソナライズオファーで再吸引"
      percentage_range: "10-15%"

    at_risk:
      name: "At Risk"
      japanese_name: "リスク"
      description: "かつてロイヤル顧客だったが、今はチャーンリスクあり"
      criteria: "R<=2, F>=3, M>=3"
      icon: "🚨"
      color: "#dc3545"
      characteristics:
        - "過去の価値が高い"
        - "長期間購入していない"
        - "チャーンリスクが大きい"
      strategy: "緊急回復、原因を理解"
      percentage_range: "5-10%"

    cant_lose_them:
      name: "Can't Lose Them"
      japanese_name: "失えない顧客"
      description: "高価値顧客だが、長期間購入していない"
      criteria: "R<=2, F>=4, M>=5"
      icon: "💔"
      color: "#721c24"
      characteristics:
        - "履歴価値が非常に高い"
        - "チャーンリスクが非常に大きい"
        - "必ず回復が必要"
      strategy: "最高優先度で回復、上層部が介入"
      percentage_range: "2-5%"

    hibernating:
      name: "Hibernating"
      japanese_name: "休眠顧客"
      description: "長期間購入していない"
      criteria: "R<=2, F<=2, M<=2"
      icon: "💤"
      color: "#6c757d"
      characteristics:
        - "長期間インタラクションなし"
        - "低価値"
        - "再活性化コストが高い"
      strategy: "低コストで再活性化を試みる"
      percentage_range: "10-15%"

    lost:
      name: "Lost"
      japanese_name: "離脱顧客"
      description: "チャーンした顧客"
      criteria: "R<=1, F<=2, M<=2"
      icon: "❌"
      color: "#343a40"
      characteristics:
        - "すでにチャーン"
        - "価値が低い"
        - "投資は推奨しない"
      strategy: "原因を記録し、製品/サービスを改善"
      percentage_range: "10-20%"

# 顧客ライフサイクル
customer_lifecycle:
  title: "顧客ステータス"
  stages:
    new_customer:
      name: "新規顧客"
      short_name: "新規"
      full_name: "新規顧客"
      description: "初回購入の顧客"
      icon: "🆕"
      color: "success"
      criteria: "購入回数 = 1"
      strategy: "信頼を構築し、リピート購入を奨励"

    repeat_customer:
      name: "リピート顧客"
      short_name: "リピート"
      full_name: "リピート購入顧客"
      description: "リピート購入がある顧客"
      icon: "🔄"
      color: "primary"
      criteria: "購入回数 >= 2 かつ 最近の購入 <= 90日"
      strategy: "ロイヤリティを高め、頻度を向上"

    dormant_customer:
      name: "休眠顧客"
      short_name: "休眠"
      full_name: "休眠顧客"
      description: "長期間購入していない顧客"
      icon: "😴"
      color: "warning"
      criteria: "最近の購入 > 90日 かつ <= 180日"
      strategy: "再活性化アクション、再エンゲージメント"

    churned_customer:
      name: "離脱顧客"
      short_name: "離脱"
      full_name: "離脱顧客"
      description: "チャーンした顧客"
      icon: "❌"
      color: "danger"
      criteria: "最近の購入 > 180日"
      strategy: "原因を分析し、サービスを改善"

# スマートセグメント化
clustering:
  # セグメント化方法
  methods:
    kmeans:
      name: "K-means クラスタリング"
      description: "距離ベースの高速セグメント化方法"
      parameters:
        min_clusters: 2
        max_clusters: 8
        default_clusters: 5

    hierarchical:
      name: "階層的クラスタリング"
      description: "顧客セグメントツリー構造を構築"
      parameters:
        method: "ward.D2"
        distance_metric: "euclidean"

  # 最適クラスタ数
  optimal_clusters:
    title: "最適クラスタ数分析"
    methods:
      elbow:
        name: "エルボー法"
        description: "SSE低下率の変化点を見つける"
      silhouette:
        name: "シルエット係数"
        description: "セグメント化品質を評価"

  # クラスタ命名
  naming:
    ai_naming:
      name: "AIスマート命名"
      description: "セグメント特性に基づいて有意義な名前を自動生成"
    manual_naming:
      name: "手動命名"
      description: "各セグメントに自分で名前を付ける"

# AI 強化分析
ai_analysis:
  types:
    metric_description:
      name: "指標説明"
      description: "選択した指標のビジネス的意義を説明"
      prompt_category: "dna_metric_description"
      icon: "📊"

    distribution_insight:
      name: "分布インサイト"
      description: "指標分布の特徴と異常を分析"
      prompt_category: "dna_distribution_insight"
      icon: "📈"

    segment_profiling:
      name: "セグメントプロファイリング"
      description: "各セグメントの詳細プロファイルを生成"
      prompt_category: "dna_segment_profiling"
      icon: "👥"

    marketing_recommendations:
      name: "マーケティング推奨事項"
      description: "異なるセグメントのマーケティング戦略推奨"
      prompt_category: "dna_marketing_recommendations"
      icon: "💡"

    churn_prediction:
      name: "チャーン予測"
      description: "チャーンリスクを特定し、回復戦略を提供"
      prompt_category: "dna_churn_prediction"
      icon: "⚠️"

    cross_sell_opportunities:
      name: "クロスセル機会"
      description: "潜在的なクロスセル機会を発見"
      prompt_category: "cross_sell_opportunities"
      icon: "🎁"

# 属性抽出
attribute_extraction:
  title: "DNA属性抽出"
  description: "顧客行動から主要な属性と特徴を抽出"

  methods:
    ai_extraction:
      name: "AI自動抽出"
      description: "AIを使用して属性を自動的に識別および抽出"
      max_attributes: 30
      min_attributes: 5

    rule_based:
      name: "ルールベース抽出"
      description: "事前定義されたルールに基づいて属性を抽出"

  attribute_categories:
    behavioral:
      name: "行動属性"
      description: "購買行動関連の特徴"
      examples: ["高頻度購入", "夜間ショッピング傾向", "週末ショッピング"]

    value_based:
      name: "価値属性"
      description: "消費価値関連の特徴"
      examples: ["高注文価値", "割引に敏感", "品質志向"]

    loyalty:
      name: "ロイヤリティ属性"
      description: "ロイヤリティ関連の特徴"
      examples: ["長期顧客", "ブランド支持者", "紹介者"]

# チャート設定
charts:
  histogram_title: "分布ヒストグラム"

  # ツールチップとホバーテキストのチャートラベル
  labels:
    value: "値"
    count: "カウント"
    percentage: "割合"

  # チャート軸タイトル
  axes:
    value: "値"
    count: "カウント"
    frequency: "頻度"
    customer_count: "顧客数"
    nes_status: "NESステータス"

  # チャートタイトル
  titles:
    distribution: "分布図"
    histogram: "ヒストグラム"
    nes_distribution: "NESステータス分布"

  # 指標分布ヒストグラム
  metric_histogram:
    title: "{metric} 分布"
    x_axis: "{metric}"
    y_axis: "顧客数"
    tooltip: "{bin}: {count} 名の顧客"

  # 散布図
  scatter_plot:
    title: "{x_metric} 対 {y_metric}"
    x_axis: "{x_metric}"
    y_axis: "{y_metric}"
    tooltip: "顧客 {id}: {x}={x_value}, {y}={y_value}"

  # セグメント化結果散布図
  clustering_scatter:
    title: "顧客セグメント化結果"
    x_axis: "次元 1"
    y_axis: "次元 2"
    tooltip: "セグメント {segment}: {count} 名の顧客"

  # RFM ヒートマップ
  rfm_heatmap:
    title: "RFM 分布ヒートマップ"
    x_axis: "Frequency (F)"
    y_axis: "Recency (R)"
    color: "Monetary (M)"
    tooltip: "R={r}, F={f}, M={m}: {count} 名の顧客"

  # セグメント特徴レーダーチャート
  segment_radar:
    title: "セグメント特徴レーダーチャート"
    dimensions: ["M", "R", "F", "IPT", "CAI", "PCV", "CRI"]
    tooltip: "{segment} - {dimension}: {value}"

  # ライフサイクル分布
  lifecycle_pie:
    title: "顧客ライフサイクル分布"
    tooltip: "{stage}: {count} 名の顧客 ({percentage}%)"

  # エルボーチャート
  elbow_chart:
    title: "最適クラスタ数分析（エルボー法）"
    x_axis: "クラスタ数"
    y_axis: "SSE（クラスタ内平方和）"
    tooltip: "{k} クラスタ: SSE = {sse}"

  # シルエットチャート
  silhouette_chart:
    title: "最適クラスタ数分析（シルエット係数）"
    x_axis: "クラスタ数"
    y_axis: "平均シルエット係数"
    tooltip: "{k} クラスタ: 係数 = {score}"

# 単位テキスト
units:
  days: "日"
  times: "回"
  people: "名"

