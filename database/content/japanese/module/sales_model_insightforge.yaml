# Default messages
defaults:
  analysis_failed: "モデルフィッティングに失敗しました"
  unable_to_analyze: "分析できません"

# Translation mappings for regression results
# Maps original Chinese output from regression function to translated text
translation_map:
  interpretation:
    # Error messages
    "資料不足": "モデルフィッティングに失敗しました"
    "缺少銷量資料": "モデルフィッティングに失敗しました"
    "銷量資料無效": "モデルフィッティングに失敗しました"
    "模型擬合失敗": "モデルフィッティングに失敗しました"
    # Positive impacts
    "強烈.*正面影響": "販売に強いプラスの影響"
    "中等.*正面影響": "販売に中程度のプラスの影響"
    "微弱.*正面影響": "販売に弱いプラスの影響"
    # Negative impacts
    "強烈.*負面影響": "販売に強いマイナスの影響"
    "中等.*負面影響": "販売に中程度のマイナスの影響"
    "微弱.*負面影響": "販売に弱いマイナスの影響"

  meaning:
    # Error messages
    "無法分析": "分析できません"
    # Negative impact (new)
    "不需要強調，會負向影響銷售": "強調する必要はありません、販売にマイナスの影響があります"
    # Positive impact levels
    "影響很小，不是關鍵因素": "影響は最小限で、重要な要因ではありません"
    "有一定影響，可考慮優化": "一定の影響があり、最適化を検討してください"
    "重要影響因素，應重點關注": "重要な要因であり、注目すべきです"
    "極重要因素，是核心競爭力": "非常に重要な要因であり、中核的な競争力です"

