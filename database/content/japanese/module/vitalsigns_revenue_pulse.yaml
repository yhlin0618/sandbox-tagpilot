# 説明テキスト
help:
  overview: |
    売上パルス分析モジュールは売上健全度と収益構造の評価を支援します。
    Pareto 分析とCLVセグメント化を通じて、高価値顧客を特定し、収益を最適化します。

  core_metrics: |
    コア売上指標：
    - 総売上高：すべての取引の総金額
    - ARPU：顧客1人あたりの平均売上、売上を総顧客数で割る
    - CLV：顧客生涯価値、ARPU × 購入頻度 × 顧客寿命
    - AOV：注文1件あたりの平均金額、売上を注文数で割る

  consistency_score: |
    売上安定度スコア：
    3つのディメンションで評価：
    1. 売上変動性 (40%)：売上変動係数（CV）が低いほどスコアが高い
    2. 成長一貫性 (30%)：成長率が安定しているほどスコアが高い
    3. 顧客集中度 (30%)：売上が分散しているほどスコアが高い

    スコア範囲：0-100点
    - 80点以上：非常に良好、売上が非常に安定
    - 60-79点：良好、売上が比較的安定
    - 40-59点：中程度、変動が明確で注意が必要
    - 40点未満：不良、売上が不安定でリスクが高い

  pareto_analysis: |
    Pareto 80/20 法則：
    - 一般的に、売上の80%は顧客の20%から
    - 高価値顧客（上位20%）を特定してリソースを集中
    - 中価値顧客（中間60%）を育成して高価値に昇格
    - 低価値顧客（下位20%）には基本サービスを提供

  clv_segmentation: |
    CLV セグメント戦略：
    - プラチナ顧客（上位10%）：最高のサービス、全力で維持
    - ゴールド顧客（10-25%）：優れたサービス、積極的に向上
    - シルバー顧客（25-75%）：標準サービス、継続的に育成
    - ブロンズ顧客（75-100%）：基本サービス、選択的に投資

  best_practices: |
    分析推奨事項：
    1. 定期的に売上指標を追跡し、トレンドと異常を理解
    2. 高価値顧客を特定し、VIP待遇を提供
    3. 売上安定度を監視し、リスクを早期に発見
    4. 顧客CLVを向上させ、長期価値を最大化
    5. AI インサイトを活用して売上最適化戦略を策定

# ヒントテキスト
hints:
  total_revenue: "総売上はすべての顧客の取引額の合計で、事業規模を反映します"
  arpu: "ARPUが高いほど、各顧客の平均価値が高いことを示します。ARPUの向上は売上成長の重要な方法です。"
