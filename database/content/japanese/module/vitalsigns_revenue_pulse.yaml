  consistency_score: "取引安定度は顧客の購入行動の一貫性を反映し、高いほど安定しています"
  consistency: "売上安定度が高いほど、ビジネスの予測可能性が高く、リスクが低いことを示します。"
  pareto: "Pareto 分析は高価値顧客を特定するのに役立ち、これらの顧客を維持することが売上維持の鍵です。"

