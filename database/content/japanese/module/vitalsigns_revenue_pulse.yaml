# 売上パルス分析モジュール言語コンテンツ（日本語）
# Version: 1.0.0
# Last Updated: 2025-10-11

# モジュール基本情報
title: "売上パルス分析"
subtitle: "収入規模、単一顧客価値、収益性の定量化"
description: "売上健全度の評価、価値分布の分析、高貢献顧客の特定、収益構造の最適化"

# UI ブロック
ui:
  sections:
    overview: "売上概要"
    revenue_metrics: "コア指標"
    consistency_score: "売上安定度スコア"
    revenue_distribution: "売上分布"
    pareto_analysis: "Pareto 80/20 法則"
    clv_segments: "CLV 顧客グループ分析"
    revenue_segments: "顧客売上セグメント"
    arpu_analysis: "ARPU 分析"
    clv_distribution: "顧客生涯価値分布"
    top_customers: "高価値顧客ランキング"
    metrics_table: "売上指標詳細"
    revenue_trends: "売上トレンド"
    contribution_analysis: "貢献度分析"
    ai_insights: "AI インサイト"

  # ラベル
  labels:
    consistency_label: "一貫性スコア"
    stability_interpretation: "安定度解釈"

  # ボタン
  buttons:
    calculate_metrics: "指標を計算"
    analyze_pareto: "Pareto を分析"
    segment_clv: "CLV でセグメント化"
    generate_insights: "AI インサイトを生成"
    export_analysis: "分析レポートをエクスポート"
    download_segments: "顧客リストをダウンロード"
    download_full_list: "完全な顧客リストをダウンロード"
    download_revenue_list: "完全な顧客売上リストをダウンロード"

# 指標定義
metrics:
  # コア売上指標
  total_revenue:
    name: "総売上高"
    short_name: "売上高"
    description: "すべての取引の総金額"
    icon: "dollar-sign"
    unit: "円"
    color: "primary"

  arpu:
    name: "ユーザーあたり平均売上 (ARPU)"
    short_name: "ARPU"
    full_name: "Average Revenue Per User"
    description: "顧客1人あたりの平均売上貢献"
    icon: "user-dollar"
    unit: "円"
    color: "success"
    formula: "総売上 / 顧客数"

  clv:
    name: "平均顧客生涯価値 (CLV)"
    short_name: "CLV"
    full_name: "Customer Lifetime Value"
    description: "顧客がライフサイクル全体で貢献する総価値"
    icon: "chart-line"
    unit: "円"
    color: "info"
    formula: "ARPU × 購入頻度 × 顧客寿命"

  aov:
    name: "平均注文額 (AOV)"
    short_name: "AOV"
    full_name: "Average Order Value"
    description: "注文1件あたりの平均金額"
    icon: "shopping-cart"
    unit: "円"
    color: "warning"
    formula: "総売上 / 注文数"

  consistency_score:
    name: "売上安定度"
    short_name: "安定度"
    description: "売上の一貫性と予測可能性のスコア"
    icon: "heartbeat"
    unit: "点"
    color: "success"
    range: "0-100"

# 売上安定度
consistency:
  # 安定度レベル
  levels:
    excellent:
      name: "非常に良好"
      min_score: 80
      color: "success"
      icon: "💚"
      interpretation: "売上が非常に安定しており、ビジネスが健全"

    good:
      name: "良好"
      min_score: 60
      color: "primary"
      icon: "💙"
      interpretation: "売上が比較的安定しており、若干の変動あり"

    moderate:
      name: "中程度"
      min_score: 40
      color: "warning"
      icon: "💛"
      interpretation: "売上の変動が明確で、注意が必要"

    poor:
      name: "不良"
      min_score: 0
      color: "danger"
      icon: "❤️"
      interpretation: "売上が不安定で、リスクが高い"

  # 評価ディメンション
  dimensions:
    revenue_stability:
      name: "売上変動性"
      description: "売上変動係数（CV）"
      weight: 0.4

    growth_consistency:
      name: "成長一貫性"
      description: "成長率の安定度"
      weight: 0.3

    customer_concentration:
      name: "顧客集中度"
      description: "売上ソースの分散度"
      weight: 0.3

# Pareto 分析
pareto:
  # 80/20 法則
  rule_8020:
    name: "Pareto 80/20 法則"
    description: "売上の80%は顧客の20%から"
    interpretation: "高価値顧客を特定し、リソース配分を最適化"

  # 顧客グループ分類
  segments:
    top_20:
      name: "高価値顧客（上位20%）"
      short_name: "Top 20%"
      description: "最も多くの売上を貢献する顧客グループ"
      color: "success"
      icon: "👑"
      typical_contribution: "70-90%"

    middle_60:
      name: "中価値顧客（中間60%）"
      short_name: "Middle 60%"
      description: "中程度の売上を貢献する顧客グループ"
      color: "primary"
      icon: "⭐"
      typical_contribution: "10-25%"

    bottom_20:
      name: "低価値顧客（下位20%）"
      short_name: "Bottom 20%"
      description: "最も少ない売上を貢献する顧客グループ"
      color: "warning"
      icon: "👤"
      typical_contribution: "0-5%"

  # Pareto 指標
  metrics:
    pareto_ratio:
      name: "Pareto 比率"
      description: "上位20%顧客の売上占有率"
      ideal_range: "70-80%"

    concentration_index:
      name: "集中度指数"
      description: "売上集中度の定量化指標"
      interpretation: "高いほど少数の顧客に集中していることを示す"

# CLV セグメント
clv_segments:
  # CLV によるセグメント
  tiers:
    platinum:
      name: "プラチナ顧客"
      description: "最高価値の顧客グループ"
      color: "#E5E4E2"
      icon: "💎"
      percentile: "上位10%"
      strategy: "最高のサービス、全力で維持"

    gold:
      name: "ゴールド顧客"
      description: "高価値顧客グループ"
      color: "#FFD700"
      icon: "🥇"
      percentile: "10-25%"
      strategy: "優れたサービス、積極的に向上"

    silver:
      name: "シルバー顧客"
      description: "中価値顧客グループ"
      color: "#C0C0C0"
      icon: "🥈"
      percentile: "25-75%"
      strategy: "標準サービス、継続的に育成"

    bronze:
      name: "ブロンズ顧客"
      description: "基本価値顧客グループ"
      color: "#CD7F32"
      icon: "🥉"
      percentile: "75-100%"
      strategy: "基本サービス、選択的に投資"

  # CLV 計算方法
  calculation:
    simple:
      name: "簡易法"
      formula: "平均購入価値 × 購入頻度 × 顧客寿命"
      use_case: "迅速な見積もり"

    cohort_based:
      name: "コホート法"
      formula: "実際のコホートの累積売上に基づく"
      use_case: "正確な計算"

    predictive:
      name: "予測法"
      formula: "履歴データ + チャーン率予測"
      use_case: "将来価値の見積もり"

# 売上トレンド
revenue_trends:
  # トレンドタイプ
  types:
    time_series:
      name: "時系列トレンド"
      description: "時間に伴う売上の変化トレンド"

    moving_average:
      name: "移動平均"
      description: "平滑化されたトレンドライン"
      periods: [7, 14, 30]

    growth_rate:
      name: "成長率トレンド"
      description: "期間ごとの成長率変化"

  # Period Comparisons
  comparisons:
    mom:
      name: "月次比較（MoM）"
      description: "前月との比較"

    yoy:
      name: "年次比較（YoY）"
      description: "前年同期との比較"

    cumulative:
      name: "累積比較"
      description: "累積売上比較"

# Contribution Analysis
contribution:
  # Contribution Metrics
  metrics:
    revenue_contribution:
      name: "売上貢献度"
      description: "個別顧客またはセグメントからの売上割合"
      unit: "%"

    transaction_contribution:
      name: "取引貢献度"
      description: "取引数の割合"
      unit: "%"

    customer_share:
      name: "顧客シェア"
      description: "顧客数の割合"
