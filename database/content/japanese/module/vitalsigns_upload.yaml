# 説明テキスト
help:
  overview: |
    VitalSigns データアップロードモジュールはCSVおよびExcel形式の顧客取引データに対応しています。
    システムはファイル形式を自動検出し、データの完全性を検証します。

  file_requirements: |
    ファイル要件：
    - CSV (.csv) または Excel (.xlsx, .xls) 形式に対応
    - ファイルサイズは 200MB 以下
    - 1回に最大 12 ファイルまでアップロード可能（システムが自動的に統合）
    - UTF-8 エンコードを推奨

  data_requirements: |
    データ要件：
    - 最低 10 件の取引データ
    - 最低 10 人のユニーク顧客
    - 最低 3 ヶ月の取引記録（12 ヶ月を推奨）
    - 顧客ID、時刻、金額の完全な項目を含む必要があります

  column_requirements: |
    必須項目説明：
    - 顧客ID/Email：顧客を一意に識別する項目（Email、会員IDなど）
    - 購入時刻：取引発生の日時
    - 取引金額：1回の取引の金額（正の数である必要があります）

    オプション項目説明：
    - プラットフォームID：販売プラットフォームまたはチャネル（例：Amazon、公式サイト）
    - 商品ID：商品識別コードまたはSKU

  amazon_format: |
    Amazon レポート形式対応：
    システムはAmazon販売レポートを自動検出・処理できます。以下の項目に対応：
    - Buyer Email → 顧客ID
    - Purchase Date / Payments Date → 購入時刻
    - Item Price → 取引金額

    Amazon Seller Central からダウンロードしたレポートを直接アップロードできます。

  multi_file_upload: |
    複数ファイルアップロード機能：
    - 一度に複数のファイルを選択可能（最大12件）
    - システムがすべてのファイルを自動的に統合
    - 月別に分かれたレポートファイルに適しています
    - すべてのファイルは同じ項目構造を持つ必要があります

  troubleshooting: |
    よくある質問：

    Q: なぜ項目を検出できないのですか？
    A: ファイルの最初の行に項目名が含まれており、項目名が明確に記載されていることを確認してください

    Q: 日付形式の問題を解決するには？
    A: システムは複数の日付形式に対応していますが、YYYY-MM-DD または YYYY-MM-DD HH:MM:SS の使用を推奨します

    Q: 異なるプラットフォームのデータをアップロードできますか？
    A: はい、オプションの「プラットフォームID」項目を使用して異なるソースを区別してください

    Q: データを事前にクリーニングする必要がありますか？
    A: システムは一般的な形式の問題を自動的に処理しますが、明らかなエラーデータは削除することをお勧めします

# 検証ルール説明
validation_rules:
  customer_id:
    title: "顧客ID検証"
    rules:
      - "空白値は不可"
      - "Email形式の使用を推奨"
      - "最低10人のユニーク顧客"

  payment_time:
    title: "購入時刻検証"
    rules:
      - "空白値は不可"
      - "有効な日時形式である必要があります"
      - "データ範囲は最低3ヶ月をカバー"
      - "未来の日付は不可"

  lineitem_price:
    title: "取引金額検証"
    rules:
      - "空白値は不可"
      - "数値形式である必要があります"
      - "マイナス値は不可"
      - "最大値は 1,000,000 を超えないことを推奨"

