        <ul style='margin: 0; padding-left: 20px;'>
          <li>新規顧客数：<strong>%d人</strong></li>
          <li>獲得率：<strong>%.1f%%</strong></li>
          <li>業界ベンチマーク：EC 15-25%%</li>
          <li>評価：%s</li>
        </ul>
        <h6 style='color: #2c3e50; margin-top: 15px; margin-bottom: 10px;'>💡 戦略的推奨</h6>
        <ul style='margin: 0; padding-left: 20px;'>
          <li>%s</li>
          <li>%s</li>
        </ul>
        </div>

    # 顧客変動率分析テンプレート
    change_rate_analysis:
      title: "🔍 顧客プール健康診断"
      metrics:
        active_rate: "アクティブ率：<strong>{value}%</strong>"
        health_status: "健康状態：<strong>{status}</strong>"
        dormant_rate: "休眠顧客率：<strong>{value}%</strong>"
      health_levels:
        healthy: "健康"
        warning: "警告"
        danger: "危険"
      prevention_title: "🛡️ リスク防止対策"
      prevention_strategies:
        high_risk:
          - "直ちに顧客再活性化キャンペーンを開始"
          - "休眠顧客向けの特別オファーを提供"
          - "顧客離脱早期警告システムを確立"
        low_risk:
          - "定期的に顧客活動を監視"
