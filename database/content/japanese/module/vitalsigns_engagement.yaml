# 説明テキスト
help:
  overview: |
    エンゲージメント分析モジュールは顧客のアクティビティレベルと参加パターンの評価を支援します。
    ファネル分析と行動パターンを通じて、顧客エンゲージメントを深く理解します。

  engagement_scoring: |
    エンゲージメントスコアリングシステム：
    5つのディメンションに基づく加重計算：
    1. 購入頻度 (25%)：購入回数が多いほどスコアが高い
    2. 最近のインタラクション (20%)：最近活動しているほどスコアが高い
    3. 消費価値 (25%)：消費金額が高いほどスコアが高い
    4. エンゲージメント深度 (15%)：各インタラクションが深いほどスコアが高い
    5. 行動一貫性 (15%)：購入パターンが安定しているほどスコアが高い

  activity_levels: |
    アクティビティレベル定義：
    - 高アクティブ (75-100点)：頻繁に購入し、高度に参加
    - 中アクティブ (50-74点)：定期的に購入し、安定して参加
    - 低アクティブ (25-49点)：時々購入し、低度に参加
    - 非アクティブ (0-24点)：長期間購入せず、再活性化が必要

  conversion_funnel: |
    コンバージョンファネル分析：
    - 顧客の購入プロセスを異なるステージに分解
    - 各ステージのコンバージョン率と離脱率を測定
    - ボトルネックを特定してコンバージョンを最適化
    - 認知 → 検討 → 購入 → リピート

  best_practices: |
    分析推奨事項：
    1. 定期的にエンゲージメント指標を追跡し、トレンドを理解
    2. ファネルのボトルネックを特定し、最適化施策を実施
    3. 異なる顧客グループの行動パターンを分析
    4. 低アクティブ顧客の再活性化戦略を策定
    5. AI インサイトを活用してパーソナライズされたエンゲージメント戦略を実施

