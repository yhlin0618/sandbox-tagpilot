# Chart Interpretation
chart_interpretation:
  title: "📊 Chart Interpretation Guide"
  overview: "This chart visualizes growth opportunities for each product attribute, helping you identify the most valuable areas for improvement."

  axes_explanation:
    title: "Axes Explanation:"
    x_axis: "• **X-Axis (Growth Potential)**: Represents the improvement space from current performance to ideal level. Higher values indicate greater improvement potential."
    y_axis: "• **Y-Axis (Market Importance)**: Indicates the attribute's impact on overall market competitiveness. Higher values mean consumers care more about this attribute."

  bubble_explanation:
    title: "Bubble Interpretation:"
    size: "• **Bubble Size**: Represents the 'track score' (growth potential × market importance). Larger bubbles indicate higher ROI."
    color: "• **Bubble Color**: From dark blue to yellow - brighter colors indicate greater opportunities."
    position: "• **Bubble Position**: Attributes are divided into four quadrants, each representing different strategic recommendations."

  quadrants:
    title: "Quadrant Strategies:"
    high_potential: "• **High Potential Track (Top Right)**: High growth + High importance = Top priority investment for maximum competitive advantage"
    mature: "• **Mature Track (Top Left)**: Low growth + High importance = Maintain leadership position to prevent competitors from overtaking"
    niche: "• **Niche Track (Bottom Right)**: High growth + Low importance = Differentiation opportunity to create unique selling points"
    low_priority: "• **Low Priority Track (Bottom Left)**: Low growth + Low importance = Minimum resource allocation, maintain basic level"

  how_to_use: "**How to Use**: Focus on attributes in the top-right quadrant (High Potential Track) - these offer the highest ROI. Also pay attention to top-left quadrant (Mature Track) attributes to maintain existing advantages."
