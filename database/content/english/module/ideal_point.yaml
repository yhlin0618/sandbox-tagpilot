# Help Text
help:
  overview: |
    Ideal Point Analysis evaluates how closely each brand approaches the ideal standard.
    The system calculates a comprehensive score for each brand across all attributes,
    and ranks them based on their distance to the ideal point.

  interpretation: |
    Score Interpretation:
    - High Score: Brand performance is close to the ideal standard
    - Low Score: Brand has a larger gap from the ideal standard
    - Ranking: Sorted by ideal point score from high to low

  key_factors: |
    Key Factors Explanation:
    - Shows attributes with the greatest impact on ideal point scores
    - These factors are priority areas for brand improvement
    - Can serve as reference for strategy adjustments
