  recency:
    name: "Recent Interaction"
    short_name: "Recency"
    description: "Time of last purchase"
    weight: 0.20
    icon: "🕒"
    formula: "Current Date - Last Purchase Date"

  monetary:
    name: "Spending Value"
    short_name: "Value"
    description: "Cumulative spending amount"
    weight: 0.25
    icon: "💰"
