# Help Text
help:
  overview: |
    Engagement & Conversion Analysis module helps you assess customer engagement and conversion efficiency.
    Through multi-dimensional analysis, identify high-value segments and optimize interaction strategies.

  engagement_scoring: |
    Engagement Scoring System:
    Based on 5 weighted dimensions:
    1. Purchase Frequency (25%): Number of purchases
    2. Recent Interaction (20%): Last purchase time
    3. Spending Value (25%): Cumulative spending amount
    4. Engagement Depth (15%): Depth of each interaction
    5. Behavioral Consistency (15%): Stability of purchase behavior

    Total Score Range: 0-100 points

  activity_levels: |
    Activity Level Definition:
    - Highly Active (75+ points): Core customers, need maintenance
    - Moderately Active (50-74 points): Main customers, can be enhanced
    - Low Active (25-49 points): Edge customers, need activation
    - Inactive (Below 25 points): Churn risk, need reactivation

  conversion_funnel: |
    Conversion Funnel Analysis:
    Track complete customer journey from awareness to repeat purchase:
    1. Awareness Stage: Learn about brand
    2. Consideration Stage: Evaluate purchase
    3. Purchase Stage: Complete first purchase
    4. Repeat Stage: Become repeat customer

    Funnel analysis helps:
    - Identify conversion bottlenecks
    - Calculate stage drop-off rates
    - Optimize customer journey
    - Improve overall conversion rate

  rfe_analysis: |
    RFE Analysis:
    RFE is an advanced version of RFM with added engagement dimension:
    - R (Recency): Recent purchase time
    - F (Frequency): Purchase frequency
    - E (Engagement): Overall engagement

    Compared to traditional RFM, RFE provides more comprehensive customer value assessment.

  best_practices: |
    Analysis Recommendations:
    1. Regularly track activity rate changes to maintain customer engagement
    2. Analyze conversion funnel to optimize key stages
    3. Identify highly engaged customer characteristics to replicate success
    4. Optimize communication rhythm based on purchase timing patterns
    5. Develop differentiated strategies for different activity level segments

# Hints
hints:
  engagement_distribution: "Engagement score distribution reflects overall customer activity. Ideally should show right-skewed distribution (more high-scoring customers)."
  activity_levels: "Watch proportion of inactive customers. If exceeds 30%, recommend large-scale activation measures."
  conversion_funnel: "Narrowing funnel stages are conversion bottlenecks. Focus on optimizing stages with highest drop-off rates."
  purchase_timing: "Understanding customer purchase timing habits can optimize promotion and communication timing to improve conversion efficiency."
  engagement_segments: "Super Users contribute disproportionately despite small size. Engaged Users are main force, Casual Users have growth potential, At Risk Users need attention."

