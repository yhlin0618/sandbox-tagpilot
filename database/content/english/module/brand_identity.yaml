# Help Text
help:
  overview: |
    BrandEdge Brand Imprint Engine is an enterprise-grade brand positioning analysis platform
    that provides comprehensive brand strategy recommendations through AI-powered deep analysis of customer reviews.

  workflow: |
    Analysis Workflow:
    1. Upload Review Data - Upload Excel or CSV file containing brand reviews
    2. Extract Attributes - AI automatically extracts 10-30 key product attributes from reviews
    3. Score Attributes - System scores all attributes for each review (1-5 scale)
    4. Run Analysis - Select analysis modules to execute and generate strategy reports

  attributes_extraction: |
    Attribute Extraction Details:
    - System automatically extracts product attributes that consumers focus on from reviews
    - Select 10-30 attributes (15 recommended)
    - Extraction takes approximately 2-5 minutes
    - Automatically removes duplicate and irrelevant attributes

  attributes_scoring: |
    Attribute Scoring Details:
    - System scores all attributes for each review (1-5 scale)
    - Scoring based on positive/negative descriptions of attributes in reviews
    - Scoring time depends on number of reviews and attributes
    - Supports batch processing for improved efficiency

  analysis_modules: |
    Eight Core Analysis Modules:
    1. Market Profile - Market segmentation and customer analysis
    2. Market Track - Growth opportunity identification and strategic priorities
    3. DNA Analysis - Brand DNA radar chart and competitive assessment
    4. Key Factors - Success factor identification
    5. Ideal Point - Target achievement analysis
    6. Strategy Positioning - Four-quadrant strategic recommendations
    7. Brand Identity - Differentiation analysis
    8. AI Insights - Comprehensive strategy report

