# Chart Interpretation
chart_interpretation:
  title: "📊 Brand Identity Matrix Interpretation"
  overview: "This chart displays brand positioning in terms of market differentiation, helping you understand brand uniqueness and strength performance."

  axes_explanation:
    title: "Axes Explanation:"
    x_axis: "• **X-Axis (Uniqueness/Identity)**: Represents the degree of brand differentiation in consumers' minds. Higher values indicate stronger uniqueness and easier brand recognition."
    y_axis: "• **Y-Axis (Brand Strength)**: Indicates overall brand performance level. Higher values represent stronger comprehensive capabilities across attributes."

  marker_explanation:
    title: "Marker Interpretation:"
    target: "• **Target Brand**: Marked with a large red dot for easy identification of your focus brand's position."
    others: "• **Other Brands**: Marked with small blue dots for competitive comparison."
    labels: "• **Brand Labels**: Each dot displays the brand name above, hover for detailed data."

  quadrants:
    title: "Quadrant Strategic Positioning:"
    high_high: "• **High Identity High Strength (Top Right)**: Market Leader - Strong capabilities with high differentiation, maintain and strengthen advantages to consolidate leadership"
    low_high: "• **Low Identity High Strength (Top Left)**: Hidden Champion - Strong but low recognition, enhance brand marketing and differentiation communication"
    high_low: "• **High Identity Low Strength (Bottom Right)**: Distinctive Brand - Unique but needs strength improvement, enhance product quality and service"
    low_low: "• **Low Identity Low Strength (Bottom Left)**: Emerging Brand - Needs comprehensive improvement, prioritize building differentiation or strengthening core competencies"

  how_to_use: "**Strategic Recommendation**: Target brand should move toward the top-right quadrant. If in top-left, enhance differentiation; if in bottom-right, improve overall strength; if in bottom-left, choose between building uniqueness or strengthening capabilities as breakthrough point."
