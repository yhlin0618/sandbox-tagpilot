hints:
  retention_rate: "Retention rate calculation: Returning customers ÷ Total customers. Reflects customer loyalty and product satisfaction"
  churn_rate: "Churn rate calculation: Churned customers ÷ Total customers. Churned customers have no purchases during observation period"
  at_risk_customers: "At-risk customers definition: Based on RFM and NES indicators, predicts the number of customers likely to churn in the future"
  core_ratio: "Core customer ratio: Percentage of core customers (E0) among total customers. Core customers are the most valuable and loyal customer segment"
  dormant_prediction: "Dormant prediction formula: S1 customers × 0.3 + S2 customers × 0.5, predicting customers likely to become dormant within 30 days"
  new_customers: "New customers (N): First-time purchasers who need to be nurtured into long-term customers"
  core_customers: "Core customers (E0): Most loyal and valuable customers who require continuous maintenance"
  drowsy_customers: "Drowsy customers (S1): Customers with declining purchase frequency who need timely reactivation"
  semi_sleeping: "Semi-sleeping customers (S2): Customers with longer periods of inactivity who face higher churn risk"
  sleeping_customers: "Sleeping customers (S3): Customers with long periods of inactivity who need strong activation strategies"

