  high_value_customers:
    title: "High-Value Customer Maintenance Strategy"
    actions:
      - "Provide VIP exclusive benefits and services"
      - "Establish dedicated account manager"
      - "Priority access to new products and limited items"
      - "Regular appreciation and feedback"
      - "Invite participation in brand decisions"

  improve_arpu:
    title: "ARPU Enhancement Strategy"
    actions:
      - "Cross-selling and upselling"
      - "Launch product bundle offers"
      - "Provide value-added services"
      - "Optimize product pricing strategy"
      - "Encourage increased purchase frequency"

  improve_consistency:
    title: "Revenue Consistency Enhancement Strategy"
    actions:
      - "Diversify customer base to reduce concentration"
      - "Develop subscription or membership programs"
      - "Establish predictive restocking mechanisms"
      - "Balance new customer acquisition and retention"
      - "Develop diverse revenue sources"

  optimize_clv:
    title: "CLV Optimization Strategy"
    actions:
      - "Extend customer lifetime"
      - "Increase purchase frequency"
      - "Increase single purchase amount"
      - "Reduce customer churn rate"
      - "Establish loyalty programs"

