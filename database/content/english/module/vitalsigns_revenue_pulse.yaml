# Metrics Definition
metrics:
  # Core Revenue Metrics
  total_revenue:
    name: "Total Sales"
    short_name: "Sales"
    description: "Total amount of all transactions"
    icon: "dollar-sign"
    unit: "$"
    color: "primary"

  arpu:
    name: "Average Revenue Per User (ARPU)"
    short_name: "ARPU"
    full_name: "Average Revenue Per User"
    description: "Average revenue contributed by each customer"
    icon: "user-dollar"
    unit: "$"
    color: "success"
    formula: "Total Revenue / Customer Count"

  clv:
    name: "Average Customer Lifetime Value (CLV)"
    short_name: "CLV"
    full_name: "Customer Lifetime Value"
    description: "Total value contributed by customer over entire lifecycle"
    icon: "chart-line"
    unit: "$"
    color: "info"
    formula: "ARPU × Purchase Frequency × Customer Lifetime"

  aov:
    name: "Average Order Value (AOV)"
    short_name: "AOV"
    full_name: "Average Order Value"
    description: "Average amount per order"
    icon: "shopping-cart"
    unit: "$"
    color: "warning"
    formula: "Total Revenue / Order Count"

  consistency_score:
    name: "Revenue Consistency"
    short_name: "Consistency"
    description: "Revenue consistency and predictability score"
    icon: "heartbeat"
    unit: "points"
    color: "success"
    range: "0-100"

# Revenue Consistency
consistency:
  # Consistency Levels
  levels:
    excellent:
      name: "Excellent"
      min_score: 80
      color: "success"
      icon: "💚"
      interpretation: "Very stable revenue, healthy business"

    good:
      name: "Good"
      min_score: 60
      color: "primary"
      icon: "💙"
      interpretation: "Relatively stable revenue with slight fluctuations"

    moderate:
      name: "Moderate"
      min_score: 40
      color: "warning"
      icon: "💛"
      interpretation: "Noticeable revenue fluctuations, needs attention"

    poor:
      name: "Poor"
      min_score: 0
      color: "danger"
      icon: "❤️"
      interpretation: "Unstable revenue, higher risk"

  # Assessment Dimensions
  dimensions:
    revenue_stability:
      name: "Revenue Volatility"
      description: "Revenue Coefficient of Variation (CV)"
      weight: 0.4

    growth_consistency:
      name: "Growth Consistency"
      description: "Stability of growth rate"
      weight: 0.3

    customer_concentration:
      name: "Customer Concentration"
      description: "Distribution of revenue sources"
      weight: 0.3

# Pareto Analysis
pareto:
  # 80/20 Rule
  rule_8020:
    name: "Pareto 80/20 Rule"
    description: "80% of revenue comes from 20% of customers"
    interpretation: "Identify high-value customers to optimize resource allocation"

  # Customer Segments
  segments:
    top_20:
      name: "High-Value Customers (Top 20%)"
      short_name: "Top 20%"
      description: "Customer group contributing most revenue"
      color: "success"
      icon: "👑"
      typical_contribution: "70-90%"

    middle_60:
      name: "Mid-Value Customers (Middle 60%)"
      short_name: "Middle 60%"
      description: "Customer group contributing moderate revenue"
      color: "primary"
      icon: "⭐"
      typical_contribution: "10-25%"

    bottom_20:
      name: "Low-Value Customers (Bottom 20%)"
      short_name: "Bottom 20%"
      description: "Customer group contributing least revenue"
      color: "warning"
      icon: "👤"
      typical_contribution: "0-5%"

  # Pareto Metrics
  metrics:
    pareto_ratio:
      name: "Pareto Ratio"
      description: "Revenue percentage from top 20% customers"
      ideal_range: "70-80%"

    concentration_index:
      name: "Concentration Index"
      description: "Quantitative measure of revenue concentration"
      interpretation: "Higher value indicates more concentration in few customers"

# CLV Segments
clv_segments:
  # Segment by CLV
  tiers:
    platinum:
      name: "Platinum Customers"
      description: "Highest value customer segment"
      color: "#E5E4E2"
      icon: "💎"
      percentile: "Top 10%"
      strategy: "Premium service, full maintenance"

    gold:
      name: "Gold Customers"
      description: "High-value customer segment"
      color: "#FFD700"
      icon: "🥇"
      percentile: "10-25%"
      strategy: "Quality service, active enhancement"

    silver:
      name: "Silver Customers"
      description: "Mid-value customer segment"
      color: "#C0C0C0"
      icon: "🥈"
      percentile: "25-75%"
      strategy: "Standard service, continuous cultivation"

    bronze:
      name: "Bronze Customers"
      description: "Basic value customer segment"
      color: "#CD7F32"
      icon: "🥉"
      percentile: "75-100%"
      strategy: "Basic service, selective investment"

  # CLV Calculation Methods
  calculation:
    simple:
      name: "Simplified Method"
      formula: "Average Purchase Value × Purchase Frequency × Customer Lifetime"
      use_case: "Quick estimation"

    cohort_based:
      name: "Cohort Method"
      formula: "Based on actual cohort cumulative revenue"
      use_case: "Precise calculation"

    predictive:
      name: "Predictive Method"
      formula: "Historical data + churn rate prediction"
      use_case: "Future value estimation"

