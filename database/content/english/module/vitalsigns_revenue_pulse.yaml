    balanced_strategy: "🎯 Balanced Strategy: Tiered offers, encourage spending upgrades"
    high_value_customers: "🎆 High-Value Customers: VIP exclusive service, priority pre-order access, customized products, birthday special offers"
    mid_value_customers: "🎯 Mid-Value Customers: Membership point programs, gifts with purchase, quarterly coupons, referral rewards"
    low_value_customers: "💡 Low-Value Customers: First purchase offers, entry product promotions, limited-time discounts, free shipping"

  # AI Fallback Text (when data unavailable)
  fallbacks:
    need_more_data: "📌 Recommend collecting more transaction data for analysis"

# AI Insights Content
ai_insights:
  # GPT prompts
  prompts:
    revenue_summary:
      system: "Analyze the following revenue data and provide strategic insights:"
      metrics_template: |
        - Total Revenue: ${total_revenue}
        - Customer Count: {customer_count}
        - ARPU: ${arpu}
        - Avg CLV: ${clv}
        - AOV: ${aov}
        - Revenue Consistency: {consistency}%
        - Pareto Analysis: {pareto_pct}% of customers contribute 80% of revenue
      request: "Please provide: 1) Overall revenue health assessment 2) Key findings 3) Optimization recommendations"

  # Fallback content (when GPT disabled or fails)
  fallback:
    revenue_summary:
      title: "📊 Revenue Overview"
      template_line1: "✓ Total Revenue: ${total_revenue}"
      template_line2: "✓ {customer_count} Customers"
      template_line3: "✓ Per Customer: ${arpu}"
      high_consistency: "✅ High revenue consistency, stable customer behavior"
      medium_consistency: "⚠️ Moderate revenue fluctuation, recommend focusing on high-value customers"
      low_consistency: "🔴 High revenue fluctuation, customer structure optimization needed"

    arpu_analysis:
      title: "💰 ARPU Deep Analysis"
      line1: "Average Revenue Per User: ${arpu}"
      line2: "High-Value Customer Avg: ${high_value_avg}"
      line3: "Low-Value Customer Avg: ${low_value_avg}"
      recommendations_title: "💡 Recommendations:"
      rec1: "Provide VIP exclusive services to high-value customers"
      rec2: "Promote upgrade programs for mid-value customers"
      rec3: "Activate promotional campaigns for low-value customers"

    clv_recommendations:
      title: "📈 CLV Enhancement Strategy"
      line1: "Current Avg CLV: ${clv}"
      line2: "AOV: ${aov}"
      line3: "Repurchase Rate: {purchase_frequency} times/person"
      optimization_title: "🎯 Optimization Directions:"
      opt1: "1. Increase AOV: Bundle sales, gift with purchase"
      opt2: "2. Increase purchase frequency: Membership programs, regular offers"
      opt3: "3. Extend customer lifetime: Loyalty rewards, after-sales service"

    consistency_analysis:
      title: "⚖️ Revenue Consistency Analysis"
      score_line: "Consistency Score: {score}%"
      cv_line: "Coefficient of Variation: {cv}"
      excellent_level: "✅ Excellent: Stable revenue performance, solid customer base"
      excellent_advice: "Recommendation: Maintain current strategy, continue optimization"
      good_level: "⚠️ Good: Moderate revenue fluctuation"
      good_advice_title: "Recommendations:"
      good_advice1: "- Analyze characteristics of high-volatility customers"
      good_advice2: "- Establish tiered customer management"
      good_advice3: "- Balance investment in new and existing customers"
      poor_level: "🔴 Needs Improvement: High revenue volatility"
      poor_advice_title: "Recommendations:"
      poor_advice1: "- Diversify customer sources"
      poor_advice2: "- Reduce dependence on single large customers"
      poor_advice3: "- Establish early warning mechanisms"

  # Empty state messages
  empty_state:
    default: "Click 'Generate AI Insights' button to view analysis"
    processing: "Analyzing..."
    error: "AI insights generation failed, please try again later"

# Download File Names
downloads:
  customer_revenue:
    filename: "customer_revenue_{date}.csv"
  clv_segments:
    filename: "clv_segments_{date}.csv"

# UI Buttons Extension
ui_buttons:
  download_revenue_list: "Download Complete Customer Revenue List"
  download_clv_segments: "Download Customer List"

# Insights Tab Names
insights:
  tabs:
    revenue_summary:
      name: "Revenue Summary"
      icon: "chart-pie"
    arpu_analysis:
      name: "ARPU Analysis"
      icon: "dollar-sign"
    clv_recommendations:
      name: "CLV Optimization"
      icon: "chart-line"
    consistency_insights:
      name: "Consistency Insights"
