# Help Text
help:
  overview: |
    Revenue Pulse Analysis module helps you quantify revenue health and identify high-value customers.
    Optimize resource allocation and profit structure through Pareto analysis and CLV segmentation.

  core_metrics: |
    Core Revenue Metrics Explanation:

    1. Total Sales: Total amount of all transactions, reflects business scale

    2. ARPU (Average Revenue Per User):
       - Calculation: Total Revenue / Customer Count
       - Meaning: Average contribution per customer
       - Use: Evaluate customer value and pricing strategy

    3. CLV (Customer Lifetime Value):
       - Calculation: ARPU × Purchase Frequency × Customer Lifetime
       - Meaning: Long-term customer value
       - Use: Guide customer acquisition cost and investment decisions

    4. AOV (Average Order Value):
       - Calculation: Total Revenue / Order Count
       - Meaning: Single purchase amount
       - Use: Optimize product mix and promotion strategy

  consistency_score: |
    Revenue Consistency Score:
    Comprehensive assessment of revenue consistency and predictability (0-100 points)

    Assessment Dimensions:
    1. Revenue Volatility (40%): Lower coefficient of variation means more stable
    2. Growth Consistency (30%): Stability of growth rate
    3. Customer Concentration (30%): Distribution of revenue sources

    Score Interpretation:
    - 80+ points: Excellent, very healthy business
    - 60-79 points: Good, slight fluctuations
    - 40-59 points: Moderate, noticeable fluctuations
    - Below 40 points: Poor, higher risk

  pareto_analysis: |
    Pareto 80/20 Rule Analysis:

    Basic Concept:
    - Typically 80% of revenue comes from 20% of customers
    - Identifying high-value customers is key

    Three Customer Segments:
    1. Top 20% (Top Performers):
       - Contribute 70-90% of revenue
       - Need premium service and full maintenance

    2. Middle 60% (Mid-tier):
       - Contribute 10-25% of revenue
       - Have growth potential, worth cultivating

    3. Bottom 20% (Low Value):
       - Contribute 0-5% of revenue
       - Basic service, selective investment

    Application Recommendations:
    - Prioritize resource allocation to high-value customers
    - Develop differentiated service strategies
    - Continuously monitor segment changes

  clv_segments: |
    CLV Customer Segment Analysis:
    Divided into four tiers based on customer lifetime value:

    1. Platinum Customers (Top 10%):
       - Highest value segment
       - Strategy: Premium service, full maintenance

    2. Gold Customers (10-25%):
       - High-value segment
       - Strategy: Quality service, active enhancement

    3. Silver Customers (25-75%):
       - Mid-value segment
       - Strategy: Standard service, continuous cultivation

    4. Bronze Customers (75-100%):
       - Basic value segment
       - Strategy: Basic service, selective investment

  best_practices: |
    Analysis Recommendations:
    1. Regularly track core revenue metric changes
    2. Maintain healthy Pareto balance (avoid over-concentration)
    3. Focus investment on high CLV customers
    4. Increase ARPU and AOV to boost total revenue
    5. Monitor revenue consistency to reduce business risk
    6. Use AI insights to develop precise revenue optimization strategies

# Hints
hints:
  total_revenue: "Total revenue is the sum of all customer transactions, reflecting business scale"
  arpu: "ARPU is the average revenue contribution per customer; higher values indicate greater customer value"
  clv: "CLV represents total customer value over their lifecycle, used to evaluate long-term investment returns"
  consistency_score: "Higher consistency score indicates more predictable revenue and lower business risk. If score is too low, recommend diversifying revenue sources."
  consistency: "Transaction consistency reflects customer purchase behavior consistency; higher is more stable"
  revenue_distribution: "Revenue distribution reflects customer value differences. Ideally should show long-tail distribution, with few high-value and many mid-low value customers."
  pareto: "Pareto analysis helps identify high-value customers; maintaining these customers is key to revenue retention"
  pareto_curve: "Steeper curve indicates more concentrated revenue. If curve is too steep (top 20% contribute over 90%), indicates over-dependence on few customers, higher risk."
  clv_segments: "CLV segmentation helps develop differentiated strategies. Platinum and Gold customers should receive most resources and attention."
  revenue_trends: "Focus on trends rather than single values. Continuously rising trend indicates healthy business growth."

# Action Recommendations
