  sections:
    overview: "Revenue Overview"
    revenue_metrics: "Core Metrics"
    consistency_score: "Revenue Consistency Score"
    revenue_distribution: "Revenue Distribution"
    pareto_analysis: "Pareto 80/20 Analysis"
    revenue_segments: "Customer Revenue Segments"
    arpu_analysis: "ARPU Analysis"
    clv_segments: "CLV Customer Segments"
    clv_distribution: "Customer Lifetime Value Distribution"
    revenue_trends: "Revenue Trends"
    contribution_analysis: "Contribution Analysis"
    top_customers: "Top Value Customers"
