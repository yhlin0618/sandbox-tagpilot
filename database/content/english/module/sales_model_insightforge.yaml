# Translation mappings for regression results
# Maps original Chinese output from regression function to translated text
translation_map:
  interpretation:
    # Error messages
    "資料不足": "Model fitting failed"
    "缺少銷量資料": "Model fitting failed"
    "銷量資料無效": "Model fitting failed"
    "模型擬合失敗": "Model fitting failed"
    # Positive impacts
    "強烈.*正面影響": "Strong positive impact on sales"
    "中等.*正面影響": "Moderate positive impact on sales"
    "微弱.*正面影響": "Weak positive impact on sales"
    # Negative impacts
    "強烈.*負面影響": "Strong negative impact on sales"
    "中等.*負面影響": "Moderate negative impact on sales"
    "微弱.*負面影響": "Weak negative impact on sales"

  meaning:
    # Error messages
    "無法分析": "Unable to analyze"
    # Negative impact (new)
    "不需要強調，會負向影響銷售": "No need to emphasize, negatively impacts sales"
    # Positive impact levels
    "影響很小，不是關鍵因素": "Minimal impact, not a key factor"
    "有一定影響，可考慮優化": "Some impact, consider optimizing"
    "重要影響因素，應重點關注": "Important factor, focus attention"
    "極重要因素，是核心競爭力": "Critical factor, core competency"

