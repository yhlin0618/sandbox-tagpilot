# DNA Metrics Definition (7 Dimensions)
dna_metrics:
  # M - Monetary
  monetary:
    name: "M - Monetary"
    short_name: "M"
    full_name: "Monetary"
    description: "Customer's total spending amount"
    icon: "💰"
    unit: "$"
    interpretation: "Higher spending indicates greater customer value"

  # R - Recency
  recency:
    name: "R - Recency"
    short_name: "R"
    full_name: "Recency"
    description: "Days since last purchase"
    icon: "🕒"
    unit: "days"
    interpretation: "Fewer days indicates more active customer"
    reverse: true  # Lower is better

  # F - Frequency
  frequency:
    name: "F - Frequency"
    short_name: "F"
    full_name: "Frequency"
    description: "Total number of purchases"
    icon: "🔁"
    unit: "times"
    interpretation: "More purchases indicates higher loyalty"

  # IPT - Inter-Purchase Time
  ipt:
    name: "IPT - Inter-Purchase Time"
    short_name: "IPT"
    full_name: "Inter-Purchase Time"
    description: "Average days between purchases"
    icon: "⏱️"
    unit: "days"
    interpretation: "Shorter interval indicates higher purchase frequency"
    reverse: true

  # CAI - Customer Activity Index
  cai:
    name: "CAI - Customer Activity Index"
    short_name: "CAI"
    full_name: "Customer Activity Index"
    description: "Comprehensive activity metric"
    icon: "📈"
    unit: "index"
    range: [0, 1]
    interpretation: "Higher index indicates more active customer"

  # PCV - Past Customer Value
  pcv:
    name: "PCV - Past Customer Value"
    short_name: "PCV"
    full_name: "Past Customer Value"
    description: "Historical total spending value"
    icon: "💎"
    unit: "$"
    interpretation: "Higher historical value indicates more important customer"

  # CRI - Customer Richness Index
  cri:
    name: "CRI - Customer Richness Index"
    short_name: "CRI"
    full_name: "Customer Richness Index"
    description: "Purchase stability score"
    icon: "🎯"
    unit: "score"
    interpretation: "Higher score indicates more stable purchases"

  # NES - Customer Status
  nes:
    name: "NES - Customer Status"
    short_name: "NES"
    full_name: "New/Engaged/Sleeping"
    description: "Customer lifecycle status"
    icon: "🔄"
    unit: "status"
    interpretation: "Tracks customer activity stage"

# RFM Analysis
rfm_analysis:
  # 11 RFM Segments
  segments:
    champions:
      name: "Champions"
      chinese_name: "Champions"
      description: "Best customers with high frequency, high value, and recent purchases"
      criteria: "R=5, F=5, M=5"
      icon: "👑"
      color: "#28a745"
      characteristics:
        - "Highest purchase frequency"
        - "Largest spending amount"
        - "Still active recently"
        - "Extremely high brand loyalty"
      strategy: "Provide highest tier treatment, maintain relationship"
      percentage_range: "5-10%"

    loyal_customers:
      name: "Loyal Customers"
      chinese_name: "Loyal Customers"
      description: "Frequent and stable customers"
      criteria: "R>=3, F>=4"
      icon: "💎"
      color: "#17a2b8"
      characteristics:
        - "High purchase frequency"
        - "Stable spending"
        - "Long-term relationship"
      strategy: "Provide loyalty rewards, encourage referrals"
      percentage_range: "10-15%"

    potential_loyalists:
      name: "Potential Loyalists"
      chinese_name: "Potential Loyalists"
      description: "Recent purchasers with potential to become loyal"
      criteria: "R>=4, F>=2, M>=3"
      icon: "⭐"
      color: "#ffc107"
      characteristics:
        - "Recent purchases"
        - "Decent spending"
        - "High cultivation value"
      strategy: "Offer membership programs, increase interaction"
      percentage_range: "10-15%"

    recent_customers:
      name: "Recent Customers"
      chinese_name: "Recent Customers"
      description: "New first-time purchasers"
      criteria: "R>=4, F=1"
      icon: "🆕"
      color: "#20c997"
      characteristics:
        - "Just joined"
        - "Need cultivation"
        - "Unknown potential"
      strategy: "Provide new customer offers, build trust"
      percentage_range: "15-20%"

    promising:
      name: "Promising"
      chinese_name: "Promising"
      description: "Recent purchasers with substantial spending"
      criteria: "R>=3, F<=2, M>=4"
      icon: "💫"
      color: "#6610f2"
      characteristics:
        - "High order value"
        - "Frequency can improve"
        - "Growth potential"
      strategy: "Cross-sell, increase frequency"
      percentage_range: "5-10%"

    need_attention:
      name: "Need Attention"
      chinese_name: "Need Attention"
      description: "Previously good customers who haven't purchased recently"
      criteria: "R<=3, F>=3, M>=3"
      icon: "⚠️"
      color: "#fd7e14"
      characteristics:
        - "Good past performance"
        - "Recently inactive"
        - "Needs reactivation"
      strategy: "Send care messages, limited-time offers"
      percentage_range: "5-10%"

    about_to_sleep:
      name: "About to Sleep"
      chinese_name: "About to Sleep"
      description: "Declining purchase frequency, churn risk"
      criteria: "R<=3, F<=3, M>=2"
      icon: "😴"
      color: "#e83e8c"
      characteristics:
        - "Declining activity"
        - "Churn signs"
        - "Needs activation"
      strategy: "Personalized offers, re-attract"
      percentage_range: "10-15%"

    at_risk:
      name: "At Risk"
      chinese_name: "At Risk"
      description: "Previously loyal customers now at churn risk"
      criteria: "R<=2, F>=3, M>=3"
      icon: "🚨"
      color: "#dc3545"
      characteristics:
        - "High past value"
        - "Long time since purchase"
        - "High churn risk"
      strategy: "Emergency recovery, understand reasons"
      percentage_range: "5-10%"

    cant_lose_them:
      name: "Can't Lose Them"
      chinese_name: "Can't Lose Them"
      description: "High-value customers who haven't purchased in long time"
      criteria: "R<=2, F>=4, M>=5"
      icon: "💔"
      color: "#721c24"
      characteristics:
        - "Extremely high historical value"
        - "Extreme churn risk"
        - "Must recover"
      strategy: "Highest priority recovery, senior involvement"
      percentage_range: "2-5%"

    hibernating:
      name: "Hibernating"
      chinese_name: "Hibernating"
      description: "Long time since purchase"
      criteria: "R<=2, F<=2, M<=2"
      icon: "💤"
      color: "#6c757d"
      characteristics:
        - "Long-term no interaction"
        - "Low value"
        - "High reactivation cost"
      strategy: "Low-cost reactivation attempts"
      percentage_range: "10-15%"

    lost:
      name: "Lost"
      chinese_name: "Lost"
      description: "Churned customers"
      criteria: "R<=1, F<=2, M<=2"
      icon: "❌"
      color: "#343a40"
      characteristics:
        - "Already churned"
        - "Low value"
        - "Not recommended to invest"
      strategy: "Record reasons, improve products/services"
      percentage_range: "10-20%"

# Customer Lifecycle
customer_lifecycle:
  title: "Customer Status"
  stages:
    new_customer:
      name: "New Customer"
      short_name: "New"
      full_name: "New Customer"
      description: "First-time purchaser"
      icon: "🆕"
      color: "success"
      criteria: "Purchase count = 1"
      strategy: "Build trust, encourage repurchase"

    repeat_customer:
      name: "Repeat Customer"
      short_name: "Repeat"
      full_name: "Repeat Customer"
      description: "Customer with repeat purchases"
      icon: "🔄"
      color: "primary"
      criteria: "Purchase count >= 2 and recent purchase <= 90 days"
      strategy: "Increase loyalty, boost frequency"

    dormant_customer:
      name: "Dormant Customer"
      short_name: "Dormant"
      full_name: "Dormant Customer"
      description: "Customer who hasn't purchased in long time"
      icon: "😴"
      color: "warning"
      criteria: "Recent purchase > 90 days and <= 180 days"
      strategy: "Reactivation actions, re-engage"

    churned_customer:
      name: "Churned Customer"
      short_name: "Churned"
      full_name: "Churned Customer"
      description: "Churned customer"
      icon: "❌"
      color: "danger"
      criteria: "Recent purchase > 180 days"
      strategy: "Analyze reasons, improve service"

# Intelligent Clustering
clustering:
  # Clustering Methods
  methods:
    kmeans:
      name: "K-means Clustering"
      description: "Fast distance-based clustering method"
      parameters:
        min_clusters: 2
        max_clusters: 8
        default_clusters: 5

    hierarchical:
      name: "Hierarchical Clustering"
      description: "Build customer segment tree structure"
      parameters:
        method: "ward.D2"
        distance_metric: "euclidean"

  # Optimal Cluster Number
  optimal_clusters:
    title: "Optimal Cluster Number Analysis"
    methods:
      elbow:
        name: "Elbow Method"
        description: "Find SSE decline rate change point"
      silhouette:
        name: "Silhouette Coefficient"
        description: "Evaluate clustering quality"

  # Cluster Naming
  naming:
    ai_naming:
      name: "AI Smart Naming"
      description: "Automatically generate meaningful names based on segment characteristics"
    manual_naming:
      name: "Manual Naming"
      description: "Name each segment yourself"

# AI-Enhanced Analysis
ai_analysis:
  types:
    metric_description:
      name: "Metric Description"
      description: "Explain business significance of selected metrics"
      prompt_category: "dna_metric_description"
      icon: "📊"

    distribution_insight:
      name: "Distribution Insight"
      description: "Analyze metric distribution characteristics and anomalies"
      prompt_category: "dna_distribution_insight"
      icon: "📈"

    segment_profiling:
      name: "Segment Profiling"
      description: "Generate detailed profile for each segment"
      prompt_category: "dna_segment_profiling"
      icon: "👥"

    marketing_recommendations:
      name: "Marketing Recommendations"
      description: "Marketing strategy recommendations for different segments"
      prompt_category: "dna_marketing_recommendations"
      icon: "💡"

    churn_prediction:
      name: "Churn Prediction"
      description: "Identify churn risk and provide recovery strategies"
      prompt_category: "dna_churn_prediction"
      icon: "⚠️"

    cross_sell_opportunities:
      name: "Cross-sell Opportunities"
      description: "Discover potential cross-selling opportunities"
      prompt_category: "cross_sell_opportunities"
      icon: "🎁"

# Attribute Extraction
attribute_extraction:
  title: "DNA Attribute Extraction"
  description: "Extract key attributes and characteristics from customer behavior"

  methods:
    ai_extraction:
      name: "AI Auto Extraction"
      description: "Use AI to automatically identify and extract attributes"
      max_attributes: 30
      min_attributes: 5

    rule_based:
      name: "Rule-based Extraction"
      description: "Extract attributes based on predefined rules"

  attribute_categories:
    behavioral:
      name: "Behavioral Attributes"
      description: "Purchase behavior related features"
      examples: ["High frequency purchasing", "Night shopping preference", "Weekend shopping"]

    value_based:
      name: "Value Attributes"
      description: "Spending value related features"
      examples: ["High order value", "Discount sensitive", "Quality oriented"]

    loyalty:
      name: "Loyalty Attributes"
      description: "Loyalty related features"
      examples: ["Long-term customer", "Brand advocate", "Referrer"]

# Chart Configuration
charts:
  histogram_title: "Distribution Histogram"

  # Chart labels for tooltips and hover text
  labels:
    value: "Value"
    count: "Count"
    percentage: "Percentage"

  # Chart axes titles
  axes:
    value: "Value"
    count: "Count"
    frequency: "Frequency"
    customer_count: "Customer Count"
    nes_status: "NES Status"

  # Chart titles
  titles:
    distribution: "Distribution"
    histogram: "Histogram"
    nes_distribution: "NES Status Distribution"

  # Metric Distribution Histogram
  metric_histogram:
    title: "{metric} Distribution"
    x_axis: "{metric}"
    y_axis: "Customer Count"
    tooltip: "{bin}: {count} customers"

  # Scatter Plot
  scatter_plot:
    title: "{x_metric} vs {y_metric}"
    x_axis: "{x_metric}"
    y_axis: "{y_metric}"
    tooltip: "Customer {id}: {x}={x_value}, {y}={y_value}"

  # Clustering Result Scatter Plot
  clustering_scatter:
    title: "Customer Clustering Results"
    x_axis: "Dimension 1"
    y_axis: "Dimension 2"
    tooltip: "Segment {segment}: {count} customers"

  # RFM Heatmap
  rfm_heatmap:
    title: "RFM Distribution Heatmap"
    x_axis: "Frequency (F)"
    y_axis: "Recency (R)"
    color: "Monetary (M)"
    tooltip: "R={r}, F={f}, M={m}: {count} customers"

  # Segment Feature Radar Chart
  segment_radar:
    title: "Segment Feature Radar Chart"
    dimensions: ["M", "R", "F", "IPT", "CAI", "PCV", "CRI"]
    tooltip: "{segment} - {dimension}: {value}"

  # Lifecycle Distribution
  lifecycle_pie:
    title: "Customer Lifecycle Distribution"
    tooltip: "{stage}: {count} customers ({percentage}%)"

  # Elbow Chart
  elbow_chart:
    title: "Optimal Cluster Number Analysis (Elbow Method)"
    x_axis: "Number of Clusters"
    y_axis: "SSE (Within-cluster Sum of Squares)"
    tooltip: "{k} clusters: SSE = {sse}"

  # Silhouette Chart
  silhouette_chart:
    title: "Optimal Cluster Number Analysis (Silhouette Coefficient)"
    x_axis: "Number of Clusters"
    y_axis: "Average Silhouette Coefficient"
    tooltip: "{k} clusters: coefficient = {score}"

# Units
units:
  days: "days"
  times: "times"
  people: "customers"

