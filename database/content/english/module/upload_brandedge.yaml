# Data Limits
limits:
  max_file_size: 50  # MB
  max_reviews: 1000
  max_brands: 20
  max_file_size_display: "50MB"

# Supported Formats
formats:
  supported: "Supported Formats"
  excel: "Excel (.xlsx, .xls)"
  csv: "CSV (.csv)"

# Help Text
help:
  overview: |
    Please upload a data file containing brand reviews. The system will automatically validate the data format and extract brand information.

  file_format: |
    File Format Requirements:
    - Supports Excel (.xlsx, .xls) or CSV (.csv) format
    - File size not exceeding 50MB
    - Must contain Variation (brand name), Title, and Body columns

  data_requirements: |
    Data Requirements:
    - Maximum 1000 reviews
    - Maximum 20 brands
    - Each review must have complete title and content

  column_mapping: |
    Column Description:
    - Variation: Brand or product name (required)
    - Title: Review title (required)
    - Body: Review content (required)
    - Rating: Rating, usually 1-5 scale (optional)
    - Date: Review date (optional)

# Sample Data
sample:
  title: "Data Format Example"
  download_text: "Download Template File"
  description: "Download template file to understand the correct data format"
