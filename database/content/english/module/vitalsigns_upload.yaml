# Help Text
help:
  overview: |
    VitalSigns Data Upload module supports CSV and Excel format customer transaction data.
    System will auto-detect file format and validate data integrity.

  file_requirements: |
    File Requirements:
    - Supports CSV (.csv) or Excel (.xlsx, .xls) format
    - File size not exceeding 200MB
    - Maximum 12 files per upload (system will auto-merge)
    - UTF-8 encoding recommended

  data_requirements: |
    Data Requirements:
    - Minimum 10 transaction records
    - Minimum 10 unique customers
    - Minimum 3 months of transaction history (12 months recommended)
    - Must contain complete Customer ID, Time, Amount fields

  column_requirements: |
    Required Fields:
    - Customer ID/Email: Unique customer identifier (e.g., Email, Member ID)
    - Purchase Time: Transaction date/time
    - Transaction Amount: Transaction amount (must be positive)

    Optional Fields:
    - Platform ID: Sales platform or channel (e.g., Amazon, Website)
    - Product ID: Product identifier or SKU

  amazon_format: |
    Amazon Report Format Support:
    System can auto-detect and process Amazon sales reports, supporting:
    - Buyer Email → Customer ID
    - Purchase Date / Payments Date → Purchase Time
    - Item Price → Transaction Amount

    Directly upload reports downloaded from Amazon Seller Central.

  multi_file_upload: |
    Multi-File Upload:
    - Select multiple files at once (maximum 12)
    - System will automatically merge all files
    - Suitable for monthly separated report files
    - All files must have identical column structure

  troubleshooting: |
    Common Issues:

    Q: Why can't columns be detected?
    A: Ensure first row contains column names with clear labels

    Q: How to handle date format issues?
    A: System supports multiple date formats, recommend YYYY-MM-DD or YYYY-MM-DD HH:MM:SS

    Q: Can I upload data from different platforms?
    A: Yes, use optional "Platform ID" field to distinguish sources

    Q: Do I need to pre-clean data?
    A: System will handle common format issues, but recommend removing obvious errors

