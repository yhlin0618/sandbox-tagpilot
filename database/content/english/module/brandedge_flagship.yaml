# Help Text
help:
  overview: |
    BrandEdge Brand Positioning Engine is an enterprise-level brand positioning analysis platform.
    Through AI deep analysis of customer reviews, it provides comprehensive brand strategy recommendations.

  workflow: |
    Analysis Workflow:
    1. Upload Review Data - Upload Excel or CSV file containing brand reviews
    2. Extract Attributes - AI automatically extracts 10-30 key product attributes from reviews
    3. Attribute Scoring - System scores all attributes for each review (1-5 scale)
    4. Run Analysis - Select analysis modules to execute and generate strategy reports

  attributes_extraction: |
    Attribute Extraction Guide:
    - System automatically extracts product attributes that consumers care about from reviews
    - Select 10-30 attributes (15 recommended)
    - Extraction time: approximately 2-5 minutes
    - Automatically removes duplicate and irrelevant attributes

  attributes_scoring: |
    Attribute Scoring Guide:
    - System scores all attributes for each review (1-5 scale)
    - Scoring based on positive/negative descriptions of attributes in review content
    - Scoring time depends on number of reviews and attributes
    - Supports batch processing for efficiency

  analysis_modules: |
    Eight Analysis Modules:
    1. Market Profile - Market segmentation and customer group analysis
    2. Market Track - Growth opportunity identification and strategic priorities
    3. DNA Analysis - Brand DNA radar chart and competitiveness assessment
    4. Key Factors - Success factor identification
    5. Ideal Point - Target achievement analysis
    6. Strategy Positioning - Four-quadrant strategy recommendations
    7. Brand Identity - Differentiation analysis
    8. AI Insights - Comprehensive strategy report

