# Server Content
server:
  # Customer Type Labels (NES Status)
  customer_types:
    N: "New Customer"
    E0: "Core Customer"
    S1: "Dozing Customer"
    S2: "Semi-Dormant Customer"
    S3: "Dormant Customer"
    other: "Other"

  # Chart Content
  charts:
    # Customer Pool Structure Chart
    structure:
      title: "Customer Status Distribution"
      hover_template: "Customers: {value}<br>Percentage: {percent}"

    # Acquisition Funnel Chart
    funnel:
      title: "Customer Conversion Funnel"
      stages:
        first_purchase: "First Purchase"
        repeat_purchase: "Repeat Purchase"
        multiple_purchase: "Multiple Purchases"
        core_customer: "Core Customer"
      hover_template: "Customers: {x}<br>Conversion Rate: {text}"

    # Customer Growth Trend Chart
    growth:
      title: "Monthly Customer Growth Trend"
      x_axis: "Month"
      y_axis: "Customers"
      y_axis_secondary: "Growth Rate (%)"
      series:
        monthly_customers: "Monthly Customers"
        growth_rate: "Growth Rate (%)"
      hover_customers: "Customers: {y}"
      hover_growth: "Growth Rate: {y}%"

    # Static Analysis Chart (when no time series data available)
    static:
      title: "Customer Purchase Frequency Distribution"
      x_axis: "Purchase Count"
      y_axis: "Customers"
      groups:
        once: "1 time"
        twice: "2 times"
        three_to_five: "3-5 times"
        six_to_ten: "6-10 times"
        more_than_ten: "10+ times"
      hover_template: "Customers: {y}"

  # AI Analysis Templates
  ai:
    # Customer Acquisition Rate Analysis Template
    acquisition_analysis:
      title: "📊 New Customer Acquisition Efficiency Assessment"
      metrics:
        new_customers: "New Customers: <strong>{value}</strong>"
        acquisition_rate: "Acquisition Rate: <strong>{value}%</strong>"
        industry_benchmark: "Industry Benchmark: E-commerce 15-25%"
      evaluation_prefix: "Assessment:"
      evaluation:
        low: "Below industry average, need to strengthen acquisition"
        high: "Above industry average, excellent performance"
        normal: "Meets industry standards"
      strategy_title: "💡 Strategic Recommendations"
      strategies:
        low_rate:
          - "Consider increasing marketing budget and expanding acquisition channels"
          - "Launch exclusive offers for new customers to improve conversion"
        normal_rate:
          - "Maintain current acquisition strategy while continuing optimization"
          - "Focus on improving customer lifetime value"
      # HTML Template
      html_template: |
        <div style='padding: 15px; background: #f8f9fa; border-radius: 8px;'>
        <h6 style='color: #2c3e50; margin-bottom: 10px;'>📊 New Customer Acquisition Efficiency Assessment</h6>
        <ul style='margin: 0; padding-left: 20px;'>
          <li>New Customers: <strong>%d</strong></li>
          <li>Acquisition Rate: <strong>%.1f%%</strong></li>
          <li>Industry Benchmark: E-commerce 15-25%%</li>
          <li>Assessment: %s</li>
        </ul>
        <h6 style='color: #2c3e50; margin-top: 15px; margin-bottom: 10px;'>💡 Strategic Recommendations</h6>
        <ul style='margin: 0; padding-left: 20px;'>
          <li>%s</li>
          <li>%s</li>
        </ul>
        </div>

    # Customer Change Rate Analysis Template
    change_rate_analysis:
      title: "🔍 Customer Pool Health Diagnosis"
      metrics:
        active_rate: "Active Rate: <strong>{value}%</strong>"
        health_status: "Health Status: <strong>{status}</strong>"
        dormant_rate: "Dormant Customer Rate: <strong>{value}%</strong>"
      health_levels:
        healthy: "Healthy"
        warning: "Warning"
        danger: "Critical"
      prevention_title: "🛡️ Risk Prevention Measures"
      prevention_strategies:
        high_risk:
          - "Immediately launch customer reactivation campaign"
          - "Offer exclusive deals for dormant customers"
          - "Establish customer churn early warning system"
        low_risk:
          - "Regularly monitor customer activity"
          - "Strengthen customer engagement frequency"
          - "Establish customer churn early warning system"
      # HTML Template
      html_template: |
        <div style='padding: 15px; background: #fff3e0; border-radius: 8px;'>
        <h6 style='color: #e65100; margin-bottom: 10px;'>🔍 Customer Pool Health Diagnosis</h6>
        <ul style='margin: 0; padding-left: 20px;'>
          <li>Active Rate: <strong>%.1f%%</strong></li>
          <li>Health Status: <strong>%s</strong></li>
          <li>Dormant Customer Rate: <strong>%.1f%%</strong></li>
        </ul>
        <h6 style='color: #e65100; margin-top: 15px; margin-bottom: 10px;'>🛡️ Risk Prevention Measures</h6>
        <ul style='margin: 0; padding-left: 20px;'>
          <li>%s</li>
          <li>%s</li>
          <li>%s</li>
        </ul>
        </div>

    # AI Error Messages
    error: "AI analysis error: {message}"

    # AI Data Summary Field Names (for preparing analysis data)
    data_fields:
      new_customers_label: "New Customers: "
      total_customers_label: "Total Customers: "
      acquisition_rate_label: "Acquisition Rate: "
      active_customers_label: "Active Customers: "
      net_change_rate_label: "Customer Change Rate: "
      customer_structure_label: "Customer Structure: "
      status_format: "%s: %d customers (%.1f%%)"
