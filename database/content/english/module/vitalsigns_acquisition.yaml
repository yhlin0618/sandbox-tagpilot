# ==========================================
# VitalSigns - Acquisition Module Language Content (English)
# ==========================================
# Customer Acquisition Analysis Module Language Content (English)
# Version: 1.0.0
# Last Updated: 2025-10-11

# Module Basic Information
title: "Customer Acquisition Analysis"
subtitle: "New Customer Sources, Growth Trends & Cohort Analysis"
description: "Track new customer acquisition efficiency, analyze cohort performance, evaluate acquisition strategy effectiveness"

# UI Sections
ui:
  # KPI Labels
  kpis:
    active_customers: "Total Customers"
    cumulative_customers: "Cumulative Customers"
    acquisition_rate: "Customer Acquisition Rate"
    net_change_rate: "Customer Change Rate"

  # Card Titles and Content
  cards:
    customer_structure: "Customer Pool Structure Analysis"
    acquisition_funnel: "Acquisition Funnel Analysis"
    growth_trend: "Customer Growth Trend"
    growth_trend_notice: "Note: Trend analysis requires time series data. Currently showing static analysis"
    ai_analysis: "🤖 AI Customer Growth Analysis"
    acquisition_analysis_title: "Customer Acquisition Rate Analysis"
    change_rate_analysis_title: "Customer Change Rate Analysis"
    details: "Customer Growth Metrics Details"

  # Buttons
  buttons:
    download_details: "📥 Download Complete Customer List"
    analyze: "Start Analysis"
    refresh: "Refresh"
    export_cohort: "Export Cohort Data"
    generate_insights: "Generate AI Insights"
    compare_periods: "Compare Periods"

  sections:
    overview: "Acquisition Overview"
    new_customers: "New Customer Acquisition"
    growth_trends: "Growth Trends"
    cohort_analysis: "Cohort Analysis"
    acquisition_channels: "Acquisition Channels"
    quality_metrics: "Acquisition Quality"
    ai_insights: "AI Insights"

  # Control Panel
  controls:
    title: "Analysis Controls"
    time_period: "Time Period"
    cohort_definition: "Cohort Definition"
    metric_selection: "Metric Selection"
    comparison_mode: "Comparison Mode"
    period_selector: "Time Granularity:"

    # Time Period Options
    period_options:
      daily: "Daily"
      weekly: "Weekly"
      monthly: "Monthly"
      quarterly: "Quarterly"

# Metrics Definition
metrics:
  # Core Metrics
  total_new_customers:
    name: "New Customers"
    short_name: "New Customers"
    description: "Number of first-time purchasing customers"
    icon: "user-plus"
    unit: "customers"

  new_customer_rate:
    name: "New Customer Rate"
    short_name: "New Rate"
    description: "Proportion of new customers to total customers"
    icon: "percentage"
    unit: "%"

  acquisition_growth_rate:
    name: "Acquisition Growth Rate"
    short_name: "Growth Rate"
    description: "Growth in new customers compared to previous period"
    icon: "chart-line"
    unit: "%"

  avg_first_purchase:
    name: "Average First Purchase"
    short_name: "First Purchase"
    description: "Average amount of new customer's first purchase"
    icon: "dollar-sign"
    unit: "$"

  new_customer_revenue_pct:
    name: "New Customer Revenue Contribution"
    short_name: "New Rev %"
    description: "Proportion of revenue from new customers"
    icon: "pie-chart"
    unit: "%"

  # Growth Metrics
  mom_growth:
    name: "MoM Growth Rate"
    description: "Growth rate compared to last month"
    formula: "((This Month - Last Month) / Last Month) × 100%"

  qoq_growth:
    name: "QoQ Growth Rate"
    description: "Growth rate compared to last quarter"
    formula: "((This Quarter - Last Quarter) / Last Quarter) × 100%"

  yoy_growth:
    name: "YoY Growth Rate"
    description: "Growth rate compared to same period last year"
    formula: "((This Year - Last Year) / Last Year) × 100%"

  # Cohort Metrics
  cohort_size:
    name: "Cohort Size"
    description: "Number of new customers acquired in this period"

  cohort_retention:
    name: "Cohort Retention"
    description: "Retention rate of cohort in subsequent months"

  cohort_revenue:
    name: "Cohort Cumulative Revenue"
    description: "Total revenue generated by this cohort"

  cohort_clv:
    name: "Cohort Average CLV"
    description: "Average customer lifetime value of this cohort"

# Cohort Analysis
cohort:
  # Definition Methods
  definitions:
    by_month:
      name: "Monthly Cohorts"
      description: "Group by customer's first purchase month"
    by_quarter:
      name: "Quarterly Cohorts"
      description: "Group by customer's first purchase quarter"
    by_year:
      name: "Yearly Cohorts"
      description: "Group by customer's first purchase year"

  # Time Periods
  time_periods:
    month_0: "M0 (Current Month)"
    month_1: "M1"
    month_2: "M2"
    month_3: "M3"
    month_6: "M6"
    month_12: "M12"

  # Chart Labels
  chart_labels:
    cohort_period: "Cohort (First Purchase Time)"
    time_since_first: "Time Since First Purchase"
    retention_rate: "Retention Rate"
    revenue_contribution: "Revenue Contribution"

# Growth Analysis
growth:
  # Growth Types
  types:
    absolute: "Absolute Growth"
    relative: "Relative Growth Rate"
    cumulative: "Cumulative Growth"

  # Comparison Periods
  comparison_periods:
    previous_month: "Previous Month"
    previous_quarter: "Previous Quarter"
    previous_year: "Previous Year"
    same_period_last_year: "Same Period Last Year"

  # Trend Assessment
  trends:
    accelerating: "Accelerating Growth"
    steady: "Steady Growth"
    slowing: "Slowing Growth"
    declining: "Negative Growth"

# Acquisition Quality
quality:
  # Quality Metrics
  metrics:
    repeat_purchase_rate:
      name: "First Purchase Repeat Rate"
      description: "Proportion of new customers who repurchase within a period"

    time_to_second_purchase:
      name: "Time to Repurchase"
      description: "Average days from first to second purchase"

    first_year_retention:
      name: "First Year Retention"
      description: "Proportion of new customers who continue purchasing in first year"

    avg_lifetime_value:
      name: "Average Lifetime Value"
      description: "Expected lifetime value of new customers"

  # Quality Tiers
  tiers:
    high_quality:
      name: "High Quality Acquisition"
      description: "New customers with high repurchase and high value"
      color: "success"

    medium_quality:
      name: "Medium Quality Acquisition"
      description: "New customers with moderate repurchase and value"
      color: "warning"

    low_quality:
      name: "Low Quality Acquisition"
      description: "New customers with low repurchase or low value"
      color: "danger"

# Chart Configuration
charts:
  # New Customer Trend Chart
  new_customer_trend:
    title: "New Customer Acquisition Trend"
    x_axis: "Time"
    y_axis: "New Customers"
    tooltip: "{date}: {count} new customers"

  # Growth Rate Chart
  growth_rate_chart:
    title: "Acquisition Growth Rate"
    x_axis: "Time Period"
    y_axis: "Growth Rate (%)"
    types:
      mom: "MoM Growth"
      qoq: "QoQ Growth"
      yoy: "YoY Growth"

  # Cohort Heatmap
  cohort_heatmap:
    title: "Cohort Retention Heatmap"
    x_axis: "Months Since First Purchase"
    y_axis: "Cohort (First Purchase Time)"
    color_scale: "Retention Rate"
    tooltip: "Cohort {cohort}, {month} months later: {rate}%"

  # First Purchase Distribution
  first_purchase_distribution:
    title: "First Purchase Amount Distribution"
    x_axis: "First Purchase Range"
    y_axis: "Customer Count"
    bins: ["0-500", "500-1000", "1000-2000", "2000-5000", "5000+"]

  # Acquisition Channels
  acquisition_channels:
    title: "New Customer Acquisition Channels"
    tooltip: "{channel}: {count} customers ({percentage}%)"

# Messages
messages:
  # Success Messages
  success:
    analysis_complete: "✅ Acquisition analysis complete"
    cohort_generated: "✅ Cohort analysis generated"
    insights_generated: "✅ AI insights generated"

  # Processing Messages
  processing:
    analyzing: "Analyzing new customer data..."
    generating_cohorts: "Generating cohort analysis..."
    calculating_growth: "Calculating growth metrics..."

  # Error Messages
  error:
    insufficient_data: "❌ Insufficient data for acquisition analysis"
    no_new_customers: "❌ No new customers in selected period"
    cohort_analysis_failed: "❌ Cohort analysis failed"

  # Warning Messages
  warning:
    few_cohorts: "⚠️ Few cohorts available, analysis may be limited"
    short_period: "⚠️ Short analysis period, growth trends may not be clear"

  # Info Messages
  info:
    new_customers_found: "Found {count} new customers"
    cohorts_generated: "Generated {count} cohorts"
    analyzing_period: "Analysis period: {start} to {end}"

# AI Analysis Types
ai_analysis:
  types:
    acquisition_trend:
      name: "Acquisition Trend Analysis"
      description: "Analyze new customer acquisition time trends and seasonal patterns"
      prompt_category: "acquisition_trend"

    cohort_performance:
      name: "Cohort Performance Assessment"
      description: "Compare retention and value performance across cohorts"
      prompt_category: "cohort_performance"

    growth_drivers:
      name: "Growth Drivers"
      description: "Identify key factors driving acquisition growth"
      prompt_category: "growth_drivers"

    quality_assessment:
      name: "Acquisition Quality Assessment"
      description: "Evaluate quality and long-term value of new customers"
      prompt_category: "quality_assessment"

# AI Features Configuration
ai:
  # Data Summary Template (for AI analysis)
  data_summary_template: |
    New Customers: {new_customers}
    Total Customers: {total_customers}
    Acquisition Rate: {acquisition_rate}%
    Average First Purchase: ${avg_first_purchase}
    New Customer Revenue %: {new_customer_revenue_pct}%

    Cohort Analysis:
    - Tracking {cohort_count} cohorts
    - Latest cohort size: {latest_cohort_size} customers
    - Average retention (3 months): {avg_retention_3m}%

  # Default AI Prompt Template
  default_prompt_template: "Please analyze the following customer acquisition data and provide insights and recommendations:\n\n{data}"

  # AI Insights Display
  insights_title: "AI Analysis Results"
  generated_at: "Generated at:"

# Help Text
help:
  overview: |
    Customer Acquisition Analysis module helps you track and optimize new customer acquisition strategies.
    Gain deep insights into acquisition efficiency and quality through cohort analysis and growth trends.

  new_customer_definition: |
    New Customer Definition:
    - Customers making their first purchase in the system
    - "First purchase date" is used as acquisition time
    - Each customer is counted only once

  cohort_analysis: |
    Cohort Analysis:
    - Group customers who made first purchase in the same period
    - Track behavior performance of each group over time
    - Compare quality differences between customers acquired in different periods
    - Evaluate long-term effectiveness of acquisition strategies

  growth_metrics: |
    Growth Metrics Explanation:
    - MoM (Month-over-Month): Monthly growth rate, compared to previous month
    - QoQ (Quarter-over-Quarter): Quarterly growth rate, compared to previous quarter
    - YoY (Year-over-Year): Annual growth rate, compared to same period last year

  quality_metrics: |
    Acquisition Quality Assessment:
    - First Purchase Repeat Rate: Measures new customer stickiness
    - Time to Repurchase: Reflects customer activity level
    - First Year Retention: Early indicator of long-term value
    - Average CLV: Expected lifetime value of new customers

  best_practices: |
    Analysis Recommendations:
    1. Regularly track acquisition trends to detect anomalies early
    2. Compare cohort performance to optimize acquisition strategies
    3. Focus on acquisition quality, not just quantity
    4. Combine channel analysis to find most effective acquisition channels
    5. Use AI insights to discover hidden patterns and opportunities

# Hints
hints:
  active_customers: "Total active customers reflects current business scale and customer base size."
  cumulative_customers: "Cumulative customers is the total number of customers acquired since inception, showing customer base growth."
  acquisition_rate: "Customer acquisition rate is the ratio of newly acquired customers to total customers, reflecting growth momentum."
  net_change_rate: "Net change rate is the net change in customer count. Positive values indicate growth, negative values indicate decline."
  cohort_heatmap: "Darker colors indicate higher retention. Read horizontally to understand single cohort retention changes; read vertically to compare acquisition quality across periods."
  growth_rate: "Positive values indicate growth, negative values indicate decline. Focus on growth rate trends rather than single period values."
  first_purchase: "First purchase amount distribution reflects accuracy of acquisition targeting. Ideally should align with your target customer value."
  quality_metrics: "High quality acquisition characteristics: fast repurchase, high retention, high lifetime value."

# Statistics Terms
statistics:
  mean: "Mean"
  median: "Median"
  std_dev: "Standard Deviation"
  percentile: "Percentile"
  correlation: "Correlation"
  significance: "Significance"

# Table Columns
tables:
  cohort:
    columns:
      cohort: "Cohort"
      months_since_first: "Months Since First"
      customers: "Customers"
      cohort_size: "Cohort Size"
