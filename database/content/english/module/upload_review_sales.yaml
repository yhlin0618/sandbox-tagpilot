# Column descriptions
column_descriptions:
  review:
    title: "📋 Review Data Column Descriptions"
    columns:
      - name: "Variation"
        type: "String"
        required: true
        description: "Product/Brand identifier (e.g., Amazon ASIN, brand name)"
      - name: "ASIN"
        type: "String"
        required: false
        description: "Amazon Standard Identification Number (optional, can replace Variation)"
      - name: "Title"
        type: "String"
        required: true
        description: "Review title; brief summary; recommended length 10~100 characters"
      - name: "Body"
        type: "String"
        required: true
        description: "Review content; complete experience description; recommended length 50~1000 characters"
    note: "⚡ Column names are case-insensitive: system auto-recognizes variation, Variation, VARIATION, etc."
  sales:
    title: "📋 Sales Data Column Descriptions"
    columns:
      - name: "Variation"
        type: "String"
        required: true
        description: "Product/Brand identifier (must match review data Variation)"
      - name: "ASIN"
        type: "String"
        required: false
        description: "Amazon Standard Identification Number (optional, can replace Variation)"
      - name: "Sales"
        type: "Numeric"
        required: true
        description: "Sales quantity"
      - name: "payment_time"
        type: "Date"
        required: false
        description: "Transaction date (optional, format: YYYY-MM-DD)"
      - name: "price"
        type: "Numeric"
        required: false
        description: "Product unit price (optional)"
    note: "⚡ Sales data Variation must match review data for proper merged analysis"

