# ==========================================
# VitalSigns 精準行銷平台主配置檔案
# ==========================================
# 此檔案定義應用程式層級設定與模組載入順序
# 各模組詳細配置請參考 module_config/ 目錄
# Version: 1.0.0
# Last Updated: 2025-10-11
# Converted from: VitalSigns_premium v18

# ==========================================
# 應用程式基本資訊
# ==========================================
app_info:
  app_id: "vitalsigns"  # Used to determine which language directory to load
  name: "VitalSigns 行銷健檢雷達引擎"  # No <br> - display in navbar
  version: "1.0.0"
  description: "AI驅動的客戶洞察分析平台 - 四大旗艦模組"
  language: "zh_TW.UTF-8"
  tier: "l3_premium"
  edition: "flagship"

# ==========================================
# 語言設定
# ==========================================
language:
  default: "chinese"  # chinese | english | japanese
  available: ["chinese", "english", "japanese"]
  content_path: "database/content"  # 語言內容檔案路徑
  fallback: "chinese"  # 當語言檔案不存在時的備用語言
  enable_user_selection: true  # 允許使用者選擇語言

# ==========================================
# 環境設定
# ==========================================
environment:
  mode: "development"  # development | production
  debug: true
  log_level: "INFO"   # DEBUG | INFO | WARNING | ERROR
  session_timeout: 3600  # 秒
  max_concurrent_users: 50

# ==========================================
# 資料庫配置
# ==========================================
database:
  primary:
    type: "postgresql"
    env_prefix: "PG"  # 環境變數前綴
    pool: true
    max_connections: 10
    timeout: 30

  fallback:
    type: "sqlite"
    path: "database/vitalsigns.db"
    backup_enabled: true

  test_mode: false  # 測試模式強制使用 SQLite

# ==========================================
# API 配置
# ==========================================
api:
  openai:
    enabled: true
    key_env: "OPENAI_API_KEY"
    default_model: "gpt-5-nano"
    max_retries: 3
    timeout: 60
    rate_limit: 100  # requests per minute

# ==========================================
# UI 主題配置
# ==========================================
ui:
  theme:
    framework: "bs4Dash"
    primary_color: "primary"
    bootswatch: "cosmo"

  sidebar:
    enabled: true
    collapsed_on_start: false
    fixed: true
    width: 280

  navbar:
    enabled: true
    fixed: true
    show_notifications: false
    show_user_menu: true
    show_db_status: true

  footer:
    enabled: true
    fixed: true
    left_text: "VitalSigns v1.0 - 精準行銷平台"
    right_text: "© 2025 PeakEdges. All Rights Reserved"

# ==========================================
# 功能開關
# ==========================================
features:
  enable_cache: true
  enable_parallel_processing: true
  enable_auto_save: false
  enable_hints: true
  hint_delay: 500  # 毫秒
  enable_help: true
  show_debug_panel: false
  demo_mode: true

# ==========================================
# 資料處理限制
# ==========================================
data_limits:
  max_upload_size_mb: 200          # 最大上傳檔案大小
  max_customers: 100000            # 最多客戶數
  min_transaction_months: 3        # 最少交易月份
  max_transaction_months: 36       # 最多交易月份
  recommended_months: 12           # 建議交易月份
  min_transactions_per_customer: 1 # 最少交易次數
  max_attributes: 30               # DNA分析最多屬性數

# ==========================================
# 模組載入設定
# ==========================================
# 定義模組載入順序與相依性
# 注意：login 模組為共用模組，不需要 vitalsigns_ 前綴
modules:
  # 核心模組（必須最先載入）
  - id: "login"
    name: "登入模組"
    enabled: true
    config_file: "module_config/login.yaml"
    load_order: 1
    source: "shared"  # 共用模組標記
    description: "使用者認證與權限管理（共用模組）"

  # 資料處理模組
  - id: "vitalsigns_upload"
    name: "資料上傳"
    enabled: true
    config_file: "module_config/vitalsigns_upload.yaml"
    load_order: 2
    dependencies: ["login"]
    description: "多檔案CSV/Excel上傳，支援Amazon格式自動偵測"

  # DNA分析模組
  - id: "vitalsigns_dna"
    name: "客戶DNA分析"
    enabled: true
    config_file: "module_config/vitalsigns_dna.yaml"
    load_order: 3
    dependencies: ["vitalsigns_upload"]
    description: "客戶分群、RFM分析、AI洞察"

  # VitalSigns 旗艦版四大模組
  - id: "vitalsigns_revenue_pulse"
    name: "營收脈能"
    enabled: true
    config_file: "module_config/vitalsigns_revenue_pulse.yaml"
    load_order: 4
    dependencies: ["vitalsigns_upload", "vitalsigns_dna"]
    description: "營收指標、ARPU、CLV、AOV分析"

  - id: "vitalsigns_acquisition"
    name: "客戶增長"
    enabled: true
    config_file: "module_config/vitalsigns_acquisition.yaml"
    load_order: 5
    dependencies: ["vitalsigns_upload", "vitalsigns_dna"]
    description: "新客獲取、增長率、首購分析"

  - id: "vitalsigns_retention"
    name: "客戶留存"
    enabled: true
    config_file: "module_config/vitalsigns_retention.yaml"
    load_order: 6
    dependencies: ["vitalsigns_upload", "vitalsigns_dna"]
    description: "留存率、Cohort分析、流失預測"

  - id: "vitalsigns_engagement"
    name: "活躍轉化"
    enabled: true
    config_file: "module_config/vitalsigns_engagement.yaml"
    load_order: 7
    dependencies: ["vitalsigns_upload", "vitalsigns_dna"]
    description: "活躍度、轉化漏斗、參與度評分"

  # 資訊頁面模組
  - id: "about"
    name: "關於我們"
    enabled: true
    config_file: "module_config/about.yaml"
    load_order: 8
    source: "shared"  # 共用模組標記
    description: "平台介紹與服務說明（共用模組）"

# ==========================================
# 分析工作流程
# ==========================================
workflow:
  # 資料準備階段
  data_preparation:
    - step: "upload_data"
      module: "vitalsigns_upload"
      required: true
      description: "上傳客戶交易資料"

    - step: "validate_data"
      module: "vitalsigns_upload"
      required: true
      description: "驗證資料格式與完整性"

  # DNA分析階段
  dna_analysis:
    - step: "segment_customers"
      module: "vitalsigns_dna"
      required: true
      description: "客戶分群分析"

    - step: "extract_attributes"
      module: "vitalsigns_dna"
      required: false
      description: "AI屬性萃取（可選）"

  # 旗艦模組分析階段
  flagship_analysis:
    parallel_execution: false  # 由使用者選擇執行順序
    modules:
      - "vitalsigns_revenue_pulse"
      - "vitalsigns_acquisition"
      - "vitalsigns_retention"
      - "vitalsigns_engagement"

# ==========================================
# 頁面配置 (Pages Configuration)
# ==========================================
# Updated to match BrandEdge generator pattern
pages:
  - id: "login"
    title: "登入模組"
    icon: "sign-in-alt"
    enabled: true
    module: "login"
    hide_in_menu: true   # Login page not shown in sidebar

  - id: "vitalsigns_upload"
    title: "資料上傳"
    icon: "upload"
    enabled: true
    module: "vitalsigns_upload"
    group: "分析流程"

  - id: "vitalsigns_dna"
    title: "客戶DNA分析"
    icon: "dna"
    enabled: true
    module: "vitalsigns_dna"
    group: "分析流程"

  - id: "vitalsigns_revenue_pulse"
    title: "營收脈能"
    icon: "dollar-sign"
    enabled: true
    module: "vitalsigns_revenue_pulse"
    group: "VitalSigns 旗艦版"

  - id: "vitalsigns_acquisition"
    title: "客戶增長"
    icon: "users"
    enabled: true
    module: "vitalsigns_acquisition"
    group: "VitalSigns 旗艦版"

  - id: "vitalsigns_retention"
    title: "客戶留存"
    icon: "user-check"
    enabled: true
    module: "vitalsigns_retention"
    group: "VitalSigns 旗艦版"

  - id: "vitalsigns_engagement"
    title: "活躍轉化"
    icon: "fire"
    enabled: true
    module: "vitalsigns_engagement"
    group: "VitalSigns 旗艦版"

  - id: "about"
    title: "關於我們"
    icon: "info-circle"
    enabled: true
    module: "about"
    group: null  # No group - appears at bottom

# ==========================================
# 導航流程設定
# ==========================================
navigation:
  default_page: "vitalsigns_upload"
  flow:
    - from: "login"
      to: "vitalsigns_upload"
      condition: "authenticated"

    - from: "vitalsigns_upload"
      to: "vitalsigns_dna"
      condition: "data_uploaded"
      auto_navigate: true  # 自動跳轉

    - from: "vitalsigns_dna"
      to: "vitalsigns_revenue_pulse"
      condition: "dna_analyzed"
      auto_navigate: false  # 使用者選擇

# ==========================================
# 集中管理系統
# ==========================================
content_management:
  hints:
    enabled: true
    file_path: "database/content/{language}/general/vitalsigns/hint.csv"
    categories:
      - "upload"
      - "dna"
      - "revenue"
      - "acquisition"
      - "retention"
      - "engagement"

  prompts:
    enabled: true
    file_path: "database/content/{language}/general/vitalsigns/prompt.csv"
    types:
      - "dna_insights"              # DNA分析洞察
      - "revenue_insights"          # 營收洞察
      - "acquisition_strategies"    # 增長策略
      - "retention_recommendations" # 留存建議
      - "engagement_optimization"   # 活躍優化

  markdown:
    enabled: true
    file_path: "database/content/{language}/markdown/"

# ==========================================
# 部署配置
# ==========================================
deployment:
  target: "connect"  # connect | shinyapps | local
  account: "kyle-lin"
  app_name: "vitalsigns-flagship"
  main_file: "app_vitalsigns.R"
  github_repo: "kiki830621/VitalSigns_premium"

# ==========================================
# 監控與日誌
# ==========================================
monitoring:
  enabled: true

  metrics:
    track_user_activity: true
    track_api_calls: true
    track_processing_time: true
    track_analysis_performance: true

  logging:
    level: "INFO"
    output: "file"
    path: "logs/vitalsigns.log"
    rotation: "daily"
    max_size: "100MB"
    retention_days: 30

# ==========================================
# 分析引擎配置
# ==========================================
analysis_engine:
  # DNA分析設定
  dna_analysis:
    clustering:
      method: "kmeans"
      min_clusters: 2
      max_clusters: 8
      default_clusters: 5

    rfm_analysis:
      enabled: true
      recency_weight: 0.3
      frequency_weight: 0.3
      monetary_weight: 0.4

    attribute_extraction:
      enabled: true
      method: "ai"  # ai | manual
      max_attributes: 30
      min_attributes: 5

  # 營收分析設定
  revenue_analysis:
    arpu_calculation: "mean"  # mean | median
    clv_method: "historical"  # historical | predictive
    aov_breakdown: true
    pareto_analysis: true  # 80/20 rule

  # 增長分析設定
  acquisition_analysis:
    new_customer_threshold_days: 30
    cohort_period: "monthly"  # daily | weekly | monthly
    growth_rate_period: "monthly"

  # 留存分析設定
  retention_analysis:
    retention_periods: [7, 14, 30, 60, 90, 180]  # days
    churn_threshold_days: 90
    cohort_analysis: true
    survival_analysis: true

  # 活躍度分析設定
  engagement_analysis:
    active_threshold_days: 30
    engagement_scoring: true
    funnel_analysis: true
    activity_patterns: true

# ==========================================
# 時間序列分析配置
# ==========================================
time_series:
  enabled: true
  methods:
    - "trend"
    - "seasonality"
    - "forecast"

  forecast:
    periods_ahead: 12  # months
    confidence_level: 0.95
    method: "auto"  # auto | arima | ets

# ==========================================
# 聯絡與支援
# ==========================================
support:
  contact_email: "mr.no.one01@gmail.com"
  company_name: "祈鋒行銷科技有限公司"
  documentation_url: "https://docs.peakedges.com/vitalsigns"
  feedback_url: "https://feedback.peakedges.com"
  version_check_url: "https://api.peakedges.com/version/vitalsigns"
