# ==========================================
# InsightForge 主配置檔案
# ==========================================
# 此檔案定義應用程式層級設定與模組載入順序
# 各模組詳細配置請參考 module_config/ 目錄
# Version: 1.0.0
# Last Updated: 2025-09-28

# ==========================================
# 應用程式基本資訊
# ==========================================
app_info:
  app_id: "insightforge"  # Used to determine which language directory to load
  name: "InsightForge 精準行銷策略引擎"  # No <br> - display in navbar
  version: "18.4"
  description: "AI 驅動的精準行銷分析平台"
  language: "zh_TW.UTF-8"
  tier: "l3_premium"

# ==========================================
# 語言設定
# ==========================================
language:
  default: "chinese"  # chinese | english | japanese
  available: ["chinese", "english", "japanese"]
  content_path: "database/content"  # 語言內容檔案路徑
  fallback: "chinese"  # 當語言檔案不存在時的備用語言
  enable_user_selection: true  # 允許使用者選擇語言

# ==========================================
# 環境設定
# ==========================================
environment:
  mode: "development"  # development | production
  debug: true
  log_level: "INFO"   # DEBUG | INFO | WARNING | ERROR
  session_timeout: 3600  # 秒
  max_concurrent_users: 100

# ==========================================
# 資料庫配置
# ==========================================
database:
  primary:
    type: "postgresql"
    env_prefix: "PG"  # 環境變數前綴
    pool: true
    max_connections: 10
    timeout: 30

  fallback:
    type: "sqlite"
    path: "database/app.db"
    backup_enabled: true

  test_mode: false  # 測試模式強制使用 SQLite

# ==========================================
# API 配置
# ==========================================
api:
  openai:
    enabled: true
    key_env: "OPENAI_API_KEY"
    default_model: "gpt-5-nano"
    max_retries: 3
    timeout: 60
    rate_limit: 100  # requests per minute

# ==========================================
# UI 主題配置
# ==========================================
ui:
  theme:
    framework: "bs4Dash"
    primary_color: "primary"
    bootswatch: "cosmo"

  sidebar:
    enabled: true
    collapsed_on_start: false
    fixed: true
    width: 280

  navbar:
    enabled: true
    fixed: true
    show_notifications: false
    show_user_menu: true
    show_db_status: true

  footer:
    enabled: true
    fixed: true
    left_text: "InsightForge v18 - 精準行銷策略引擎"
    right_text: "© 2024 All Rights Reserved"

# ==========================================
# 功能開關
# ==========================================
features:
  enable_cache: true
  enable_parallel_processing: true
  enable_auto_save: false
  enable_hints: true
  hint_delay: 500  # 毫秒
  enable_help: true
  show_debug_panel: false
  demo_mode: true

# ==========================================
# 模組載入設定
# ==========================================
# 定義模組載入順序與相依性
# 注意：模組 ID 必須與語言檔案名稱一致
modules:
  # 核心模組（必須最先載入）
  - id: "login"
    name: "登入模組"
    enabled: true
    config_file: "module_config/login.yaml"
    load_order: 1
    description: "使用者認證與權限管理"

  # 資料處理模組
  - id: "upload_review_sales"
    name: "資料上傳與審查"
    enabled: true
    config_file: "module_config/upload_review_sales.yaml"
    load_order: 2
    dependencies: ["login"]
    description: "資料上傳、驗證與初步審查"

  - id: "scoring"
    name: "屬性評分"
    enabled: true
    config_file: "module_config/scoring.yaml"
    load_order: 3
    dependencies: ["upload_review_sales"]
    description: "AI 驅動的屬性評分系統"

  - id: "sales_model_insightforge"
    name: "銷售模型分析"
    enabled: true
    config_file: "module_config/sales_model.yaml"
    load_order: 4
    dependencies: ["scoring", "upload_review_sales"]
    description: "銷售預測模型"

  # 行銷策略模組
  - id: "keyword_ads_insightforge"
    name: "關鍵字廣告優化"
    enabled: true
    config_file: "module_config/keyword_ads.yaml"
    load_order: 5
    dependencies: ["scoring"]
    description: "關鍵字廣告策略與 ROI 優化"

  - id: "product_dev_insightforge"
    name: "新品開發策略"
    enabled: true
    config_file: "module_config/product_dev.yaml"
    load_order: 6
    dependencies: ["scoring"]
    description: "基於市場洞察的新品開發建議"

  # 資訊頁面模組
  - id: "about"
    name: "關於我們"
    enabled: true
    config_file: "module_config/about.yaml"
    load_order: 7
    source: "shared"  # 共用模組標記
    description: "平台介紹與服務說明（共用模組）"

# ==========================================
# 頁面配置
# ==========================================
pages:
  - id: "upload_review_sales"
    title: "資料上傳"
    icon: "upload"
    enabled: true
    module: "upload_review_sales"

  - id: "scoring"
    title: "屬性評分"
    icon: "star"
    enabled: true
    module: "scoring"

  - id: "sales_model_insightforge"
    title: "銷售模型"
    icon: "chart-line"
    enabled: true
    module: "sales_model_insightforge"

  - id: "keyword_ads_insightforge"
    title: "關鍵字廣告"
    icon: "search"
    enabled: true
    module: "keyword_ads_insightforge"

  - id: "product_dev_insightforge"
    title: "新品開發"
    icon: "lightbulb"
    enabled: true
    module: "product_dev_insightforge"

  - id: "about"
    title: "關於我們"
    icon: "info-circle"
    enabled: true
    module: "about"
    group: null  # No group - appears at bottom

# ==========================================
# 導航流程設定
# ==========================================
navigation:
  default_page: "upload_review_sales"
  flow:
    - from: "login"
      to: "upload_review_sales"
      condition: "authenticated"

    - from: "upload_review_sales"
      to: "scoring"
      condition: "data_uploaded"

    - from: "scoring"
      to: "sales_model_insightforge"
      condition: "scores_generated"

    - from: "sales_model_insightforge"
      to: "keyword_ads_insightforge"
      condition: "optional"

# ==========================================
# 部署配置
# ==========================================
deployment:
  target: "connect"  # connect | shinyapps | local
  account: "kyle-lin"
  app_name: "insightforge-premium"
  main_file: "app_dynamic.R"

# ==========================================
# 監控與日誌
# ==========================================
monitoring:
  enabled: true

  metrics:
    track_user_activity: true
    track_api_calls: true
    track_processing_time: true

  logging:
    level: "INFO"
    output: "file"
    path: "logs/app.log"
    rotation: "daily"
    max_size: "100MB"
    retention_days: 30

