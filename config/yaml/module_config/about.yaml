# ==========================================
# About Module Configuration
# ==========================================
# 關於我們模組配置
# Version: 1.0.0
# Last Updated: 2025-10-15

module_info:
  id: "about"
  name: "關於我們"
  version: "1.0.0"
  description: "平台介紹與服務說明"
  type: "information"
  icon: "info-circle"
  path: "modules/module_about.R"

  # 函數名稱 (明確指定，不使用自動發現)
  functions:
    ui: "aboutModuleUI"
    server: "aboutModuleServer"

# ==========================================
# UI 配置
# ==========================================
ui:
  card:
    enabled: true
    title_key: "about.title"
    status: "primary"
    solid_header: false
    collapsible: false
    width: 12

  markdown:
    enabled: true
    path_template: "database/content/{language}/markdown/about.md"
    render_options:
      fragment_only: true
      use_xhtml: true
      smartypants: true
      base64_images: true
      mathjax: true

# ==========================================
# 內容設定
# ==========================================
content:
  type: "markdown"
  fallback_language: "chinese"
  cache_enabled: true
  cache_duration: 3600  # seconds

# ==========================================
# 語言對應
# ==========================================
language_mapping:
  zh_TW: "chinese"
  en_US: "english"
  ja_JP: "japanese"

# ==========================================
# 功能開關
# ==========================================
features:
  show_contact_info: true
  show_company_logo: true
  enable_external_links: true

# ==========================================
# 聯絡資訊
# ==========================================
contact:
  company_name: "祈鋒行銷科技有限公司"
  email: "mr.no.one01@gmail.com"
  website: "https://peakedges.com"
  documentation_url: "https://docs.peakedges.com"

