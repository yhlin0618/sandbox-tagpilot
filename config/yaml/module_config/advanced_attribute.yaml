# ==========================================
# BrandEdge 進階屬性評價模組配置
# ==========================================
# Module: advanced_attribute
# Path: modules/module_brandedge_advanced_attribute.R
# Version: 1.0.0

module:
  id: "advanced_attribute"
  name: "advanced_attribute_module"
  description: "detailed_attribute_performance_analysis"
  version: "1.0.0"
  path: "modules/module_brandedge_advanced_attribute.R"
  type: "analysis"
  icon: "sliders-h"

# UI 配置
ui:
  title_key: "title"
  subtitle_key: "subtitle"
  card_status: "warning"

  tabs:
    overview:
      id: "overview"
      title_key: "tabs.overview"
      icon: "chart-bar"

    comparison:
      id: "comparison"
      title_key: "tabs.comparison"
      icon: "balance-scale"

    details:
      id: "details"
      title_key: "tabs.details"
      icon: "list-ul"

# 屬性分析設定
attribute_analysis:
  # 分析範圍
  scope:
    min_attributes: 10                 # 最少分析屬性數
    max_attributes: 30                 # 最多分析屬性數
    auto_select: false                 # 自動選擇重要屬性

  # 統計分析
  statistics:
    calculate_mean: true
    calculate_median: true
    calculate_std: true
    calculate_cv: true                 # 變異係數
    calculate_confidence_interval: true
    confidence_level: 0.95

# 品牌比較設定
brand_comparison:
  # 比較方法
  method: "pairwise"                   # pairwise | group | matrix

  # 視覺化
  visualization:
    chart_type: "heatmap"              # heatmap | bar | radar
    color_scheme: "RdYlGn"             # RColorBrewer 色盤
    show_values: true
    cluster_brands: true               # 品牌聚類
    cluster_attributes: true           # 屬性聚類

  # 顯著性檢定
  significance_test:
    enabled: true
    method: "anova"                    # anova | kruskal | t_test
    alpha: 0.05
    show_pvalues: true

# 排名分析
ranking:
  # 排名方式
  by_attribute:
    enabled: true
    show_top_n: 5                      # 每個屬性顯示前 N 名品牌

  by_brand:
    enabled: true
    show_top_n: 10                     # 每個品牌顯示前 N 個屬性

  # 排名視覺化
  visualization:
    show_rank_change: false            # 顯示排名變化（需要歷史資料）
    highlight_leader: true
    highlight_laggard: true

# 屬性重要性分析
importance_analysis:
  # 計算方法
  methods:
    - "variance"                       # 變異性
    - "correlation"                    # 與整體滿意度的相關性
    - "discrimination"                 # 品牌間的區辨力

  # 權重設定
  weights:
    variance: 0.3
    correlation: 0.4
    discrimination: 0.3

  # 輸出設定
  output:
    top_n: 15                          # 顯示前 N 個重要屬性
    show_scores: true
    chart_type: "lollipop"             # lollipop | bar | dot

# 差距分析
gap_analysis:
  # 基準設定
  benchmark:
    type: "ideal"                      # ideal | leader | average | custom
    ideal_score: 5.0
    percentile: 90                     # 使用第 90 百分位作為基準

  # 視覺化
  visualization:
    chart_type: "waterfall"            # waterfall | bar | bullet
    show_positive_negative: true
    highlight_threshold: 0.5           # 差距閾值

# 資料驗證
validation:
  min_brands: 2
  min_attributes: 10
  require_scored_data: true
  check_data_quality: true
  min_sample_size_per_brand: 10

# 輸出設定
output:
  # 表格
  tables:
    attribute_scores:
      show: true
      format: "datatable"
      enable_sorting: true
      enable_filtering: true
      export_enabled: true

    brand_rankings:
      show: true
      highlight_extremes: true

  # 圖表
  charts:
    heatmap:
      show: true
      height: 600
      interactive: true

    comparison_bars:
      show: true
      height: 400

    importance_plot:
      show: true
      height: 350

# 匯出設定
export:
  formats: ["csv", "excel", "pdf"]
  include_visualizations: true
  include_statistics: true

# 語言內容路徑
language:
  content_path: "database/content/{language}/module/advanced_attribute.yaml"
  fallback_path: "database/content/chinese/module/advanced_attribute.yaml"
