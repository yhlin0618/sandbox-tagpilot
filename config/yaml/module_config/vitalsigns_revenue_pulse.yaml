module_info:
  id: vitalsigns_revenue_pulse
  path: modules/module_vitalsigns_revenue_pulse.R
  name: 營收脈能模組
  version: 1.0.0
  description: 量化收入規模、單客價值與獲利韌性
  functions:
    ui: revenuePulseVitalsignsModuleUI
    server: revenuePulseVitalsignsModuleServer
metrics:
  total_revenue:
    name: 銷售額
    unit: USD
    icon: dollar-sign
    color: primary
    format: currency
    calculation: sum(lineitem_price)
  arpu:
    name: 人均購買金額
    full_name: Average Revenue Per User
    unit: USD
    icon: user-dollar
    color: success
    format: currency
    calculation: total_revenue / unique_customers
    calculation_method: mean
  clv:
    name: 平均顧客終生價值
    full_name: Customer Lifetime Value
    unit: USD
    icon: chart-line
    color: info
    format: currency
    calculation_method: historical
    historical_formula: total_customer_spend
    predictive_formula: arpu * avg_lifetime_months * retention_rate
  aov:
    name: 平均訂單價值
    full_name: Average Order Value
    unit: USD
    icon: shopping-cart
    color: warning
    format: currency
    calculation: total_revenue / total_transactions
  consistency_score:
    name: 交易一致性分數
    unit: score
    icon: check-circle
    color: success
    format: percentage
    range:
    - 0
    - 100
    calculation: cv_coefficient
    interpretation:
      high: '> 70'
      medium: 40-70
      low: < 40
revenue_analysis:
  distribution:
    enabled: yes
    show_histogram: yes
    show_boxplot: yes
    bins: 30
    outlier_detection: yes
  pareto:
    enabled: yes
    threshold: 0.8
    top_n_customers: 20
    visualization: cumulative_curve
  trend:
    enabled: yes
    aggregation_period: monthly
    show_moving_average: yes
    ma_window: 3
    show_growth_rate: yes
  contribution:
    by_customer: yes
    by_segment: yes
    by_product: no
    by_time_period: yes
arpu_analysis:
  calculation:
    method: mean
    include_zero_spend: no
    exclude_outliers: yes
    outlier_threshold: 3
  segmentation:
    enabled: yes
    compare_by:
    - customer_segment
    - acquisition_period
    - customer_status
  benchmarking:
    enabled: yes
    show_industry_benchmark: no
    show_internal_target: yes
    target_arpu: ~
clv_analysis:
  calculation_method: historical
  historical:
    formula: total_customer_revenue
    time_frame: all_time
  predictive:
    enabled: no
    model: simple
    simple_formula:
      arpu_weight: 1.0
      lifetime_months: 12
      retention_rate: 0.7
      discount_rate: 0.1
  segmentation:
    enabled: yes
    buckets:
    - label: 高價值客戶
      threshold: '> P75'
      color: '#28a745'
    - label: 中價值客戶
      threshold: P25-P75
      color: '#ffc107'
    - label: 低價值客戶
      threshold: < P25
      color: '#dc3545'
aov_analysis:
  calculation:
    method: mean
    exclude_returns: yes
    min_transaction_value: 0
  trend:
    enabled: yes
    period: monthly
    show_growth_rate: yes
    compare_yoy: yes
  product_mix:
    enabled: no
    analyze_bundle_effect: no
    cross_sell_analysis: no
consistency_analysis:
  metrics:
  - id: cv_coefficient
    name: 變異係數
    formula: std / mean
    interpretation:
      consistent: < 0.3
      moderate: 0.3-0.7
      variable: '> 0.7'
  - id: purchase_regularity
    name: 購買規律性
    formula: 1 - cv(interpurchase_time)
  - id: amount_stability
    name: 金額穩定性
    formula: 1 - cv(purchase_amounts)
  visualization:
    show_timeline: yes
    show_patterns: yes
    highlight_irregular: yes
pareto_analysis:
  enabled: yes
  dimensions:
  - id: customer
    name: 客戶貢獻
    threshold: 0.8
    top_n: 20
  - id: time_period
    name: 時間段貢獻
    threshold: 0.8
  visualization:
    chart_type: cumulative_curve
    show_pareto_line: yes
    highlight_threshold: yes
    color_coding: yes
  insights:
    show_concentration: yes
    show_recommendations: yes
time_series:
  enabled: yes
  analyses:
  - id: revenue_trend
    name: 營收趨勢
    metric: total_revenue
  - id: arpu_trend
    name: ARPU趨勢
    metric: arpu
  - id: transaction_volume
    name: 交易量趨勢
    metric: transaction_count
  forecast:
    enabled: yes
    periods_ahead: 3
    confidence_level: 0.95
    method: auto
visualization:
  kpi_cards:
    show: yes
    layout: horizontal
    animated: yes
  charts:
    revenue_over_time:
      type: line
      color: '#007bff'
      show_data_points: yes
    revenue_distribution:
      type: histogram
      bins: 30
      color: '#28a745'
    pareto_chart:
      type: combined
      bar_color: '#007bff'
      line_color: '#dc3545'
    aov_trend:
      type: line
      color: '#ffc107'
      show_moving_average: yes
  tables:
    customer_ranking:
      show: yes
      max_rows: 100
      sortable: yes
      searchable: yes
      export_enabled: yes
ai_insights:
  enabled: yes
  gpt:
    model: gpt-5-nano
    temperature: 0.7
    max_tokens: 1000
  insight_types:
  - id: revenue_summary
    name: 營收總結
    prompt_type: revenue_pulse_summary
    variables:
    - total_revenue
    - arpu
    - clv
    - aov
    - growth_rate
  - id: arpu_analysis
    name: ARPU分析
    prompt_type: arpu_insights
    variables:
    - arpu
    - arpu_distribution
    - segment_comparison
  - id: clv_recommendations
    name: CLV提升建議
    prompt_type: clv_optimization
    variables:
    - avg_clv
    - clv_segments
    - retention_rate
  - id: consistency_insights
    name: 交易一致性洞察
    prompt_type: consistency_analysis
    variables:
    - consistency_score
    - cv_coefficient
    - patterns
  loading:
    show_loading_indicator: yes
    loading_text: AI 正在分析您的營收數據...
    timeout: 60
data_requirements:
  required_fields:
  - customer_id
  - lineitem_price
  - payment_time
  optional_fields:
  - product_id
  - order_id
  - customer_segment
  validation:
    min_transactions: 10
    min_customers: 5
    min_revenue: 1
export:
  enabled: yes
  formats:
  - id: summary_report
    name: 摘要報告
    format: pdf
    includes:
    - kpi_summary
    - charts
    - ai_insights
  - id: detailed_data
    name: 詳細資料
    format: xlsx
    includes:
    - customer_revenue_breakdown
    - transaction_details
    - metrics_over_time
  - id: dashboard_snapshot
    name: 儀表板快照
    format: png
    includes: all_visualizations
performance:
  cache:
    enabled: yes
    cache_duration: 1800
    cache_calculations: yes
  parallel:
    enabled: yes
    max_workers: 2
  aggregation:
    pre_aggregate: yes
    aggregation_level: daily
ui_settings:
  layout:
    show_kpi_cards: yes
    show_charts: yes
    show_tables: yes
    show_ai_insights: yes
  controls:
    date_range_selector: yes
    segment_filter: yes
    metric_selector: yes
    refresh_button: yes
  tooltips:
    enabled: yes
    show_definitions: yes
    show_formulas: yes
module_integration:
  dna_module:
    use_segments: yes
    segment_comparison: yes
  acquisition_module:
    compare_new_vs_repeat: yes
    cohort_analysis: yes
  time_series_module:
    forecast_revenue: yes
    trend_analysis: yes
hints:
  enabled: yes
  hint_targets:
  - id: revenue_pulse_sales
    position: top
  - id: revenue_pulse_arpu
    position: top
  - id: revenue_pulse_clv
    position: top
  - id: revenue_pulse_aov
    position: top
prompts:
  enabled: yes
  prompt_types:
  - id: revenue_pulse_summary
    description: 營收總體分析
  - id: arpu_insights
    description: ARPU深度洞察
  - id: clv_optimization
    description: CLV優化建議
  - id: consistency_analysis
    description: 交易一致性分析
