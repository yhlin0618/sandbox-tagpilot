# OpenAI Prompt Configuration for MAMBA Dashboard
# Central repository for all AI prompts used across the dashboard
# Version: 1.0
# Last Updated: 2025-08-04

metadata:
  version: "v1.0"
  effective_date: "2025-08-04"
  description: "Centralized OpenAI prompt templates for MAMBA dashboard components"
  maintainer: "MAMBA Development Team"
  purpose: "Standardize and manage all AI-generated insights across dashboard modules"

# ============================================================================
# SECTION 1: System Prompts (Common across modules)
# ============================================================================
system_prompts:
  marketing_consultant:
    role: "system"
    content: "你是專業的電商行銷顧問，擅長數據分析和策略制定。請用繁體中文回答，提供具體可執行的建議。"
  
  data_analyst:
    role: "system"
    content: "你是資深的數據分析師，專精於電商數據解讀和商業洞察。請用繁體中文提供深入且易懂的分析。"
  
  product_strategist:
    role: "system"
    content: "你是產品策略專家，擅長產品定位和市場分析。請用繁體中文回答，著重實用性建議。"
  
  customer_insights_expert:
    role: "system"
    content: "你是客戶洞察專家，專注於客戶行為分析和市場區隔。請用繁體中文提供精準的客戶分析。"

# ============================================================================
# SECTION 2: Position Analysis Prompts
# ============================================================================
position_analysis:
  # Market Segmentation (CSA) Analysis
  csa_market_segments:
    model: "gpt-5.2"
    system_prompt: "{system_prompts.marketing_consultant.content}"
    user_prompt_template: |
      根據以下市場區隔分析結果，提供市場策略建議：
      
      ## 分析數據：
      {segment_summary}
      
      ## 產品分佈：
      {product_distribution}
      
      請按以下格式輸出：
      
      ### 1. 市場區隔洞察
      分析各區隔的特徵，作現有目標市場輪廓描述，並指出平均每家可分配到的營收。市場集中度高嗎，並計算市場集中度HHI（Herfindahl–Hirschman Index）指標(注意：不要列出計算公式)和說明？市場競爭嗎，請說明？
      
      ### 2. 競爭定位建議
      - 優勢區隔：如何鞏固
      - 劣勢區隔：如何改善
      - 空白區隔：是否進入
      
      ### 3. 潛在目標市場分析
      以現有分析出來的市場區隔數來作分析，是否有曼巴MAMBA可進入的潛在目標市場？若有，我們應該在此市場區隔訴求什麼品牌特色，比較容易成功進入。注意，不要自己新增可進入的市場區隔。
      
      ### 4. 產品組合優化
      基於區隔分析的產品線調整建議

      ### 5. 總結
      針對我們調查的品牌進行總結，描述現有目標市場輪廓，潛在目標市場發展契機，以及如何優化現有產品組合，提供建議。注意，請根據數據詳實分析就好，不用自己過度延伸，也不用提供KPI建議。
      
      限制在 2000 字內
  
  # Strategic Positioning Analysis
  strategic_positioning:
    model: "gpt-5.2"
    system_prompt: "{system_prompts.product_strategist.content}"
    user_prompt_template: |
      基於以下產品定位分析，提供策略建議：

      ## 四象限分析結果：
      - 訴求象限：{appeal_products}
      - 改善象限：{improve_products}
      - 劣勢象限：{weakness_products}
      - 改變象限：{change_products}

      ## 關鍵指標：
      {key_metrics}

      請提供：
      1. 各象限產品的具體行動方案
      2. 資源配置優先順序
      3. 短期（3個月）vs 長期（1年）策略

      限制在 10000 字內

  # Strategy Quadrant Analysis (from positionStrategy)
  strategy_quadrant_analysis:
    model: "gpt-5.2"
    system_prompt: "{system_prompts.product_strategist.content}"
    user_prompt_template: |
      根據四象限策略分析結果，為該產品提供具體的行銷策略建議。

      **四象限定義**（基於重要性-績效分析 IPA）：
      - 訴求象限（高重要性+正向績效）：客戶重視且表現優異，應強力突出
      - 改善象限（高重要性+負向績效）：客戶重視但表現不佳，需優先改善
      - 劣勢象限（低重要性+負向績效）：客戶較不重視且表現不佳，接受現況
      - 改變象限（低重要性+正向績效）：表現良好但客戶較不重視，可淡化或轉化

      **產品四象限資料**：
      - 訴求因素：{appeal_factors}
      - 改善因素：{improvement_factors}
      - 劣勢因素：{weakness_factors}
      - 改變因素：{change_factors}

      請使用以下 markdown 架構，但**只顯示該產品實際有因素的部分**：

      ## 產品策略分析

      整體主軸：請你根據廠商的訴求優勢因素，依據這28個品牌個性(即1.環保奉獻、2.冒險挑戰、3.創新改變、4.理念原則、5.品味優雅、6.上流高級、7.時尚引領、8.藝術美學、9.幽默高知、10.聰明懂你、11.開放包容、12.科技前沿、13.領袖成就、14.自信相信、15.自主負責、16.經典精緻、17.保護守候、18.溫暖舒適、19.熱情活力、20.友善親切、21.誠實透明、22.專業可靠、23.堅毅毅力、24.實用務實、25.性感魅力、26.感官愉悅、27.快樂夢想、28.誘惑大膽)來歸類(類似因素分析)，廠商可訴求的品牌識別度是哪一個品牌個性(包含該品牌在表現較佳的訴求的優勢因素)。注意，編號越小的品牌個性其品牌價值越高，所以你可以看企業在訴求的優勢因素中，可歸類在哪一個優勢因素，而根據這些優勢因素和產品特性，你會建議他往哪一個更高的品牌價值的品牌個性來主打，增加品牌辨識度，但注意不要出現品牌個性的編號。並請根據我們調查的競品目前(網路上找得到)的品牌個性或定位(如果有的話)，列出來和品牌比較。

      ### 訴求：客戶重視且表現優異，應強力突出
      （僅當訴求因素有內容時顯示此部分）
      基於該產品的優勢因素，建議如何在行銷中突出這些優勢，並針對每一個優勢因素提供有創意、新奇的高熵廣告文案或有識別度的廣告文案或行銷策略建議。第二，請針對品牌識別度(與其包含的主要優勢因素)，設計一個品牌故事，來描述這些優勢因素所產生的品牌價值。

      ### 改善：客戶重視但表現不佳，需優先改善
      （僅當改善因素有內容時顯示此部分）
      基於可改善因素，提出產品優化方向，並針對每一個因素，提供有創意、新奇的高熵廣告文案或有識別度的廣告文案或行銷策略建議。

      ### 劣勢：客戶較不重視且表現不佳，接受現況
      （僅當劣勢因素有內容時顯示此部分）
      基於弱勢因素，建議如何在行銷中減少負面影響，並針對每一個因素，提供有創意、新奇的高熵廣告文案或有識別度的廣告文案或行銷策略建議。

      ### 改變：表現良好但客戶較不重視，可淡化或轉化
      （僅當改變因素有內容時顯示此部分）
      基於需要改變的因素，提出重點改進建議，並針對每一個因素，提供有創意、新奇的高熵廣告文案或有識別度的廣告文案或行銷策略建議。

      ### 總結：請列出下列五點：
      第一，針對上述作總結。
      第二，根據上述分析提供品牌印記，建議品牌的IP、顏色、LOGO、高熵的產品外觀設計(如三角形包裝)、高熵的產品名稱(如鮮萃黑巧)、高熵的廣告文案(如第四代巧克力提純技術SCe4)。注意，分析後續相同品牌時，品牌印記要有一致性。
      第三，建議企業將上述行銷策略吹五種風以帶風向，分別是：1.跟風(將購買者變傳播者，如請購買者推薦或邀請購買者在社群傳播)、2.透過主流社群媒體傳播、3.網紅、大V、小V傳播，4.做好產品評價、5.搭上熱潮話題或人物提高流量，透過這五種風(造風)傳播品牌識別度和品牌印記，增加產品擴散速度。
      第四，口碑行銷策略：請依照下面口碑行銷原則，提供口碑行銷策略建議：1.提高自己社交身價：提出行銷策略或廣告文案建議，讓企業能當人們在談一項產品時，會讓自己看起來像行家、不可思議或神秘感；2.觸發物：提出行銷策略或廣告文案建議，讓企業能喚起人們聯想到我們產品的刺激物，如火星巧克力棒、Budweiser與Wassup連結、瑞貝卡布萊克推出Friday歌曲；3.情緒：提出能讓企業提出富感染力的行銷策略或廣告文案，以觸發顧客對我們產品的敬畏、實用等正面情緒，如果汁機能把iPhone絞碎；4.故事：像木馬屠城記一樣，提出建議，讓企業能找出自己品牌的特洛伊木馬；5.曝光：提出鼓勵顧客作出我們期望的行為，並讓他人看見和模仿的行銷策略；6.實用價值：提出建議，能讓企業打造看起來實用的內容，並搭配高熵的廣告文案，促使人們口耳相傳。
      第五，產品擴散策略：針對產品提出加速產品擴散的行銷策略或廣告文案建議，具體參考指標如下：1.產品有顯著的相對優勢：產品與眾不同的特色；2.產品相容性：產品可容於各種品牌；3.產品易用性：如產品安裝簡單或容易使用的廣告文案或行銷建議；4.產品可試驗性：產品的優勢可輕易被觀察到；5.產品創新的可觀察性：如拍立得可馬上拍出照片不用等。

      **重要規則**：
      - 如果某個象限沒有因素（空白或無內容），請完全跳過該部分的標題和內容
      - 針對具體的因素變數提供實用的策略建議和廣告文案方向
      - 要注意這些品牌識別度或品牌價值訴求的優勢因素要有一致性，不可以互相矛盾
      - 保持 markdown 格式，不要用程式碼區塊包起來
      - 注意，這是跨境電商的行銷策略，不能提供隔日送達、24小時送達、分期零利率、縣市配送、頁面加上物流時程可視化條或描述與產品無關的例子如：更亮/更穩/更省電/更靜音等相關策略

      限制在 10000 字內


  # CSA Segment Naming (AI-powered segment naming)
  csa_segment_naming:
    model: "gpt-5.2"
    system_prompt: "{system_prompts.marketing_consultant.content}"
    user_prompt_template: |
      請為以下市場區隔命名，使用有意義且易記的名稱。

      {cluster_summary}

      請只回傳 R 向量格式: c("Name1", "Name2", ...)

# ============================================================================
# SECTION 3: Poisson Analysis Prompts
# ============================================================================
poisson_analysis:
  # Comment Analysis (Market Track)
  market_track_strategy:
    model: "gpt-5.2"
    system_prompt: "你是專業的電商口碑管理顧問，擅長評分優化和市場定位策略。請用繁體中文回答。"
    user_prompt_template: |
      根據以下市場賽道（口碑評分）分析數據，提供策略報告。
      
      ## 口碑類型影響力統計：
      {rating_summary}
      
      ## 前8大影響因素：
      {top_factors}
      
      請按以下格式輸出：
      
      ## 🌟 市場賽道策略報告
      
      ### 1. 口碑影響力診斷
      請列出具有顯著性的口碑指標，並依照邊際效應值大小，依序列出這些顯著的因素，並說明賽道倍數的商業意義。
      
      ### 2. 評分提升行動方案
       針對邊際效應正值，且具顯著性的口碑因素，各提供一項具體改善建議，和試著協助發展行銷策略、廣告文案，並用說故事的方式呈現廣告：
      - 因素名稱：具體行動（1000字內）
      
      ### 3. 競爭者對比策略
      依照因素的顯著性條件下，依照邊際效應值大小依序列出這些顯著的因素，並基於上述口碑影響力分析，建議：
      - 如何突出優勢評分
      - 如何改善劣勢評分
      - 市場定位調整方向
      
      **注意**：
      - 保持專業但易懂的語言
      - 提供具體可執行的建議
      - 限制在 2000 字內
 
  # Feature Analysis (Precision Marketing)
  precision_marketing_strategy:
    model: "gpt-5.2"
    system_prompt: "{system_prompts.data_analyst.content}"
    user_prompt_template: |
      根據以下產品屬性影響力分析，提供精準行銷策略。
      
      ## 屬性影響力統計：
      {attributes_summary}
      
      ## 關鍵屬性詳情：
      {key_attributes}
      
      請按以下格式輸出：
      
      ### 📊 產品屬性重要性分析
      
      #### 1. 關鍵正向屬性
      請列出所有對銷售正向倍數成長(正值)的具顯著性的關鍵因素(列出變數英文)，各提供一句20字內的轉化放大語句，可直接用於eBay和官網商品頁。

      #### 2.顧客購買動機洞察，若無則此標題和內容省略
      列出上述哪些具顯著性的關鍵因素(列出變數英文)，是影響顧客購買動機的顯著關鍵變數？請各提供一句50字內的轉化放大語句，可直接用於eBay和官網商品頁。

      #### 3.產品解決顧客什麼痛點，若無則此標題和內容省略
      列出上述哪些具顯著性的關鍵因素(列出變數英文)，是你產品解決顧客什麼痛點？請各提供一句50字內的轉化放大語句，可直接用於eBay和官網商品頁。

      #### 4.你交付給顧客的是什麼，若無則此標題和內容省略
      列出上述哪些具顯著性的關鍵因素(列出變數英文)，是你交付給顧客的是什麼？請各提供一句50字內的轉化放大語句，可直接用於eBay和官網商品頁。

      #### 5.產品使用場景為何，若無則此標題和內容省略
      列出上述哪些具顯著性，且與你產品的使用場景(列出變數英文)相關的變數，請各提供一句50字內的轉化放大語句，可直接用於eBay和官網商品頁。

      #### 6.情緒價值(不要寫馬斯洛需求層級理論出來)
      若上述具顯著性的關鍵因素(列出變數英文)中，有符合馬斯洛需求理論所描述的生理需求(基本滿足與五個感官快樂)、安全需求(降低焦慮、確保可靠)、社會情感需求(歸屬感、受認同)、自尊需求(被尊重、展現能力)、自我實現需求(追求夢想、突破極限)等需求相關的優勢因素，請據此列出這些關鍵因素符合馬斯洛需求理論的各需求下的因素，並提供行銷策略、廣告文案和撰寫品牌故事。最後提醒企業將這五種情緒價值疊加提供給顧客。注意：請不要列出生理需求、安全需求、社會情感需求、自尊需求和自我實現等字。

      
      #### 2. 行銷文案建議
      基於1.關鍵正向屬性、2.顧客購買動機、3.產品解決顧客痛點、4.交付給顧客的是什麼、5.產品使用場景(如賽車跑道)、6.提供情緒價值等觀點，提供：
      - 依據前述分別提出行銷策略優化建議，以突出關鍵因素，並依據前述討論的變數，增加：7.讓消費者被看見的行銷策略建議(如：裝年輕、裝X、裝圈層、裝高級、裝幸福、裝懂、裝自信、裝正確、裝時尚、裝成就)，注意不要寫出被看見十種「裝」字樣、8.前述談到的五種風(跟風、社群媒體、大V、評價、熱潮)策略、9.錨點策略，如：(1)產品材質(如產品經過甚麼標準認證)、(2)品牌歷史(如百年工藝)、(3)產品特色(如歐美原裝進口或適用各種車款)、(4)品牌工藝(如經過什麼工藝過程)、(5)零(如零碳排)、(6)銷量(如No.1百萬銷量經典款)、(7)品牌聯名(如MAMBA和某知名賽車手聯名)。
      
      #### 3. 關鍵字廣告投放策略
      - 請針對上述所有對銷售倍數成長的具顯著性的關鍵因素，尋找消費者會在網站上搜尋的關鍵字提供關鍵字廣告投放策略
      
      #### 4. 口碑行銷策略
      請依照下面口碑行銷原則，提供口碑行銷策略建議：1.提高自己社交身價：提出行銷策略或廣告文案建議，讓企業能當人們在談一項產品時，會讓自己看起來像行家、不可思議或神秘感；2.觸發物：提出行銷策略或廣告文案建議，讓企業能喚起人們聯想到我們產品的刺激物，如火星巧克力棒、Budweiser與Wassup連結、瑞貝卡布萊克推出Friday歌曲；3.情緒：提出能讓企業提出富感染力的行銷策略或廣告文案，以觸發顧客對我們產品的敬畏、實用等正面情緒，如果汁機能把iPhone絞碎；4.故事：像木馬屠城記一樣，提出建議，讓企業能找出自己品牌的特洛伊木馬；5.曝光：提出鼓勵顧客作出我們期望的行為，並讓他人看見和模仿的行銷策略；6.實用價值：提出建議，能讓企業打造看起來實用的內容，並搭配高熵的廣告文案，促使人們口耳相傳。注意：請不要寫出特洛伊木馬字樣。
      
      #### 5. 產品擴散策略
      針對產品提出加速產品擴散的行銷策略或廣告文案建議，具體參考指標如下：1.產品有顯著的相對優勢：產品與眾不同的特色；2.產品相容性：產品可容於各種品牌；3.產品易用性：如產品安裝簡單或容易使用的廣告文案或行銷建議；4.產品可試驗性：產品的優勢可輕易被觀察到；5.產品創新的可觀察性：如拍立得可馬上拍出照片不用等。

      #### 6. 產品改進優先序
      請依據上述哪些具顯著性的關鍵重要產品屬性，並依照係數由高到低，依序列出需要改進的屬性及原因。
      
      限制在 10000 字內
  
  # Product Development Suggestions
  product_development_strategy:
    model: "gpt-5.2"
    system_prompt: "{system_prompts.product_strategist.content}"
    user_prompt_template: |
      請詳實列出所有邊際效用正值的變數，並依據係數大小排序，依序提出新產品開發的建議。
      
      ## 正向影響屬性資料：
      {positive_attributes}
      
      請按以下格式輸出：
      
      ## 🚀 AI 新產品開發建議報告
      
      ### 1. 高影響力屬性分析
      請詳實列出上述與製造產品本身相關且對銷售具有正向顯著性的變數(邊際效應%必須是正值)，並依據係數大小排序重要屬性，說明它們對銷量的正向影響程度。最後列出未來新品可以增加哪些屬性，中英文對照。
      
      ### 2. 產品開發優先順序
      請詳實列出上述與製造產品本身相關且對銷售具有正向顯著性的變數(邊際效應%必須是正值)，並依據係數大小排序，建議新產品開發的優先順序：
      - 核心功能（賽道倍數>2.0的屬性）
      - 增值功能（賽道倍數1.2-2.0的屬性）
      - 輔助功能（其他正向屬性）
      
      ### 3. 具體產品改進建議
      請列出上述與製造產品本身相關且對銷售具有正向顯著性的變數(邊際效應%必須是正值)，並依據係數大小排序，各提供：
      - 屬性名稱：具體改進方向（50字內）
      - 預期效果：對銷量的潛在影響
      
      ### 4. 市場機會評估
      請列出上述哪些對銷售具有正向顯著性的變數(邊際效應%必須是正值)，提供：
      - 未來產品趨勢預測
      - 競爭優勢建立方向
      - 目標客群偏好分析
      
      **注意**：
      - 提供可執行的產品開發建議
      - 注意，新產品開發的建議一定要與產品屬性有關，像是Installation time、Warranty length、Emissions compliance、Financing options、Discounted price on sales page...等請作好判斷，與產品屬性無關的變數千萬不要列
      - 基於數據證據支持建議
      - 限制在 10000 字內
  
  # Time Analysis
  time_trend_analysis:
    model: "gpt-5.2"
    system_prompt: "{system_prompts.data_analyst.content}"
    user_prompt_template: |
      基於以下時間趨勢分析，提供市場洞察：
      
      ## 時間段表現：
      {time_performance}
      
      ## 趨勢變化：
      {trend_changes}
      
      請分析：
      1. 銷售高峰期特徵與原因
      2. 低谷期的改善策略
      3. 季節性行銷建議
      4. 庫存管理優化方向
      
      限制在 350 字內

