# ============================================================================
# Usage Instructions
# ============================================================================
usage:
  description: |
    This configuration provides Chinese translations for variable names
    used throughout the MAMBA system. It should be loaded by UI components
    to display user-friendly labels instead of technical variable names.
  
  loading_example: |
    # R code to load and use translations
    library(yaml)
    
    # Load translations
    labels <- yaml::read_yaml("variable_chinese_labels.yaml")
    
    # Function to get Chinese label for a variable
    get_chinese_label <- function(var_name) {
      # Search through all categories
      for (category in names(labels)) {
        if (category %in% c("metadata", "usage")) next
        
        if (var_name %in% names(labels[[category]])) {
          return(labels[[category]][[var_name]])
        }
      }
      
      # Return original name if no translation found
      return(var_name)
    }
    
    # Example usage
    chinese_label <- get_chinese_label("use_oil")  # Returns "使用油"